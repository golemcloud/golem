name: 'Restore Build Binaries'
description: 'Install cargo-test-r, mount the per-run binaries sticky disk, and re-hydrate the nextest archive'
inputs:
  run-id:
    description: 'GitHub run ID for sticky disk key'
    required: true
  copy-to-target:
    description: 'Whether to copy binaries to target/debug'
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Install cargo-test-r
      shell: bash
      run: cargo binstall --force --locked cargo-test-r@2.2.5
    - name: Ensure binaries mount point exists
      shell: bash
      run: mkdir -pv tmp/golem-binaries
    - name: Mount packaged binaries sticky disk
      uses: useblacksmith/stickydisk@v1
      with:
        path: ${{ github.workspace }}/tmp/golem-binaries
        key: ${{ github.repository }}-binaries-${{ inputs.run-id }}
    - name: Verify binaries sticky disk is populated
      shell: bash
      run: |
        if [ -z "$(ls -A tmp/golem-binaries 2>/dev/null)" ]; then
          echo "::error::binaries sticky disk for run ${{ inputs.run-id }} is empty; the producer job (build-and-store) likely did not run or did not commit."
          exit 1
        fi
    - name: Apply binary archive
      shell: bash
      run: cargo-test-r reuse-nextest-archive --archive-file tmp/golem-binaries
    - name: Copy binaries to target/debug
      if: inputs.copy-to-target == 'true'
      shell: bash
      run: |
        mkdir -pv target/debug
        find target/nextest-archive/target/dev-ci -maxdepth 1 -type f | xargs mv -t target/debug/
