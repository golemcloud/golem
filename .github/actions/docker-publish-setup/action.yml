name: 'Docker Publish Setup'
description: 'Common setup for Docker image publishing jobs'
inputs:
  dockerhub-username:
    description: 'Docker Hub username'
    required: true
  dockerhub-password:
    description: 'Docker Hub password'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Fetch tag
      shell: bash
      run: git fetch origin --deepen=1
    - name: Prepare platforms
      shell: bash
      run: echo "PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV
    - name: Download Targets
      uses: actions/download-artifact@v8
      with:
        pattern: docker-targets-build-*
        path: target
        merge-multiple: true
    - name: Extract Targets
      shell: bash
      run: |
        ls -R target
        cd target
        for f in *.tar; do tar xvf "$f"; done
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set Docker version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == 'push' ] && [ "${{ github.ref_type }}" == 'tag' ]; then
          DOCKER_VERSION=$(echo "${{ github.ref }}" | sed 's|^refs/tags/v||')
          echo "DOCKER_VERSION=${DOCKER_VERSION}" >> $GITHUB_ENV
        else
          COMMIT_SHORT_HASH=$(git rev-parse --short=7 HEAD)
          echo "DOCKER_VERSION=${COMMIT_SHORT_HASH}" >> $GITHUB_ENV
        fi
    # `:latest` should track releases from `main` only. Tags that originate from
    # a maintenance branch (e.g. a 1.5.x bug-fix tagged after 1.6 has shipped on
    # main) must publish their `:vX.Y.Z` image without overwriting `:latest`.
    # We use the GitHub compare API so this works regardless of how shallow the
    # local clone is.
    - name: Determine whether to publish ':latest'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        publish_latest=false
        if [ "${{ github.event_name }}" == 'push' ] && [ "${{ github.ref_type }}" == 'tag' ]; then
          status=$(gh api \
            "repos/${{ github.repository }}/compare/main...${{ github.sha }}" \
            --jq '.status' 2>/dev/null || echo "unknown")
          case "$status" in
            identical|behind)
              publish_latest=true
              ;;
          esac
          echo "Tag commit ${{ github.sha }} status vs main: ${status} -> publish ':latest'=${publish_latest}"
        fi
        echo "PUBLISH_LATEST_TAG=${publish_latest}" >> $GITHUB_ENV
    - uses: jpribyl/action-docker-layer-caching@v0.1.1
      continue-on-error: true
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}
