name: debug-jemalloc-profile-executor

# Manually-triggered build of a worker-executor Docker image compiled with
# jemalloc heap profiling enabled. The image is published under a distinct
# suffix tag and is intended for short-lived EKS investigations only.
on:
  # Temporary branch trigger so GitHub detects and runs this workflow before it
  # exists on the default branch. Remove before merging.
  push:
    branches:
      - 1.5.x-cloud-benchmarks
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker Hub image name'
        required: true
        default: 'golemservices/golem-worker-executor'
      tag_suffix:
        description: 'Suffix appended to the <short-sha> image tag'
        required: true
        default: 'jemalloc-profile'
      target_cpu:
        description: 'Rust target CPU flag; use neoverse-v1 for Graviton 3 only'
        required: true
        default: 'neoverse-v1'
      lg_prof_sample:
        description: 'Suggested MALLOC_CONF lg_prof_sample value printed in the report'
        required: true
        default: '21'

jobs:
  build:
    env:
      CARGO_BUILD_JOBS: 10
      RUST_TARGET: aarch64-unknown-linux-gnu
    runs-on: blacksmith-16vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-rust
        with:
          rust-targets: aarch64-unknown-linux-gnu

      - name: Prepare rustflags
        env:
          TARGET_CPU: ${{ github.event.inputs.target_cpu || 'neoverse-v1' }}
        run: |
          RUSTFLAGS="-C force-frame-pointers=yes"
          if [ -n "${TARGET_CPU}" ]; then
            RUSTFLAGS="${RUSTFLAGS} -C target-cpu=${TARGET_CPU}"
          fi
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=${RUSTFLAGS}" >> $GITHUB_ENV

      - run: cargo install cross

      - name: Build worker-executor
        env:
          PLATFORM_OVERRIDE: linux/arm64
        run: |
          cross build -p golem-worker-executor --features jemalloc-prof --release --target "${RUST_TARGET}"

      - name: Package target binary
        run: |
          mkdir -p package
          tar cvf "package/${RUST_TARGET}.tar" "target/${RUST_TARGET}/release/worker-executor"

      - uses: actions/upload-artifact@v6
        with:
          name: jemalloc-profile-build-linux-arm64
          path: package/*.tar

  publish:
    runs-on: blacksmith
    needs:
      - build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download target
        uses: actions/download-artifact@v8
        with:
          pattern: jemalloc-profile-build-*
          path: target
          merge-multiple: true

      - name: Extract target
        run: |
          ls -R target
          cd target
          for f in *.tar; do tar xvf "$f"; done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Compute image tag
        env:
          INPUT_IMAGE_NAME: ${{ github.event.inputs.image_name || 'golemservices/golem-worker-executor' }}
          INPUT_TAG_SUFFIX: ${{ github.event.inputs.tag_suffix || 'jemalloc-profile' }}
        run: |
          SHORT=$(git rev-parse --short=7 HEAD)
          echo "IMAGE_NAME=${INPUT_IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${SHORT}-${INPUT_TAG_SUFFIX}" >> $GITHUB_ENV

      - name: Build and push profiling image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./golem-worker-executor/docker/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Report
        env:
          LG_PROF_SAMPLE: ${{ github.event.inputs.lg_prof_sample || '21' }}
        run: |
          echo "Pushed ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Recommended pod env:"
          echo "MALLOC_CONF=prof:true,prof_active:true,lg_prof_sample:${LG_PROF_SAMPLE},prof_prefix:/heap/worker-executor"
          echo "Mount a writable /heap volume, then dump with: kubectl exec <pod> -- kill -USR2 1"
