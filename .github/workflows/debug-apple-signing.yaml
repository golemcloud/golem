name: Debug Apple Code Signing

on:
  workflow_dispatch:
    inputs:
      enable_ssh:
        description: "Enable SSH debugging session"
        required: false
        default: false
        type: boolean
      rust_target:
        description: "Rust target to build"
        required: false
        default: "aarch64-apple-darwin"
        type: choice
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

jobs:
  debug-signing:
    runs-on: macos-latest
    steps:
      - name: System Info
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo ""
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available codesign ==="
          which codesign
          codesign --version || true

      - name: List existing keychains
        run: |
          echo "=== Current Keychains ==="
          security list-keychains
          echo ""
          echo "=== Default Keychain ==="
          security default-keychain
          echo ""
          echo "=== Existing Signing Identities (before import) ==="
          security find-identity -v -p codesigning || echo "No identities found"

      - name: Setup Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup target add ${{ inputs.rust_target }}

      - name: Build hello-world test binary
        run: |
          mkdir -p /tmp/hello-sign-test
          cd /tmp/hello-sign-test
          cargo init --name hello-sign-test
          cargo build --release --target ${{ inputs.rust_target }}
          ls -la ./target/${{ inputs.rust_target }}/release/hello-sign-test

      - name: Import Code Signing Certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -x

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create and unlock keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate - use -T to allow codesign access
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Check certificate file
          ls -la "$CERTIFICATE_PATH"
          file "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add keychain to search list (prepend to existing list)
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          # Set partition list to allow codesign to access the certificate
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Debug: verify certificate was imported
          echo "Imported certificates:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Save keychain path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Code Sign Binary
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -x

          BINARY_PATH=/tmp/hello-sign-test/target/${{ inputs.rust_target }}/release/hello-sign-test

          echo "=== Binary info before signing ==="
          ls -la "$BINARY_PATH"
          file "$BINARY_PATH"

          # Debug: list available signing identities
          echo "Available signing identities:"
          security find-identity -v -p codesigning

          # Sign with hardened runtime
          codesign --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$BINARY_PATH"

          # Verify signature
          codesign --verify --verbose "$BINARY_PATH"
          codesign --display --verbose=4 "$BINARY_PATH"

      - name: Create Notarization Archive
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          BINARY_PATH=/tmp/hello-sign-test/target/${{ inputs.rust_target }}/release/hello-sign-test
          ZIP_PATH=/tmp/hello-sign-test/target/${{ inputs.rust_target }}/release/hello-sign-test.zip

          # Create zip for notarization
          zip -j "$ZIP_PATH" "$BINARY_PATH"

      - name: Submit for Notarization
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ZIP_PATH=/tmp/hello-sign-test/target/${{ inputs.rust_target }}/release/hello-sign-test.zip

          # Submit for notarization (async)
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait false

      - name: Cleanup Keychain
        if: ${{ always() && secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" || true

      # Optional SSH debugging - only runs if enabled
      - name: Setup SSH debugging session
        if: ${{ inputs.enable_ssh == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        timeout-minutes: 30
