name: CI

on:
  push:
    tags:
      - "golem-scala-v*.*.*"
    branches:
      - main
  pull_request:

env:
  JDK_JAVA_OPTIONS: -XX:+PrintCommandLineFlags
  WASM_RQUICKJS_VERSION: "v0.1.4"
  WASI_SDK_VERSION: "25"
  WASI_SDK_PATH: /opt/wasi-sdk

jobs:
  test-scala-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup SBT
        uses: sbt/setup-sbt@v1

      - name: Cache scala dependencies
        uses: coursier/cache-action@v8

      - name: Setup Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup target add wasm32-wasip1

      - uses: cargo-bins/cargo-binstall@main

      - name: Install WASI SDK
        run: |
          curl -sSfL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz | sudo tar xz -C /opt
          sudo mv /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

      - name: Install cargo-component
        run: cargo binstall --force cargo-component@0.21.1

      - name: Install wasm-rquickjs
        run: cargo install wasm-rquickjs-cli --git https://github.com/golemcloud/wasm-rquickjs.git --tag $WASM_RQUICKJS_VERSION

      - name: Build agent_guest.wasm
        working-directory: sdks/scala
        run: ./scripts/generate-agent-guest-wasm.sh

      - name: Verify agent_guest.wasm is committed
        working-directory: sdks/scala
        run: |
          if ! git diff --exit-code sbt/src/main/resources/golem/wasm/agent_guest.wasm mill/resources/golem/wasm/agent_guest.wasm wit/dts/; then
            echo "❌ The agent_guest.wasm or wit/dts/ files differ from the committed version."
            echo "Please run './scripts/generate-agent-guest-wasm.sh' from sdks/scala/ and commit the updated files."
            exit 1
          fi

      - name: Run Golem tests (Scala 3.8.2)
        working-directory: sdks/scala
        run: sbt "++3.8.2; modelJVM/test; modelJS/test; core/test; macros/test; testAgents/fastLinkJS"

      - name: Run Golem tests (Scala 2.13.18)
        working-directory: sdks/scala
        run: sbt "++2.13.18; modelJVM/test; modelJS/test; core/test; macros/test; testAgents/fastLinkJS"

      - name: Test codegen (Scala 3.3.7)
        working-directory: sdks/scala
        run: sbt "++3.3.7; codegen/test"

      - name: Compile sbt plugin (Scala 2.12)
        working-directory: sdks/scala
        run: sbt "++2.12.21!; sbtPlugin/compile"

  # NOTE: Scala SDK integration tests run in the main ci.yaml workflow
  # (scala-sdk-integration-tests job) which has access to build-and-store
  # artifacts and the built TypeScript SDK.

  publish:
    if: startsWith(github.ref, 'refs/tags/golem-scala-v')
    needs: [test-scala-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup SBT
        uses: sbt/setup-sbt@v1

      - name: Cache scala dependencies
        uses: coursier/cache-action@v8

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#golem-scala-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Maven Central (Scala 3.8.2)
        working-directory: sdks/scala
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sbt -batch "++3.8.2; set ThisBuild / version := \"$VERSION\"; modelJVM/publishSigned; modelJS/publishSigned; macros/publishSigned; core/publishSigned"

      - name: Publish to Maven Central (Scala 2.13.18)
        working-directory: sdks/scala
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sbt -batch "++2.13.18; set ThisBuild / version := \"$VERSION\"; modelJVM/publishSigned; modelJS/publishSigned; macros/publishSigned; core/publishSigned"

      - name: Publish codegen (Scala 3.3.7)
        working-directory: sdks/scala
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sbt -batch "++3.3.7; set ThisBuild / version := \"$VERSION\"; codegen/publishSigned"

      - name: Publish codegen (Scala 2.12)
        working-directory: sdks/scala
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sbt -batch "++2.12.21!; set ThisBuild / version := \"$VERSION\"; codegen/publishSigned"

      - name: Publish sbt plugin (Scala 2.12)
        working-directory: sdks/scala
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sbt -batch "++2.12.21!; set ThisBuild / version := \"$VERSION\"; sbtPlugin/publishSigned"

      - name: Release to Maven Central
        working-directory: sdks/scala
        env:
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt -batch sonaRelease
