name: Publish Scala SDK

on:
  push:
    tags:
      - "golem-scala-v*.*.*"

env:
  JDK_JAVA_OPTIONS: -XX:+PrintCommandLineFlags
  WASM_RQUICKJS_VERSION: "v0.2.1"
  WASI_SDK_VERSION: 25
  WASI_SDK_PATH: /opt/wasi-sdk

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/golem-scala-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup SBT
        uses: sbt/setup-sbt@v1

      - name: Cache scala dependencies
        uses: coursier/cache-action@v8

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-targets: wasm32-wasip1 wasm32-wasip2

      - name: Install cargo-make
        run: cargo install --force cargo-make

      - name: Setup WASM component tools
        uses: ./.github/actions/setup-wasm-component-tools
        with:
          wasi-sdk-version: ${{ env.WASI_SDK_VERSION }}
          wasi-sdk-path: ${{ env.WASI_SDK_PATH }}
          wasm-rquickjs-version: ${{ env.WASM_RQUICKJS_VERSION }}

      - name: Sync WIT dependencies
        run: cargo make wit

      - name: Build agent_guest.wasm
        working-directory: sdks/scala
        run: ./scripts/generate-agent-guest-wasm.sh

      - name: Verify Scala generated files and clean publish tree
        uses: ./.github/actions/check-scala-sdk-generated
        with:
          verify-clean-tree: "true"

      - name: Publish to Maven Central
        working-directory: sdks/scala
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CI_RELEASE: "+modelJVM/publishSigned; +modelJS/publishSigned; +codegen/publishSigned; +macros/publishSigned; +core/publishSigned; ++2.12.21; sbtPlugin/publishSigned"
          CI_SONATYPE_RELEASE: sonaRelease
