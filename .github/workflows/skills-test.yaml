name: Skills Test Harness

on:
  push:
    paths:
      - 'golem-skills/**'
  pull_request:
    paths:
      - 'golem-skills/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      golem_version:
        description: 'Golem version to test'
        required: true
        default: 'latest'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: golem-skills/tests/harness/package.json

      - name: Install and Build
        run: |
          cd golem-skills/tests/harness
          npm install
          npm run build

      - name: Run Unit Tests
        run: |
          cd golem-skills/tests/harness
          npm test

  integration-test:
    name: ${{ matrix.agent }} x ${{ matrix.language }}
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: golem
          POSTGRES_PASSWORD: golem
          POSTGRES_DB: golem_test
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: golem
          MYSQL_DATABASE: golem_test
        ports:
          - "3306:3306"
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        agent: [claude-code, gemini, opencode, codex]
        language: [ts]
        exclude:
          - agent: claude-code
            language: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: golem-skills/tests/harness/package.json

      - name: Install Rust (with wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Install Golem
        run: |
          curl -Lo golem https://github.com/golemcloud/golem/releases/download/v1.4.2/golem-x86_64-unknown-linux-gnu
          chmod +x golem
          sudo mv golem /usr/local/bin/golem
          golem --version

      - name: Start Golem Server
        run: |
          golem server run &
          for i in {1..30}; do
            if curl -fsS http://localhost:9881/healthcheck > /dev/null 2>&1; then
              echo "Golem server is ready"
              break
            fi
            sleep 2
          done

      - name: Install Filesystem Watcher
        run: sudo apt-get update && sudo apt-get install -y inotify-tools

      - name: Install Claude Code
        if: matrix.agent == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Gemini CLI
        if: matrix.agent == 'gemini'
        run: |
          npm install -g @google/gemini-cli
          mkdir -p ~/.gemini

      - name: Install OpenCode
        if: matrix.agent == 'opencode'
        run: npm install -g opencode-ai

      - name: Install Codex CLI
        if: matrix.agent == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install -g @openai/codex
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Install Harness Dependencies
        run: |
          cd golem-skills/tests/harness
          npm install
          npm run build
          npm install -g tsx

      - name: Setup isolated test directory
        run: |
          mkdir -p /tmp/harness-run
          cp -r golem-skills/tests/harness/dist /tmp/harness-run/dist
          cp -r golem-skills/tests/harness/node_modules /tmp/harness-run/node_modules
          cp -r golem-skills/tests/harness/src /tmp/harness-run/src
          cp -r golem-skills/tests/harness/scenarios /tmp/harness-run/scenarios
          cp golem-skills/tests/harness/package.json /tmp/harness-run/
          cp golem-skills/tests/harness/tsconfig.json /tmp/harness-run/
          cp -r golem-skills/skills /tmp/harness-run/skills
          cd /tmp/harness-run && git init -b main && git config user.email "ci@golem.cloud" && git config user.name "CI" && git add -A && git commit -m "init"

      - name: Run Skill Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: postgres://golem:golem@localhost:5432/golem_test
          MYSQL_URL: mysql://root:golem@localhost:3306/golem_test
        run: |
          cd /tmp/harness-run
          tsx src/run.ts --agent ${{ matrix.agent }} --language ${{ matrix.language }} --scenarios scenarios --skills ./skills

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.agent }}-${{ matrix.language }}
          path: /tmp/harness-run/results/
