name: Skills Test Harness

on:
  push:
    branches:
      - main
    paths:
      - 'golem-skills/**'
  pull_request:
    paths:
      - 'golem-skills/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: skills-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  WASI_SDK_VERSION: "25"
  WASI_SDK_PATH: /opt/wasi-sdk

jobs:
  build-binaries:
    name: Build Golem Binaries
    runs-on: blacksmith-32vcpu-ubuntu-2204
    env:
      CARGO_BUILD_JOBS: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup target add wasm32-wasip1 wasm32-wasip2

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v4-rust
          shared-key: release
          cache-all-crates: true
          save-if: true

      - uses: davidB/rust-cargo-make@v1

      - name: Build golem-cli and golem server
        run: cargo build -p golem-cli -p golem --release
        timeout-minutes: 30

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: cargo-bins/cargo-binstall@main

      - name: Install WASI SDK
        run: |
          curl -sSfL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz | sudo tar xz -C /opt
          sudo mv /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

      - name: Install TS SDK build prerequisites
        run: |
          cargo install wasm-rquickjs-cli --git https://github.com/golemcloud/wasm-rquickjs.git --tag v0.1.4
          cargo binstall --force cargo-component@0.21.1
          npm install -g pnpm@10

      - name: Build TS SDK
        run: cargo make build-sdk-ts

      - name: Upload golem binaries
        uses: actions/upload-artifact@v4
        with:
          name: golem-binaries
          path: |
            target/release/golem-cli
            target/release/golem
          retention-days: 1

      - name: Upload TS SDK packages
        uses: actions/upload-artifact@v4
        with:
          name: golem-ts-sdk
          path: sdks/ts/packages/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
          cache-dependency-path: golem-skills/tests/harness/package.json

      - name: Install and Build
        run: |
          cd golem-skills/tests/harness
          npm install
          npm run build

      - name: Run Unit Tests
        run: |
          cd golem-skills/tests/harness
          npm test

  integration-test:
    name: ${{ matrix.agent }} x ${{ matrix.language }}
    runs-on: ubuntu-latest
    needs: [unit-tests, build-binaries]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: golem_test
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: golem
          MYSQL_DATABASE: golem_test
        ports:
          - "3306:3306"
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        agent: [claude-code, opencode, codex]
        language: [ts, rust]
        exclude:
          - agent: claude-code
            language: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
          cache-dependency-path: golem-skills/tests/harness/package.json

      - name: Install Rust (with wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Download golem binaries
        uses: actions/download-artifact@v4
        with:
          name: golem-binaries
          path: /tmp/golem-bin

      - name: Install Golem
        run: |
          chmod +x /tmp/golem-bin/golem-cli /tmp/golem-bin/golem
          sudo mv /tmp/golem-bin/golem-cli /usr/local/bin/golem-cli
          sudo mv /tmp/golem-bin/golem /usr/local/bin/golem
          golem-cli --version || golem --version

      - name: Start Golem Server
        run: |
          golem server run &
          for i in {1..30}; do
            if curl -fsS http://localhost:9881/healthcheck > /dev/null 2>&1; then
              echo "Golem server is ready"
              break
            fi
            sleep 2
          done

      - name: Install Filesystem Watcher
        run: sudo apt-get update && sudo apt-get install -y inotify-tools

      - name: Install Claude Code
        if: matrix.agent == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install OpenCode
        if: matrix.agent == 'opencode'
        run: npm install -g opencode-ai

      - name: Install Codex CLI
        if: matrix.agent == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install -g @openai/codex
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Download TS SDK packages
        uses: actions/download-artifact@v4
        with:
          name: golem-ts-sdk
          path: sdks/ts/packages/

      - name: Install TS SDK dependencies (restore hoisted node_modules)
        run: |
          npm install -g pnpm@10
          cd sdks/ts
          pnpm install --frozen-lockfile

      - uses: cargo-bins/cargo-binstall@main

      - name: Install TS SDK build prerequisites
        run: |
          cargo install wasm-rquickjs-cli --git https://github.com/golemcloud/wasm-rquickjs.git --tag v0.1.4
          rustup target add wasm32-wasip1
          cargo binstall --force cargo-component@0.21.1

      - name: Install Harness Dependencies
        run: |
          cd golem-skills/tests/harness
          npm install
          npm run build
          npm install -g tsx

      - name: Setup isolated test directory
        run: |
          mkdir -p /tmp/harness-run
          cp -r golem-skills/tests/harness/dist /tmp/harness-run/dist
          cp -r golem-skills/tests/harness/node_modules /tmp/harness-run/node_modules
          cp -r golem-skills/tests/harness/src /tmp/harness-run/src
          cp -r golem-skills/tests/harness/scenarios /tmp/harness-run/scenarios
          cp golem-skills/tests/harness/package.json /tmp/harness-run/
          cp golem-skills/tests/harness/tsconfig.json /tmp/harness-run/
          cp -r golem-skills/skills /tmp/harness-run/skills
          cd /tmp/harness-run && git init -b main && git config user.email "ci@golem.cloud" && git config user.name "CI" && git add -A && git commit -m "init"

      - name: Run Skill Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/golem_test
          MYSQL_URL: mysql://root:golem@localhost:3306/golem_test
          GOLEM_PATH: ${{ github.workspace }}
        run: |
          cd /tmp/harness-run
          tsx src/run.ts --agent ${{ matrix.agent }} --language ${{ matrix.language }} --scenarios scenarios --skills ./skills

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.agent }}-${{ matrix.language }}
          path: /tmp/harness-run/results/
