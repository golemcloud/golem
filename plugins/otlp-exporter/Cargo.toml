[workspace]
resolver = "2"
members = ["components-rust/*"]

[profile.release]
opt-level = "s"
lto = true

[workspace.dependencies]
futures = "0.3.31"
golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_oplog_processor"] }
http = "1.3.1"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
uuid = "1"
wit-bindgen = { version = "=0.58.0", features = ["async"] }
