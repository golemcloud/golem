# golem-app-manifest-header

componentTemplates:
  scala:
    build:
    - command: sbt -batch -no-colors -Dsbt.supershell=false "golemBuildComponent {{ component_name }} .golem/scala.js"
      sources:
      - "{{ componentDir }}/src"
      targets:
      - .golem/scala.js
    - injectToPrebuiltQuickjs: .generated/agent_guest.wasm
      module: .golem/scala.js
      into: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
    - preinitializeJs: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
      into: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.preinitialized.wasm"
    componentWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.preinitialized.wasm"
    outputWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.wasm"
customCommands:
  scala-prepare:
  - command: sbt -batch -no-colors -Dsbt.supershell=false golemPrepare