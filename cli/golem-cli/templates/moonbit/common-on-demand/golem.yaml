# golem-app-manifest-header

componentTemplates:
  moonbit:
    presets:
      debug:
        default: true
        build:
        - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- reexports .mooncakes/golemcloud/golem_sdk {{ component_name | to_snake_case }}
        - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- agents .
        - command: moon build --target wasm
        - command: wasm-tools component embed .mooncakes/golemcloud/golem_sdk/wit _build/wasm/release/build/{{ component_name | to_snake_case }}/{{ component_name | to_snake_case }}.wasm --encoding utf16 --output _build/wasm/debug/{{ component_name | to_snake_case }}.embed.wasm
          mkdirs:
          - _build/wasm/debug
        - command: wasm-tools component new _build/wasm/debug/{{ component_name | to_snake_case }}.embed.wasm --output _build/wasm/debug/{{ component_name | to_snake_case }}.agent.wasm
        componentWasm: _build/wasm/debug/{{ component_name | to_snake_case }}.agent.wasm
      release:
        build:
        - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- reexports .mooncakes/golemcloud/golem_sdk {{ component_name | to_snake_case }}
        - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- agents .
        - command: moon build --target wasm --release
        - command: wasm-tools component embed .mooncakes/golemcloud/golem_sdk/wit _build/wasm/release/build/{{ component_name | to_snake_case }}/{{ component_name | to_snake_case }}.wasm --encoding utf16 --output _build/wasm/release/{{ component_name | to_snake_case }}.embed.wasm
        - command: wasm-tools component new _build/wasm/release/{{ component_name | to_snake_case }}.embed.wasm --output _build/wasm/release/{{ component_name | to_snake_case }}.agent.wasm
        componentWasm: _build/wasm/release/{{ component_name | to_snake_case }}.agent.wasm
