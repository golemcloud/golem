[package]
name = "golem-openapi-client-generator"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
homepage = "https://www.golem.cloud/"
authors = ["Simon Popugaev <simon.popugaev@ziverge.com>"]
readme = "README.md"
description = "OpenAPI glient generator for golem"
repository = "https://github.com/golemcloud/golem-openapi-client-generator"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
fmt = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
indoc = { workspace = true }
itertools = { workspace = true }
openapiv3 = { workspace = true }
convert_case = { workspace = true }
indexmap = { workspace = true }
clap = { workspace = true }

[dev-dependencies]
test-r = { workspace = true }

[lib]
harness = false
doctest = false

[[bin]]
name = "golem-openapi-client-generator"
test = false
