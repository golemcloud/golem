components:
  schemas:
    Account:
      type: object
      title: Account
      required:
      - id
      - revision
      - name
      - email
      - planId
      - roles
      - accountRootCardId
      properties:
        id:
          type: string
          format: uuid
        revision:
          type: integer
          format: uint64
        name:
          type: string
        email:
          type: string
        planId:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AccountRole'
        accountRootCardId:
          type: string
          format: uuid
    AccountCountsReport:
      type: object
      title: AccountCountsReport
      required:
      - totalAccounts
      - totalActiveAccounts
      - totalDeletedAccounts
      properties:
        totalAccounts:
          type: integer
          format: uint64
        totalActiveAccounts:
          type: integer
          format: uint64
        totalDeletedAccounts:
          type: integer
          format: uint64
    AccountCreation:
      type: object
      title: AccountCreation
      required:
      - name
      - email
      - roles
      properties:
        name:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AccountRole'
    AccountRole:
      type: string
      enum:
      - admin
      - marketing-admin
      - builtin-plugin-owner
    AccountSetPlan:
      type: object
      title: AccountSetPlan
      required:
      - currentRevision
      - plan
      properties:
        currentRevision:
          type: integer
          format: uint64
        plan:
          type: string
          format: uuid
    AccountSummary:
      type: object
      title: AccountSummary
      required:
      - id
      - name
      - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
    AccountSummaryReport:
      type: object
      title: AccountSummaryReport
      required:
      - id
      - name
      - email
      - componentsCount
      - workersCount
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        componentsCount:
          type: integer
          format: uint64
        workersCount:
          type: integer
          format: uint64
        createdAt:
          type: string
          format: date-time
    AccountUpdate:
      type: object
      title: AccountUpdate
      required:
      - currentRevision
      properties:
        currentRevision:
          type: integer
          format: uint64
        name:
          type: string
    AgentConfigDeclarationSchema:
      type: object
      required:
      - source
      - path
      - value_type
      properties:
        source:
          $ref: '#/components/schemas/AgentConfigSource'
        path:
          type: array
          items:
            type: string
        value_type:
          $ref: '#/components/schemas/SchemaType'
    AgentConfigEntryDto:
      type: object
      title: AgentConfigEntryDto
      required:
      - path
      - value
      properties:
        path:
          type: array
          items:
            type: string
        value:
          $ref: '#/components/schemas/NormalizedJsonValue'
    AgentConfigSource:
      type: string
      enum:
      - Local
      - Secret
    AgentConstructorSchema:
      type: object
      required:
      - description
      - input_schema
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
        prompt_hint:
          type: string
          nullable: true
        input_schema:
          $ref: '#/components/schemas/InputSchema'
    AgentDependencySchema:
      type: object
      required:
      - type_name
      - constructor
      - methods
      properties:
        type_name:
          type: string
        description:
          type: string
          nullable: true
        schema:
          $ref: '#/components/schemas/SchemaGraph'
        constructor:
          $ref: '#/components/schemas/AgentConstructorSchema'
        methods:
          type: array
          items:
            $ref: '#/components/schemas/AgentMethodSchema'
    AgentFileOptions:
      type: object
      title: AgentFileOptions
      required:
      - targetPath
      - permissions
      properties:
        targetPath:
          type: string
          description: Absolute path in an agent's filesystem.
        permissions:
          $ref: '#/components/schemas/AgentFilePermissions'
    AgentFilePermissions:
      type: string
      enum:
      - read-only
      - read-write
    AgentHttpAuthDetails:
      type: object
      title: AgentHttpAuthDetails
      required:
      - required
      properties:
        required:
          type: boolean
    AgentMethodSchema:
      type: object
      required:
      - name
      - description
      - input_schema
      - output_schema
      properties:
        name:
          type: string
        description:
          type: string
        prompt_hint:
          type: string
          nullable: true
        input_schema:
          $ref: '#/components/schemas/InputSchema'
        output_schema:
          $ref: '#/components/schemas/OutputSchema'
        http_endpoint:
          type: array
          items:
            $ref: '#/components/schemas/HttpEndpointDetails'
        read_only:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ReadOnlyConfig'
          - nullable: true
    AgentMode:
      type: string
      enum:
      - Durable
      - Ephemeral
    AgentSecretCreation:
      type: object
      title: AgentSecretCreation
      required:
      - path
      - secretType
      properties:
        path:
          type: array
          title: |-
            Agent secret path in any casing. All agent secret paths
            are converted to the same casing internally to allow easier cross-language use.
          items:
            type: string
        secretType:
          $ref: '#/components/schemas/SchemaGraph'
        secretValue:
          $ref: '#/components/schemas/SchemaValue'
    AgentSecretDto:
      type: object
      title: AgentSecretDto
      required:
      - id
      - environmentId
      - path
      - revision
      - secretType
      properties:
        id:
          type: string
          format: uuid
        environmentId:
          type: string
          format: uuid
        path:
          type: array
          title: Canonical representation of an agent secret path (segments are each camelCase)
          items:
            type: string
        revision:
          type: integer
          format: uint64
        secretType:
          $ref: '#/components/schemas/SchemaGraph'
        secretValue:
          $ref: '#/components/schemas/SchemaValue'
    AgentSecretUpdate:
      type: object
      title: AgentSecretUpdate
      required:
      - currentRevision
      properties:
        currentRevision:
          type: integer
          format: uint64
        secretValue:
          $ref: '#/components/schemas/OptionalFieldUpdate_SchemaValue'
    AgentTypeInitialPermissions:
      type: object
      title: AgentTypeInitialPermissions
      properties:
        lowerBound:
          default:
            negative: []
            positive: []
          allOf:
          - $ref: '#/components/schemas/AgentTypeInitialPermissionsBound'
          - default:
              negative: []
              positive: []
        upperBound:
          default:
            negative: []
            positive: []
          allOf:
          - $ref: '#/components/schemas/AgentTypeInitialPermissionsBound'
          - default:
              negative: []
              positive: []
    AgentTypeInitialPermissionsBound:
      type: object
      title: AgentTypeInitialPermissionsBound
      properties:
        positive:
          type: array
          default: []
          items:
            type: string
        negative:
          type: array
          default: []
          items:
            type: string
    AgentTypeProvisionConfig:
      type: object
      title: AgentTypeProvisionConfig
      description: |-
        Per-agent-type provisioning configuration stored alongside AgentType declarations
        in ComponentMetadata. Holds runtime setup data separate from agent type declarations.
      required:
      - initialPermissions
      - env
      - config
      - plugins
      - files
      properties:
        initialPermissions:
          $ref: '#/components/schemas/PolymorphicCard'
        env:
          type: object
          additionalProperties:
            type: string
        config:
          type: array
          items:
            $ref: '#/components/schemas/TypedAgentConfigEntry'
        plugins:
          type: array
          items:
            $ref: '#/components/schemas/InstalledPlugin'
        files:
          type: array
          items:
            $ref: '#/components/schemas/InitialAgentFile'
    AgentTypeProvisionConfigCreation:
      type: object
      title: AgentTypeProvisionConfigCreation
      required:
      - initialPermissions
      properties:
        initialPermissions:
          $ref: '#/components/schemas/AgentTypeInitialPermissions'
        env:
          type: object
          default: {}
          additionalProperties:
            type: string
        config:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/AgentConfigEntryDto'
        pluginInstallations:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/PluginInstallation'
        files:
          type: object
          description: key = source path inside uploaded archive; value specifies target path + permissions
          default: {}
          additionalProperties:
            $ref: '#/components/schemas/AgentFileOptions'
    AgentTypeProvisionConfigUpdate:
      type: object
      title: AgentTypeProvisionConfigUpdate
      properties:
        initialPermissions:
          default: null
          allOf:
          - $ref: '#/components/schemas/AgentTypeInitialPermissions'
          - default: null
        env:
          type: object
          additionalProperties:
            type: string
        config:
          type: array
          items:
            $ref: '#/components/schemas/AgentConfigEntryDto'
        pluginUpdates:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/PluginInstallationAction'
        filesToAddOrUpdate:
          type: object
          default: {}
          additionalProperties:
            $ref: '#/components/schemas/AgentFileOptions'
        filesToRemove:
          type: array
          default: []
          items:
            type: string
            description: Absolute path in an agent's filesystem.
        filePermissionUpdates:
          type: object
          default: {}
          additionalProperties:
            $ref: '#/components/schemas/AgentFilePermissions'
    AgentTypeSchema:
      type: object
      required:
      - type_name
      - description
      - constructor
      - methods
      - dependencies
      - mode
      - snapshotting
      properties:
        type_name:
          type: string
        description:
          type: string
        source_language:
          type: string
        schema:
          $ref: '#/components/schemas/SchemaGraph'
        constructor:
          $ref: '#/components/schemas/AgentConstructorSchema'
        methods:
          type: array
          items:
            $ref: '#/components/schemas/AgentMethodSchema'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/AgentDependencySchema'
        mode:
          $ref: '#/components/schemas/AgentMode'
        http_mount:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/HttpMountDetails'
          - nullable: true
        snapshotting:
          $ref: '#/components/schemas/Snapshotting'
        config:
          type: array
          items:
            $ref: '#/components/schemas/AgentConfigDeclarationSchema'
    ApiAddDelayPolicy:
      type: object
      title: ApiAddDelayPolicy
      required:
      - delayMs
      - inner
      properties:
        delayMs:
          type: integer
          format: uint64
        inner:
          $ref: '#/components/schemas/ApiRetryPolicy'
    ApiBooleanValue:
      type: object
      title: ApiBooleanValue
      required:
      - value
      properties:
        value:
          type: boolean
    ApiClampPolicy:
      type: object
      title: ApiClampPolicy
      required:
      - minDelayMs
      - maxDelayMs
      - inner
      properties:
        minDelayMs:
          type: integer
          format: uint64
        maxDelayMs:
          type: integer
          format: uint64
        inner:
          $ref: '#/components/schemas/ApiRetryPolicy'
    ApiCountBoxPolicy:
      type: object
      title: ApiCountBoxPolicy
      required:
      - maxRetries
      - inner
      properties:
        maxRetries:
          type: integer
          format: uint32
        inner:
          $ref: '#/components/schemas/ApiRetryPolicy'
    ApiExponentialPolicy:
      type: object
      title: ApiExponentialPolicy
      required:
      - baseDelayMs
      - factor
      properties:
        baseDelayMs:
          type: integer
          format: uint64
        factor:
          type: number
          format: double
    ApiFibonacciPolicy:
      type: object
      title: ApiFibonacciPolicy
      required:
      - firstMs
      - secondMs
      properties:
        firstMs:
          type: integer
          format: uint64
        secondMs:
          type: integer
          format: uint64
    ApiFilteredOnPolicy:
      type: object
      title: ApiFilteredOnPolicy
      required:
      - predicate
      - inner
      properties:
        predicate:
          $ref: '#/components/schemas/ApiPredicate'
        inner:
          $ref: '#/components/schemas/ApiRetryPolicy'
    ApiImmediatePolicy:
      type: object
      title: ApiImmediatePolicy
    ApiIntegerValue:
      type: object
      title: ApiIntegerValue
      required:
      - value
      properties:
        value:
          type: integer
          format: int64
    ApiJitterPolicy:
      type: object
      title: ApiJitterPolicy
      required:
      - factor
      - inner
      properties:
        factor:
          type: number
          format: double
        inner:
          $ref: '#/components/schemas/ApiRetryPolicy'
    ApiNeverPolicy:
      type: object
      title: ApiNeverPolicy
    ApiPeriodicPolicy:
      type: object
      title: ApiPeriodicPolicy
      required:
      - delayMs
      properties:
        delayMs:
          type: integer
          format: uint64
    ApiPredicate:
      type: object
      oneOf:
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyExistence'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertySetCheck'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyPattern'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertyPrefix'
      - $ref: '#/components/schemas/ApiPredicate_ApiPropertySubstring'
      - $ref: '#/components/schemas/ApiPredicate_ApiPredicatePair'
      - $ref: '#/components/schemas/ApiPredicate_ApiPredicatePair'
      - $ref: '#/components/schemas/ApiPredicate_ApiPredicateNot'
      - $ref: '#/components/schemas/ApiPredicate_ApiPredicateTrue'
      - $ref: '#/components/schemas/ApiPredicate_ApiPredicateFalse'
      discriminator:
        propertyName: type
        mapping:
          PropEq: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropNeq: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropGt: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropGte: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropLt: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropLte: '#/components/schemas/ApiPredicate_ApiPropertyComparison'
          PropExists: '#/components/schemas/ApiPredicate_ApiPropertyExistence'
          PropIn: '#/components/schemas/ApiPredicate_ApiPropertySetCheck'
          PropMatches: '#/components/schemas/ApiPredicate_ApiPropertyPattern'
          PropStartsWith: '#/components/schemas/ApiPredicate_ApiPropertyPrefix'
          PropContains: '#/components/schemas/ApiPredicate_ApiPropertySubstring'
          And: '#/components/schemas/ApiPredicate_ApiPredicatePair'
          Or: '#/components/schemas/ApiPredicate_ApiPredicatePair'
          Not: '#/components/schemas/ApiPredicate_ApiPredicateNot'
          'True': '#/components/schemas/ApiPredicate_ApiPredicateTrue'
          'False': '#/components/schemas/ApiPredicate_ApiPredicateFalse'
    ApiPredicateFalse:
      type: object
      title: ApiPredicateFalse
    ApiPredicateNot:
      type: object
      title: ApiPredicateNot
      required:
      - predicate
      properties:
        predicate:
          $ref: '#/components/schemas/ApiPredicate'
    ApiPredicatePair:
      type: object
      title: ApiPredicatePair
      required:
      - left
      - right
      properties:
        left:
          $ref: '#/components/schemas/ApiPredicate'
        right:
          $ref: '#/components/schemas/ApiPredicate'
    ApiPredicateTrue:
      type: object
      title: ApiPredicateTrue
    ApiPredicateValue:
      type: object
      oneOf:
      - $ref: '#/components/schemas/ApiPredicateValue_ApiTextValue'
      - $ref: '#/components/schemas/ApiPredicateValue_ApiIntegerValue'
      - $ref: '#/components/schemas/ApiPredicateValue_ApiBooleanValue'
      discriminator:
        propertyName: type
        mapping:
          Text: '#/components/schemas/ApiPredicateValue_ApiTextValue'
          Integer: '#/components/schemas/ApiPredicateValue_ApiIntegerValue'
          Boolean: '#/components/schemas/ApiPredicateValue_ApiBooleanValue'
    ApiPredicateValue_ApiBooleanValue:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - Boolean
            example: Boolean
      - $ref: '#/components/schemas/ApiBooleanValue'
    ApiPredicateValue_ApiIntegerValue:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - Integer
            example: Integer
      - $ref: '#/components/schemas/ApiIntegerValue'
    ApiPredicateValue_ApiTextValue:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - Text
            example: Text
      - $ref: '#/components/schemas/ApiTextValue'
    ApiPredicate_ApiPredicateFalse:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - 'False'
            example: 'False'
      - $ref: '#/components/schemas/ApiPredicateFalse'
    ApiPredicate_ApiPredicateNot:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - Not
            example: Not
      - $ref: '#/components/schemas/ApiPredicateNot'
    ApiPredicate_ApiPredicatePair:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - Or
            example: Or
      - $ref: '#/components/schemas/ApiPredicatePair'
    ApiPredicate_ApiPredicateTrue:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - 'True'
            example: 'True'
      - $ref: '#/components/schemas/ApiPredicateTrue'
    ApiPredicate_ApiPropertyComparison:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - PropLte
            example: PropLte
      - $ref: '#/components/schemas/ApiPropertyComparison'
    ApiPredicate_ApiPropertyExistence:
      allOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
