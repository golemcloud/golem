name: "rpc-2-trigger"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-callback-agent"
    prompt:
      rust: >
        In the test-app project, add a second agent type called `Callback` that has the same constructor parameter as
        the existing CounterAgent. Create a method in `Callback` called `run` that takes no parameters, but instead calls
        back the `CounterAgent`'s increment identified by the same name as its own constructor parameter. 
        In CounterAgent, add a second method called `run_test` that _triggers_ the `Callback` 
        agent's (identified by the counter's name) `run` method and then increments the counter just like the existing `increment` method. Make sure
        to just trigger the remote call otherwise we end up with a deadlock. Add another method to Callback called `last_seen`
        for testing - it should return the last seen counter value (passed to `run`). 
        
        With this setup we expect that the CounterAgent's original `increment` behaves as before (increment by 1, no remote call),
        but after calling `run_test`, the counter eventually got incremented by 2 (as it did a roundtrip call to its corresponding `Callback` 
        agent instance).

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second agent type called `Callback` that has the same constructor parameter as
        the existing CounterAgent. Create a method in `Callback` called `run` that takes no parameters, but instead calls
        back the `CounterAgent`'s increment identified by the same name as its own constructor parameter. 
        In CounterAgent, add a second method called `runTest` that _triggers_ the `Callback` 
        agent's (identified by the counter's name) `run` method and then increments the counter just like the existing `increment` method. Make sure
        to just trigger the remote call otherwise we end up with a deadlock. Add another method to Callback called `lastSeen`
        for testing - it should return the last seen counter value (passed to `run`). 
        
        With this setup we expect that the CounterAgent's original `increment` behaves as before (increment by 1, no remote call),
        but after calling `runTest`, the counter eventually got incremented by 2 (as it did a roundtrip call to its corresponding `Callback` 
        agent instance).

        Make sure the project builds successfully.
      effect: >
        In the Effect-based test-app project, add a second durable agent type called `Callback`
        with the same `{ name: Schema.String }` constructor parameter as the existing counter.
        Give it a snapshot-backed numeric `lastSeen` value. Its `run` method takes no parameters,
        obtains the `CounterAgent` instance identified by the same `name`, awaits that counter's
        `increment` method, stores the returned value as `lastSeen`, and completes. Its `lastSeen`
        method takes no parameters and returns the stored number.

        Modify the existing Effect `Counter` agent rather than creating a duplicate. Rename its
        exported TypeScript binding and its `defineAgent` runtime name to exactly `CounterAgent`,
        and update the matching `httpApi` agent key in `golem.yaml`. Preserve its constructor
        parameter, snapshot-backed count, and original `increment` behavior. Add a `runTest` method
        that obtains the `Callback` instance with the counter's name, executes the Effect returned
        by `callback.run.trigger({})`, and then increments and returns the counter exactly as
        `increment` does. The callback must use the real typed clients attached by `defineAgent`.
        Yield both `client.get(...)` and remote method Effects, use named input records (including
        `{}` for no-parameter methods), and handle or convert typed RPC errors so the declared
        method contracts type-check. Do not use Promise-based TypeScript SDK APIs or merely create
        and discard the lazy trigger Effect; the remote call must be fire-and-forget to avoid the
        awaited RPC deadlock.

        Import every implementation module from `src/main.ts`. Make sure the project builds
        successfully.
      scala: >
        In the test-app project, add a second agent type called `Callback` that has the same constructor parameter as
        the existing CounterAgent. Create a method in `Callback` called `run` that takes no parameters, but instead calls
        back the `CounterAgent`'s increment identified by the same name as its own constructor parameter. 
        In CounterAgent, add a second method called `runTest` that _triggers_ the `Callback` 
        agent's (identified by the counter's name) `run` method and then increments the counter just like the existing `increment` method. Make sure
        to just trigger the remote call otherwise we end up with a deadlock. Add another method to Callback called `lastSeen`
        for testing - it should return the last seen counter value (passed to `run`). 
        
        With this setup we expect that the CounterAgent's original `increment` behaves as before (increment by 1, no remote call),
        but after calling `runTest`, the counter eventually got incremented by 2 (as it did a roundtrip call to its corresponding `Callback` 
        agent instance).

        Make sure the project builds successfully.
      moonbit: >
        In the test-app project, add a second agent type called `Callback` that has the same constructor parameter as
        the existing CounterAgent. Create a method in `Callback` called `run` that takes no parameters, but instead calls
        back the `CounterAgent`'s increment identified by the same name as its own constructor parameter. 
        In CounterAgent, add a second method called `run_test` that _triggers_ the `Callback` 
        agent's (identified by the counter's name) `run` method and then increments the counter just like the existing `increment` method. Make sure
        to just trigger the remote call otherwise we end up with a deadlock. Add another method to Callback called `last_seen`
        for testing - it should return the last seen counter value (passed to `run`). 
        
        With this setup we expect that the CounterAgent's original `increment` behaves as before (increment by 1, no remote call),
        but after calling `run_test`, the counter eventually got incremented by 2 (as it did a roundtrip call to its corresponding `Callback` 
        agent instance).

        Make sure the project builds successfully.
    expectedSkills:
      rust:
        - "golem-fire-and-forget-rust"
      ts:
        - "golem-fire-and-forget-ts"
      effect:
        - "golem-fire-and-forget-effect"
      scala:
        - "golem-fire-and-forget-scala"
      moonbit:
        - "golem-fire-and-forget-moonbit"
    verify:
      build: true
      deploy: true

  - id: "c1-increment-1"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "c1-test-1"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method:
        rust: "run_test"
        ts: "runTest"
        effect: "runTest"
        scala: "runTest"
        moonbit: "run_test"
    expect:
      result_json:
        - path: "$"
          equals: 2

  - id: "callback-last-seen"
    invoke_json:
      agent: 'Callback("c1")'
      method:
        rust: "last_seen"
        ts: "lastSeen"
        effect: "lastSeen"
        scala: "lastSeen"
        moonbit: "last_seen"
    expect:
      result_json:
        - path: "$"
          equals: 3

  - id: "c1-increment-2"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 4
