name: "add-llm"
prerequisites:
  services:
    - openai-mock
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "add-llm-method"
    prompt:
      rust: &non-effect-add-llm-prompt >
        In the test-app project, modify the existing CounterAgent to add a new method called
        `ask_llm` (in Rust and MoonBit) or `askLlm` (in TypeScript and Scala).
        The method takes a single string parameter called `question` and returns the LLM's
        response as a plain string.

        There is an OpenAI-compatible LLM server running at `{{openai_mock_url}}`. Use model
        `mock-model` and API key `test-mock-key`. Send the question as a user message and return
        the assistant's reply text.

        Keep the existing increment method unchanged. Make sure the project builds and deploys
        successfully.
      ts: *non-effect-add-llm-prompt
      effect: >
        In the Effect-based test-app project, modify the existing `Counter` agent to add a new method
        called `askLlm`. Change its `defineAgent` name from `Counter` to `CounterAgent` so it can be
        invoked below as `CounterAgent("llm-test")`, and update the corresponding agent reference in
        `golem.yaml` to match. Implement the method with Effect and `@golemcloud/effect-golem`,
        preserving the existing Effect-based `increment` method. The method takes a single string
        parameter called `question` and returns the LLM's response as a plain string.

        There is an OpenAI-compatible LLM server running at `{{openai_mock_url}}`. Use model
        `mock-model` and API key `test-mock-key`. Send the question as a user message and return the
        assistant's reply text.

        Use only APIs and component capabilities actually provided by the installed Effect SDK. If
        it has no supported host LLM API or outgoing HTTP transport, do not invent an API, copy a
        plain-TypeScript `fetch` example, or add a fake/stub response. Leave the project buildable
        and report the precise SDK capability blocker instead. Even in that blocker case, still
        perform the requested `Counter` to `CounterAgent` rename, update `golem.yaml`, and preserve
        the existing `increment` method unchanged.

        Make sure the project builds and deploys successfully.
      scala: *non-effect-add-llm-prompt
      moonbit: *non-effect-add-llm-prompt
    expectedSkills:
      rust:
        - "golem-add-llm-rust"
      ts:
        - "golem-add-llm-ts"
      effect:
        - "golem-add-llm-effect"
      scala:
        - "golem-add-llm-scala"
      moonbit:
        - "golem-add-llm-moonbit"
    allowedExtraSkills:
      rust:
        - "golem-make-http-request-rust"
        - "golem-add-secret-rust"
        - "golem-add-rust-crate"
      ts:
        - "golem-make-http-request-ts"
        - "golem-add-secret-ts"
        - "golem-add-npm-package"
      effect:
        - "golem-make-http-request-effect"
        - "golem-add-secret-effect"
        - "golem-add-npm-package"
      scala:
        - "golem-make-http-request-scala"
        - "golem-add-secret-scala"
        - "golem-add-scala-dependency"
      moonbit:
        - "golem-make-http-request-moonbit"
        - "golem-add-secret-moonbit"
        - "golem-add-moonbit-package"
    verify:
      build: true
      deploy: true

  - id: "invoke-llm-method"
    invoke_json:
      agent: 'CounterAgent("llm-test")'
      method:
        rust: "ask_llm"
        ts: "askLlm"
        effect: "increment"
        scala: "askLlm"
        moonbit: "ask_llm"
      args:
        rust: &non-effect-llm-question '"hello"'
        ts: *non-effect-llm-question
        effect: ""
        scala: *non-effect-llm-question
        moonbit: *non-effect-llm-question
    expect:
      rust: &non-effect-llm-result
        result_json:
          - path: "$"
            equals: "mock-llm-ok"
      ts: *non-effect-llm-result
      effect:
        result_json:
          - path: "$"
            equals: 1
      scala: *non-effect-llm-result
      moonbit: *non-effect-llm-result
