name: "create-a-new-project"
settings:
  timeout_per_subprompt: 300
steps:
  - id: "create-project"
    prompt: "Create a new {{language}} Golem application called test-app."
    expectedSkills:
      - "golem-new-project"
    verify:
      build: true
      deploy: true
      expectedFiles:
        ts: ["test-app/src/main.ts", "test-app/package.json"]
        rust: ["test-app/src/lib.rs", "test-app/Cargo.toml"]

  - id: "invoke-increment"
    invoke_json:
      agent: 'CounterAgent("test")'
      method: 'increment'
    expect:
      result_json:
        - path: "$"
          equals: 1

