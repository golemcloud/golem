name: "get-agent-metadata"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "create-agent"
    invoke:
      agent: 'CounterAgent("c1")'
      method: "increment"

  - id: "get-metadata"
    prompt: >
      Use the CLI to get the metadata for CounterAgent "c1" and save the full output to a
      file called metadata.txt in the test-app directory.
    expectedSkills:
      - "golem-get-agent-metadata"

  - id: "check-metadata"
    check_file:
      path: "metadata.txt"
    expect:
      stdout_contains: "c1"
