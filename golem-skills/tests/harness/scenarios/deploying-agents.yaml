name: "deploying-agents"
steps:
  - id: "create-project"
    create_project:
      name: test-app

  - id: "deploy-project"
    prompt: "Build and deploy the test-app project."
    expectedSkills:
      - "golem-deploy"
    verify:
      deploy: true

  - id: "invoke-increment"
    invoke_json:
      agent: 'CounterAgent("test")'
      method: 'increment'
    expect:
      result_json:
        - path: "$"
          equals: 1
