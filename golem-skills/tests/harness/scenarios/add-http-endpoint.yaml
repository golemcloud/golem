name: "add-http-endpoint"
semanticRequirements:
  effect:
    - The Effect scenario must exercise plain-text, raw binary, ordinary JSON, and empty 204 endpoint response mappings; omitting or replacing any response kind is not a substitute.
settings:
  golem_server:
    custom_request_port: 9006
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-todo-agent-with-http"
    prompt:
      rust: &non-effect-add-todo-agent-with-http-prompt >
        In the test-app project, add a new durable agent type called `TodoAgent` identified by
        a single constructor parameter for the list name. Give it an HTTP mount under
        `/todos/{list-name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

        TodoAgent must store a list of todo items in agent state. Each item has an `id` (string),
        a `title` (string), and a `done` (boolean) field. Use a record, object type, or case class
        named `TodoItem` for this.

        Expose these HTTP endpoints:
        - `POST /items` — accepts a `title` string in the JSON request body, creates a new
          `TodoItem` with an auto-generated sequential id (starting from "1"), `done` set to
          `false`, stores it, and returns the created item as JSON.
        - `GET /items` — returns all stored items as a JSON array.
        - `POST /items/{id}/complete` — finds the item with the given id, sets `done` to `true`,
          and returns the updated item as JSON.

        Make sure the project builds and deploys successfully.
      ts: *non-effect-add-todo-agent-with-http-prompt
      effect: >
        In the Effect-based test-app project, add a new durable agent type called `TodoAgent`
        with a single `constructorParams` string named `listName`. Declare its HTTP mount as
        `/todos/{listName}` with the `Http` API from `@golemcloud/effect-golem`, and expose it
        through the app HTTP API on `test-app.localhost:9006`.

        Store a durable list of todo items using Effect state and snapshot APIs. Define a
        `TodoItem` Effect Schema with `id` (string), `title` (string), and `done` (boolean).

        Expose these HTTP endpoints through method-level `Http` declarations:
        - `POST /items` — accepts a `title` string from the camelCase JSON request body, creates a
          `TodoItem` with a sequential id starting from "1" and `done: false`, stores it, and
          returns it.
        - `GET /items` — returns all stored items as a JSON array.
        - `POST /items/{id}/complete` — binds `id` from the path, marks that item done, and returns
          the updated item.

        Also expose four deterministic endpoints that exercise the existing Effect-Golem response
        mappings. Import `Unstructured` from `@golemcloud/effect-golem`, declare every endpoint in
        the methods map, and implement every handler as an Effect:
        - `GET /responses/text` — use `Unstructured.UnstructuredText` restricted to language code
          `en` and return an inline text reference containing exactly `effect-text-ok` with that
          language code.
        - `GET /responses/binary` — use `Unstructured.UnstructuredBinary` restricted to MIME type
          `application/octet-stream` and return an inline binary reference whose `Uint8Array`
          contains the ASCII bytes for exactly `effect-binary-ok` with that MIME type.
        - `GET /responses/json` — use an ordinary `Schema.Struct` success and return exactly
          `{ kind: "json", source: "effect" }`.
        - `DELETE /responses/empty` — use `Schema.Void` success and return `Effect.void`.

        Implement every handler as an Effect, import the implementation module from `src/main.ts`,
        preserve existing manifest entries, and make sure the project builds and deploys.
      scala: *non-effect-add-todo-agent-with-http-prompt
      moonbit: *non-effect-add-todo-agent-with-http-prompt
    expectedSkills:
      rust:
        - "golem-add-http-endpoint-rust"
      ts:
        - "golem-add-http-endpoint-ts"
      effect:
        - "golem-add-http-endpoint-effect"
      scala:
        - "golem-add-http-endpoint-scala"
      moonbit:
        - "golem-add-http-endpoint-moonbit"
    verify:
      build: true
      deploy: true

  - id: "http-create-item"
    http:
      url: "http://test-app.localhost:9006/todos/groceries/items"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body: '{"title":"Milk"}'
    expect:
      status: 200
      body_json:
        - path: "$.title"
          equals: "Milk"
        - path: "$.done"
          equals: false

  - id: "http-create-second-item"
    http:
      url: "http://test-app.localhost:9006/todos/groceries/items"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body: '{"title":"Eggs"}'
    expect:
      status: 200
      body_json:
        - path: "$.title"
          equals: "Eggs"
        - path: "$.done"
          equals: false

  - id: "http-list-items"
    http:
      url: "http://test-app.localhost:9006/todos/groceries/items"
      method: "GET"
    expect:
      status: 200
      body_contains: "Milk"

  - id: "http-complete-item"
    http:
      url: "http://test-app.localhost:9006/todos/groceries/items/1/complete"
      method: "POST"
    expect:
      status: 200
      body_json:
        - path: "$.done"
          equals: true
        - path: "$.title"
          equals: "Milk"

  - id: "http-different-instance"
    http:
      url: "http://test-app.localhost:9006/todos/harness-isolation-check-7f3a/items"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: []

  - id: "http-effect-text-response"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/todos/groceries/responses/text"
      method: "GET"
    expect:
      status: 200
      header_contains:
        Content-Type: "text/plain"
        Content-Language: "en"
      body_matches: "^effect-text-ok$"

  - id: "http-effect-binary-response"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/todos/groceries/responses/binary"
      method: "GET"
    expect:
      status: 200
      header_contains:
        Content-Type: "application/octet-stream"
      body_matches: "^effect-binary-ok$"

  - id: "http-effect-json-response"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/todos/groceries/responses/json"
      method: "GET"
    expect:
      status: 200
      header_contains:
        Content-Type: "application/json"
      body_json:
        - path: "$.kind"
          equals: "json"
        - path: "$.source"
          equals: "effect"

  - id: "http-effect-empty-response"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/todos/groceries/responses/empty"
      method: "DELETE"
    expect:
      status: 204
      body_matches: "^$"
