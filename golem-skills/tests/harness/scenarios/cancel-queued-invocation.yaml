name: "cancel-queued-invocation"
steps:
  - id: "create-project"
    create_project:
      name: test-app

  - id: "add-long-running-method"
    prompt:
      rust: >
        In the test-app project, add a new method called `run-forever` to the CounterAgent
        that takes no arguments and returns nothing. It should run an infinite loop that
        increments the counter and then sleeps for 100 milliseconds using
        std::thread::sleep(std::time::Duration::from_millis(100)). Make sure the project
        builds and deploys successfully.
      ts: >
        In the test-app project, add a new method called `runForever` to the CounterAgent
        that takes no arguments and returns nothing. It should run an infinite loop that
        increments the counter value and then sleeps for 100 milliseconds (use a helper like
        function sleep(ms: number): Promise<void> { return new Promise(resolve => setTimeout(resolve, ms)); }
        and await sleep(100) inside a while(true) loop). Make sure the project builds
        and deploys successfully.
      scala: >
        In the test-app project, add a new method called `runForever` to the CounterAgent
        that takes no arguments and returns nothing (Unit). It should run an infinite loop
        that increments the counter value and then sleeps for 100 milliseconds using
        Thread.sleep(100). Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, add a new method called `run_forever` to the CounterAgent
        that takes no arguments and returns nothing (Unit). It should run an infinite loop
        that increments the counter value and then sleeps for 100 milliseconds using
        @monotonic_clock.subscribe_duration(100000000).block(). Make sure the project builds
        and deploys successfully.
    verify:
      build: true
      deploy: true

  - id: "trigger-long-running"
    trigger:
      agent: 'CounterAgent("c1")'
      method:
        rust: "run_forever"
        ts: "runForever"
        scala: "runForever"
        moonbit: "run_forever"

  - id: "wait-for-agent-to-start"
    sleep: 3

  - id: "enqueue-invocation"
    shell:
      command: "golem"
      args:
        rust: ["agent", "invoke", "--trigger", "--idempotency-key", "cancel-me", "CounterAgent(\"c1\")", "increment"]
        ts: ["agent", "invoke", "--trigger", "--idempotency-key", "cancel-me", "CounterAgent(\"c1\")", "increment"]
        scala: ["agent", "invoke", "--trigger", "--idempotency-key", "cancel-me", "CounterAgent(\"c1\")", "increment"]
        moonbit: ["agent", "invoke", "--trigger", "--idempotency-key", "cancel-me", "CounterAgent(\"c1\")", "increment"]
      cwd: "test-app"
    expect:
      exit_code: 0

  - id: "wait-for-enqueue"
    sleep: 2

  - id: "verify-pending"
    shell:
      command: "golem"
      args: ["agent", "get", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "Pending.*[1-9]"

  - id: "cancel-via-prompt"
    prompt: >
      Use the CLI to cancel the pending invocation on CounterAgent "c1" that has
      the idempotency key "cancel-me".
    expectedSkills:
      - "golem-cancel-queued-invocation"

  - id: "verify-canceled"
    shell:
      command: "golem"
      args: ["agent", "get", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_not_contains: "Pending invocation count: 1"

  - id: "cleanup"
    shell:
      command: "golem"
      args: ["agent", "delete", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
