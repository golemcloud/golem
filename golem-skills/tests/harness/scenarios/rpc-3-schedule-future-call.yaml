name: "rpc-3-schedule-future-call"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-delayed-recorder-agent"
    prompt:
      rust: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `record_count(value)` and
        `recorded_counts()`. `record_count` must append the received counter value to the
        recorder agent's durable state. `recorded_counts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `schedule_report`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `record_count` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `record_count` in `schedule_report`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `recordCount(value)` and
        `recordedCounts()`. `recordCount` must append the received counter value to the
        recorder agent's durable state. `recordedCounts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `scheduleReport`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `recordCount` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `recordCount` in `scheduleReport`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      scala: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `recordCount(value)` and
        `recordedCounts()`. `recordCount` must append the received counter value to the
        recorder agent's durable state. `recordedCounts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `scheduleReport`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `recordCount` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `recordCount` in `scheduleReport`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      moonbit: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `record_count(value)` and
        `recorded_counts()`. `record_count` must append the received counter value to the
        recorder agent's durable state. `recorded_counts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `schedule_report`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `record_count` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `record_count` in `schedule_report`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
    expectedSkills:
      rust:
        - "golem-schedule-future-call-rust"
      ts:
        - "golem-schedule-future-call-ts"
      scala:
        - "golem-schedule-future-call-scala"
      moonbit:
        - "golem-schedule-future-call-moonbit"
    verify:
      build: true
      deploy: true

  - id: "schedule-first-report"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method:
        rust: "schedule_report"
        ts: "scheduleReport"
        scala: "scheduleReport"
        moonbit: "schedule_report"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "recorder-empty-before-deadline"
    invoke_json:
      agent: 'DelayedRecorder("c1")'
      method:
        rust: "recorded_counts"
        ts: "recordedCounts"
        scala: "recordedCounts"
        moonbit: "recorded_counts"
    expect:
      result_json:
        - path: "$"
          equals: []

  - id: "wait-for-scheduled-call"
    sleep: 30

  - id: "recorder-updated-after-deadline"
    invoke_json:
      agent: 'DelayedRecorder("c1")'
      method:
        rust: "recorded_counts"
        ts: "recordedCounts"
        scala: "recordedCounts"
        moonbit: "recorded_counts"
    expect:
      result_json:
        - path: "$"
          equals:
            - 1
