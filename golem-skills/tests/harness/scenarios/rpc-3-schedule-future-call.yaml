name: "rpc-3-schedule-future-call"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-delayed-recorder-agent"
    prompt:
      rust: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `record_count(value)` and
        `recorded_counts()`. `record_count` must append the received counter value to the
        recorder agent's durable state. `recorded_counts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `schedule_report`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `record_count` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `record_count` in `schedule_report`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `recordCount(value)` and
        `recordedCounts()`. `recordCount` must append the received counter value to the
        recorder agent's durable state. `recordedCounts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `scheduleReport`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `recordCount` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `recordCount` in `scheduleReport`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      effect: >
        In the Effect-based test-app project, use Effect v4 and
        `@golemcloud/effect-golem`, not the Promise-based TypeScript SDK. The generated
        template initially declares the existing counter's `defineAgent` name as `Counter`
        and references that name under the local HTTP API deployment's `agents` map in
        `golem.yaml`. Change both names to exactly `CounterAgent` so the component metadata,
        HTTP API deployment, and cross-language scenario contract stay synchronized. Do not
        leave an HTTP API deployment entry for the old `Counter` agent type.

        Add a second durable agent type called `DelayedRecorder`, defined with `defineAgent`
        and the same string `constructorParams` field named `name` as the counter.
        `DelayedRecorder` must expose two externally invokable camelCase Effect methods:
        `recordCount` with one named numeric parameter `value`, and `recordedCounts` with no
        parameters. Keep the recorded numbers in durable snapshot state. `recordCount` must
        append `value`, and `recordedCounts` must return all recorded values in order.

        Then add an externally invokable `scheduleReport` Effect method to `CounterAgent`.
        It must increment the counter exactly like the existing `increment` method, obtain
        the typed `DelayedRecorder` client for `{ name }`, and schedule `recordCount` to run
        30 seconds in the future with the new counter value. Use the real Effect SDK API:
        `DelayedRecorderDefinition.client.get({ name })`, then
        `recorder.recordCount.schedule(scheduledAt, { value: newCount })`. Construct
        `scheduledAt` as `{ seconds: bigint, nanoseconds: number }`. Yield the client and
        scheduling Effects so submission completes, then return the new counter value
        immediately. Do not directly invoke `recordCount`, use a local timer, or await the
        scheduled method's eventual execution.

        Register the new implementation from `src/main.ts`, preserve all other manifest
        entries, and make sure the project builds and deploys successfully.
      scala: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `recordCount(value)` and
        `recordedCounts()`. `recordCount` must append the received counter value to the
        recorder agent's durable state. `recordedCounts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `scheduleReport`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `recordCount` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `recordCount` in `scheduleReport`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
      moonbit: >
        In the test-app project, add a second agent type called `DelayedRecorder` that has
        the same constructor parameter as the existing CounterAgent. `DelayedRecorder` must
        expose two externally invokable methods: `record_count(value)` and
        `recorded_counts()`. `record_count` must append the received counter value to the
        recorder agent's durable state. `recorded_counts` must return all recorded values
        in order.

        Then modify `CounterAgent` so it has a new externally invokable method called
        `schedule_report`. That method must increment the counter exactly like the existing
        `increment` method, then schedule `DelayedRecorder("<same name>")`'s
        `record_count` method to run 30 seconds in the future with the new counter value,
        and then return the new counter value immediately. Do not directly invoke or await
        `record_count` in `schedule_report`; the update to `DelayedRecorder` must happen
        only via the scheduled future call.

        Make sure the project builds successfully.
    expectedSkills:
      rust:
        - "golem-schedule-future-call-rust"
      ts:
        - "golem-schedule-future-call-ts"
      effect:
        - "golem-schedule-future-call-effect"
      scala:
        - "golem-schedule-future-call-scala"
      moonbit:
        - "golem-schedule-future-call-moonbit"
    verify:
      build: true
      deploy: true

  - id: "schedule-first-report"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method:
        rust: "schedule_report"
        ts: "scheduleReport"
        effect: "scheduleReport"
        scala: "scheduleReport"
        moonbit: "schedule_report"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "recorder-empty-before-deadline"
    invoke_json:
      agent: 'DelayedRecorder("c1")'
      method:
        rust: "recorded_counts"
        ts: "recordedCounts"
        effect: "recordedCounts"
        scala: "recordedCounts"
        moonbit: "recorded_counts"
    expect:
      result_json:
        - path: "$"
          equals: []

  - id: "wait-for-scheduled-call"
    sleep: 45

  - id: "recorder-updated-after-deadline"
    invoke_json:
      agent: 'DelayedRecorder("c1")'
      method:
        rust: "recorded_counts"
        ts: "recordedCounts"
        effect: "recordedCounts"
        scala: "recordedCounts"
        moonbit: "recorded_counts"
    expect:
      result_json:
        - path: "$"
          equals:
            - 1
