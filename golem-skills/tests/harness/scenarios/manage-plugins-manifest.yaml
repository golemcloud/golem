name: "manage-plugins-manifest"
languageAgnostic: true
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-otlp-plugin-via-manifest"
    prompt: >
      In the test-app project, add the built-in `golem-otlp-exporter` plugin to the default
      agent type (the one already defined in the project). Configure it in `golem.yaml` with
      these parameters:
        - endpoint: `http://localhost:4318`
        - signals: `traces,logs`

      Use the plugin version `1.1.5`.

      Do not change any source code files. Only modify `golem.yaml`.
    expectedSkills:
      - "golem-manage-plugins"
    allowedExtraSkills:
      - "golem-edit-manifest"
    verify:
      build: true

  - id: "verify-plugin-name"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_contains: "golem-otlp-exporter"

  - id: "verify-plugin-endpoint"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*parameters:[\\s\\S]*endpoint:[\\s\\S]*http://localhost:4318[\\s\\S]*"

  - id: "verify-plugin-signals"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*signals:[\\s\\S]*traces,logs[\\s\\S]*"

  - id: "add-template-with-plugin"
    prompt: >
      In the test-app project, refactor the plugin configuration:

      1. Create a `componentTemplate` called `observability` that contains the
         `golem-otlp-exporter` plugin (version `1.1.5`) with parameter
         `endpoint` set to `http://otel-collector:4318` and `signals` set to
         `traces,logs,metrics`.

      2. Update the existing component to use the `observability` template
         (in addition to any templates it already uses).

      3. Remove the direct plugin installation from the agent definition so
         the plugin is inherited purely from the template.

      Do not change any source code files. Only modify `golem.yaml`.
    expectedSkills:
      - "golem-manage-plugins"
    allowedExtraSkills:
      - "golem-edit-manifest"
    verify:
      build: true

  - id: "verify-template-plugin"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*componentTemplates:[\\s\\S]*observability:[\\s\\S]*plugins:[\\s\\S]*golem-otlp-exporter[\\s\\S]*"

  - id: "verify-template-referenced"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*templates:[\\s\\S]*observability[\\s\\S]*"
