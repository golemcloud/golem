name: "add-postgres-rdbms"
semanticRequirements:
  effect:
    - The Effect implementation must resolve SqlClient.SqlClient from effect/unstable/sql and provide it with PgClient.layer; PgClient.make and adapter-specific service access are not substitutes.
prerequisites:
  services:
    - postgres
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "add-postgres-method"
    prompt:
      rust: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_postgres` that returns a string. Implement it using the Golem RDBMS PostgreSQL API.
        Hardcode the PostgreSQL connection string `{{postgres_url}}`, open a connection, run
        `SELECT 'postgres-ok'::text`, read the first row and first column, and return that string.
        Keep the existing increment method unchanged. The method must return a plain string, not a
        result type. Make sure the project builds and deploys successfully.
      ts: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkPostgres` that returns a string. Implement it using the Golem RDBMS PostgreSQL API.
        Hardcode the PostgreSQL connection string `{{postgres_url}}`, open a connection, run
        `SELECT 'postgres-ok'::text`, read the first row and first column, and return that string.
        Keep the existing increment method unchanged. The method must return a plain string, not a
        result type. Make sure the project builds and deploys successfully.
      scala: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkPostgres` that returns a string. Implement it using the Golem RDBMS PostgreSQL API.
        Hardcode the PostgreSQL connection string `{{postgres_url}}`, open a connection, run
        `SELECT 'postgres-ok'::text`, read the first row and first column, and return that string.
        Keep the existing increment method unchanged. The method must return a plain string, not a
        result type. Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_postgres` that returns a string. Implement it using the Golem RDBMS PostgreSQL API.
        Hardcode the PostgreSQL connection string `{{postgres_url}}`, open a connection, run
        `SELECT 'postgres-ok'::text`, read the first row and first column, and return that string.
        Keep the existing increment method unchanged. The method must return a plain string, not a
        result type. Make sure the project builds and deploys successfully.
      effect: >
        In the Effect-based test-app project, modify the existing counter agent so it adds a new
        method called `checkPostgres`. The generated Effect template initially registers this agent
        as `Counter`; change its `defineAgent` name to exactly `CounterAgent` and update the matching
        agent key in `golem.yaml` so it can be invoked as `CounterAgent("db-test")` below. Declare
        `checkPostgres` in the methods map with `success: Schema.String`. Implement its handler as
        an Effect using `PgClient` from `@golemcloud/effect-golem/postgres`, not a native Node driver.
        Import `SqlClient` from `effect/unstable/sql`, hardcode `{{postgres_url}}` in a
        `PgClient.layer`, resolve `SqlClient.SqlClient` in the outer agent implementation Effect,
        and provide the adapter layer around that outer Effect so every handler closes over and
        reuses the canonical client. Do not call `PgClient.make` or resolve the adapter-specific
        service. Run `SELECT 'postgres-ok'::text`, use the statement's `.values` Effect to read row
        0, column 0, verify that cell is a string, and explicitly return that string. Keep the
        existing `increment` method unchanged and make sure the project builds and deploys
        successfully.
    expectedSkills:
      rust:
        - "golem-add-postgres-rust"
      ts:
        - "golem-add-postgres-ts"
      scala:
        - "golem-add-postgres-scala"
      moonbit:
        - "golem-add-postgres-moonbit"
      effect:
        - "golem-add-postgres-effect"
    verify:
      build: true
      deploy: true

  - id: "invoke-postgres-check"
    invoke_json:
      agent: 'CounterAgent("db-test")'
      method:
        rust: "check_postgres"
        ts: "checkPostgres"
        scala: "checkPostgres"
        moonbit: "check_postgres"
        effect: "checkPostgres"
    expect:
      result_json:
        - path: "$"
          equals: "postgres-ok"
