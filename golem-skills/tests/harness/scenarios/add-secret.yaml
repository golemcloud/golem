name: "add-secret"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-secret-agent"
    prompt:
      rust: &non-effect-add-secret-prompt >
        In the test-app project, add a new durable agent type called `SecureAgent`
        identified by a single constructor parameter for the instance name.

        SecureAgent must accept typed configuration with two fields:
        - `label` (string) — a regular (non-secret) config field
        - `apiKey` (string) — a secret field

        Use the agent config mechanism with Config<T> and Secret<T> to receive them.
        The `label` field should be a regular config value. The `apiKey` field should be
        marked as a secret.

        Expose a method called `get-info` that returns a record/object with two string
        fields: `label` and `api-key-prefix`. The `api-key-prefix` field should contain
        only the first 4 characters of the API key (for security — don't expose the full key).

        In `golem.yaml`:
        - Set a default config value for `label` to `"production"` under the agents section
        - Set a secret default for the `apiKey` field under `secretDefaults` for the `local`
          environment with value `"sk-test-key-12345"`

        Make sure the project builds and deploys successfully.
      ts: *non-effect-add-secret-prompt
      effect: >
        In the Effect-based test-app project, add a new durable agent type called `SecureAgent`,
        identified by a single string `constructorParams` field for the instance name.

        Declare typed configuration with a `defineConfig` service class and Effect Schema. It must
        contain `label` as a regular `Schema.String` field and `apiKey` as a secret field declared
        with `Schema.Redacted(Schema.String)`. Attach that config class to `defineAgent`; do not use
        a positional `Config<T>` constructor parameter or the plain TypeScript `Secret<T>` API.

        Expose an Effect-based method called `getInfo` that returns a `Schema.Struct` with two
        string fields, `label` and `apiKeyPrefix`. Inside the handler, yield the config service,
        evaluate the regular `label` field Effect, and evaluate `apiKey.get` to obtain a
        `Redacted.Redacted<string>`. Keep the full key redacted throughout Effect values and logs.
        Use `Redacted.value(apiKey)` only at the immediate transformation that takes the first four
        characters; return that prefix and never log or return the full plaintext key.

        In `golem.yaml`:
        - Set `agents.SecureAgent.config.label` to `"production"`.
        - Set `secretDefaults.local.apiKey` to `"sk-test-key-12345"`.

        Import the implementation module from `src/main.ts`. Make sure the project builds and
        deploys successfully.
      scala: *non-effect-add-secret-prompt
      moonbit: *non-effect-add-secret-prompt
    expectedSkills:
      rust:
        - "golem-add-secret-rust"
      ts:
        - "golem-add-secret-ts"
      effect:
        - "golem-add-secret-effect"
      scala:
        - "golem-add-secret-scala"
      moonbit:
        - "golem-add-secret-moonbit"
    verify:
      build: true
      deploy: true

  - id: "verify-golem-yaml-secret-defaults"
    shell:
      command: "cat"
      args: ["test-app/golem.yaml"]
    expect:
      stdout_matches: "[\\s\\S]*secretDefaults:[\\s\\S]*"

  - id: "verify-secret-metadata"
    shell:
      command: "golem"
      args: ["component", "get", "--format", "json"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "[\\s\\S]*\"source\"\\s*:\\s*\"Secret\"[\\s\\S]*\"source\"\\s*:\\s*\"Local\"[\\s\\S]*"

  - id: "invoke-get-info"
    invoke_json:
      agent: 'SecureAgent("s1")'
      method:
        rust: "get_info"
        ts: "getInfo"
        effect: "getInfo"
        scala: "getInfo"
        moonbit: "get_info"
    expect:
      rust:
        result_json:
          - path: "$.label"
            equals: "production"
          - path: "$.api_key_prefix"
            equals: "sk-t"
      ts:
        result_json:
          - path: "$.label"
            equals: "production"
          - path: "$.apiKeyPrefix"
            equals: "sk-t"
      effect:
        result_json:
          - path: "$.label"
            equals: "production"
          - path: "$.apiKeyPrefix"
            equals: "sk-t"
      scala:
        result_json:
          - path: "$.label"
            equals: "production"
          - path: "$.apiKeyPrefix"
            equals: "sk-t"
      moonbit:
        result_json:
          - path: "$.label"
            equals: "production"
          - path: "$.api_key_prefix"
            equals: "sk-t"
