name: "troubleshoot-manifest-trace"
languageAgnostic: true
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-env-vars"
    prompt: >
      In the test-app project, the application manifest to add environment variables
      `APP_MODE` set to `production` and `LOG_LEVEL` set to `info` under the
      existing component's `env` section. Do not change any source code files.
    expectedSkills:
      - "golem-add-env-vars"
    verify:
      build: true

  - id: "run-manifest-trace"
    prompt: >
      I added environment variables to golem.yaml but I'm not sure they are
      being applied correctly to the component. Help me debug the manifest file
      configuration — I need to see how the golem.yaml layers are resolved and
      which layer each env var comes from.
    expectedSkills:
      - "golem-troubleshoot-build"

  - id: "verify-manifest-trace-output"
    shell:
      command: "golem"
      args: ["component", "manifest-trace"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "[\\s\\S]*APP_MODE[\\s\\S]*production[\\s\\S]*"
