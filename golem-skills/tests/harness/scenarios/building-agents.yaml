name: "building-agents"
settings:
  timeout_per_subprompt: 300
steps:
  - id: "create-project"
    create_project:
      name: test-app

  - id: "build-project"
    prompt: "Build the test-app project."
    expectedSkills:
      - "golem-build"
    verify:
      expectedFiles:
        rust: ["test-app/golem-temp/agents/test_app_rust_main_debug.wasm"]
        ts: ["test-app/golem-temp/agents/test_app_ts_main.wasm"]
        scala: ["test-app/golem-temp/agents/test_app_scala_main.wasm"]
