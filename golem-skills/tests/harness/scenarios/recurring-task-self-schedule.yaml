name: "recurring-task-self-schedule"
settings:
  golem_server:
    custom_request_port: 9006
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-recurring-poller"
    prompt:
      rust: &non-effect-add-recurring-poller-prompt >
        In the test-app project, add a second durable agent type called `RecordingPoller`
        identified by a single name constructor parameter. Give it an HTTP mount under
        `/pollers/{name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

        `RecordingPoller` must have mutable state:
        - `poll_count` (u64, initially 0): how many times `poll` has executed
        - `running` (bool, initially false): whether the recurring loop is active

        It must expose these externally invokable methods:

        - `start` — sets `running` to true and immediately calls `poll`.

        - `poll` — if `running` is false, returns without doing anything. Otherwise,
          increments `poll_count` by 1. If `poll_count` is less than 4, it schedules
          itself (the same agent's `poll` method) to run again 5 seconds in the future.

        - `stop` — sets `running` to false so the next scheduled `poll` becomes a no-op.

        And these HTTP endpoints:

        - `GET /count` — returns `poll_count` as a JSON number.

        The self-scheduling must use the generated RPC client to schedule a future
        invocation on the same agent instance, not a direct function call. The agent
        schedules itself by getting a client for its own agent type and calling the
        schedule variant of the `poll` method with a future datetime.

        Make sure the project builds successfully.
      ts: *non-effect-add-recurring-poller-prompt
      effect: >
        In the Effect-based test-app project, add a second durable agent type called
        `RecordingPoller`, defined with `defineAgent` and identified by one string
        `constructorParams` field named `name`. Declare an HTTP mount at
        `/pollers/{name}` with the `Http` API from `@golemcloud/effect-golem`, and expose
        it through the app HTTP API on `test-app.localhost:9006`.

        Keep mutable logical state in an Effect `Ref`:
        - `pollCount` (number, initially 0): how many times `poll` has executed
        - `running` (boolean, initially false): whether the recurring loop is active

        Expose these externally invokable camelCase methods as Effect handlers:

        - `start` — sets `running` to true and immediately runs `poll`.

        - `poll` — if `running` is false, returns without doing anything. Otherwise,
          increments `pollCount` by 1. If `pollCount` is less than 4, it obtains a typed
          client for the same `RecordingPoller` identity and schedules that client's
          `poll` method to run again 5 seconds in the future.

        - `stop` — sets `running` to false so the next scheduled `poll` becomes a no-op.

        Add `GET /count` to a method that returns `pollCount` as a JSON number, using
        method-level `Http.get("/count")` metadata.

        Use the real Effect SDK self-scheduling API:
        `RecordingPollerDefinition.client.get({ name })`, followed by
        `self.poll.schedule(scheduledAt, {})`. Construct `scheduledAt` as
        `{ seconds: bigint, nanoseconds: number }` by yielding `DateTime.now` and
        converting it with `DateTime.toEpochMillis(...)`. The future poll must be
        submitted through this typed client, not through a direct local call, a sleeping
        fiber, or an invented TypeScript SDK helper.

        Implement all methods with Effect, import the implementation module from `src/main.ts`,
        preserve existing manifest entries, and make sure the project builds successfully.
      scala: *non-effect-add-recurring-poller-prompt
      moonbit: *non-effect-add-recurring-poller-prompt
    expectedSkills:
      rust:
        - "golem-recurring-task-rust"
      ts:
        - "golem-recurring-task-ts"
      effect:
        - "golem-recurring-task-effect"
      scala:
        - "golem-recurring-task-scala"
      moonbit:
        - "golem-recurring-task-moonbit"
    verify:
      build: true
      deploy: true

  - id: "start-poller"
    invoke:
      agent: 'RecordingPoller("p1")'
      method:
        rust: "start"
        ts: "start"
        effect: "start"
        scala: "start"
        moonbit: "start"

  - id: "verify-first-poll-ran"
    http:
      url: "http://test-app.localhost:9006/pollers/p1/count"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: 1

  - id: "wait-for-second-poll"
    sleep: 6

  - id: "wait-for-effect-scheduler-poll"
    sleep: 2
    only_if:
      language: "effect"

  - id: "verify-second-poll-ran"
    http:
      url: "http://test-app.localhost:9006/pollers/p1/count"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: 2

  - id: "stop-poller"
    invoke:
      agent: 'RecordingPoller("p1")'
      method:
        rust: "stop"
        ts: "stop"
        effect: "stop"
        scala: "stop"
        moonbit: "stop"

  - id: "wait-for-stopped-poll-to-fire"
    sleep: 6

  - id: "wait-for-stopped-effect-poll-to-fire"
    sleep: 2
    only_if:
      language: "effect"

  - id: "verify-count-unchanged-after-stop"
    http:
      url: "http://test-app.localhost:9006/pollers/p1/count"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: 2
