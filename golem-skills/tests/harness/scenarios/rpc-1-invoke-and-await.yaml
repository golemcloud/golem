name: "rpc-1-invoke-and-await"
semanticRequirements:
  effect:
    - GlobalRegistry private snapshot state must use Schema.Record; an array representation is not a substitute.
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-global-registry-and-rpc"
    prompt:
      rust: >
        In the test-app project, add a second agent type called `GlobalRegistry` that is a
        singleton (no constructor parameter / single global instance). It must expose two
        externally invokable methods: `register(name: String, count: u64) -> bool` and
        `get_all() -> Vec<RegistryEntry>`. Define a `RegistryEntry` struct with fields
        `name: String` and `count: u64`. `register` must store or update the name and count
        in agent state and return `true` if count < 5, `false` otherwise. `get_all` must
        return all stored entries.

        Then modify the existing `CounterAgent` so that every time `increment` is called it
        invokes the `GlobalRegistry` singleton's `register` method, passing the counter's
        own name and its new count value, and awaits the result. Change `increment` to
        return a `bool` — the value returned by `register`.

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second agent type called `GlobalRegistry` that is a
        singleton (no constructor parameter / single global instance). It must expose two
        externally invokable methods: `register(name: string, count: number): boolean` and
        `getAll(): RegistryEntry[]`. Define a `RegistryEntry` type with fields `name: string`
        and `count: number` (unsigned 64-bit integer). `register` must store or update the
        name and count in agent state and return `true` if count < 5, `false` otherwise.
        `getAll` must return all stored entries.

        Then modify the existing `CounterAgent` so that every time `increment` is called it
        invokes the `GlobalRegistry` singleton's `register` method, passing the counter's
        own name and its new count value, and awaits the result. Change `increment` to
        return a `boolean` — the value returned by `register`.

        Make sure the project builds successfully.
      effect: >
        In the Effect-based test-app project, add a second durable agent type called
        `GlobalRegistry` as a singleton with `constructorParams: {}`. Define an Effect Schema
        `RegistryEntry` with `name: Schema.String` and `count: Schema.Number`. Expose two typed
        Effect methods: `register` with named parameters `name` and `count` and
        `success: Schema.Boolean`, and `getAll` with no parameters and
        `success: Schema.Array(RegistryEntry)`. Use `Schema.Record(Schema.String, RegistryEntry)`
        for the private snapshot state and initialize it with `snapshot.init({})`. Upsert entries
        immutably by using `name` as the record key. `register` must return `true` when `count < 5`
        and `false` otherwise; `getAll` must return `Object.values` of the snapshot record so its
        public result remains the declared array schema.

        Modify the existing Effect `Counter` agent rather than creating a duplicate. Rename its
        exported TypeScript binding and its `defineAgent` runtime name to exactly `CounterAgent`,
        and update the matching `httpApi` agent key in `golem.yaml`. Preserve its constructor
        parameter and snapshot-backed count state. Change `increment` to
        `success: Schema.Boolean`. After incrementing, obtain the singleton through
        `GlobalRegistry.client.get({})`, invoke `register({ name, count })`, yield both client
        Effects, and return the awaited boolean result. Handle or convert typed RPC client errors
        so the no-error `increment` contract type-checks; do not use Promise-based TypeScript SDK
        APIs or invent an SDK helper.

        Import every implementation module from `src/main.ts`. Make sure the project builds
        successfully.
      scala: >
        In the test-app project, add a second agent type called `GlobalRegistry` that is a
        singleton (no constructor parameter / single global instance). It must expose two
        externally invokable methods: `register(name: String, count: Long): Future[Boolean]`
        and `getAll(): Future[List[RegistryEntry]]`. Define a `RegistryEntry` case class with
        fields `name: String` and `count: Long`. `register` must store or update the name
        and count in agent state and return `true` if count < 5, `false` otherwise. `getAll`
        must return all stored entries.

        Then modify the existing `CounterAgent` so that every time `increment` is called it
        invokes the `GlobalRegistry` singleton's `register` method, passing the counter's
        own name and its new count value, and awaits the result. Change `increment` to
        return a `Future[Boolean]` — the value returned by `register`.

        Make sure the project builds successfully.
      moonbit: >
        In the test-app project, add a second agent type called `GlobalRegistry` that is a
        singleton (no constructor parameter / single global instance). It must expose two
        externally invokable methods: `register(name: String, count: UInt64) -> Bool` and
        `get_all() -> Array[RegistryEntry]`. Define a `RegistryEntry` struct with fields
        `name: String` and `count: UInt64`. `register` must store or update the name and
        count in agent state and return `true` if count < 5, `false` otherwise. `get_all`
        must return all stored entries.

        Then modify the existing `CounterAgent` so that every time `increment` is called it
        invokes the `GlobalRegistry` singleton's `register` method, passing the counter's
        own name and its new count value, and awaits the result. Change `increment` to
        return a `Bool` — the value returned by `register`.

        Make sure the project builds successfully.
    expectedSkills:
      rust:
        - "golem-call-another-agent-rust"
      ts:
        - "golem-call-another-agent-ts"
      effect:
        - "golem-call-another-agent-effect"
      scala:
        - "golem-call-another-agent-scala"
      moonbit:
        - "golem-call-another-agent-moonbit"
    verify:
      build: true
      deploy: true

  - id: "c1-increment-1"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: true

  - id: "c1-increment-2"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: true

  - id: "c1-increment-3"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: true

  - id: "c1-increment-4"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: true

  - id: "c1-increment-5"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: false

  - id: "c1-increment-6"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: false

  - id: "c2-increment-1"
    invoke_json:
      agent: 'CounterAgent("c2")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: true

  - id: "get-all-registry"
    invoke_json:
      agent: "GlobalRegistry()"
      method:
        rust: "get_all"
        ts: "getAll"
        effect: "getAll"
        scala: "getAll"
        moonbit: "get_all"
    expect:
      result_json:
        - path: "$"
          equals_unordered:
            - name: "c1"
              count: 6
            - name: "c2"
              count: 1
