name: "atomic-block"
semanticRequirements:
  effect:
    - Every side effect specified as HTTP must be performed through Effect HttpClient; typed agent RPC is not a substitute.
settings:
  golem_server:
    custom_request_port: 9006
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-atomic-region-test"
    prompt:
      rust: >
        In the test-app project, add a second durable agent type called `SideEffectRecorder`
        identified by a single name constructor parameter. Give it an HTTP mount under
        `/recorder/{name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

        `SideEffectRecorder` must expose these HTTP endpoints:
        - `POST /record` accepts a plain text body string and appends it to an internal event list
        - `GET /events` returns the event list as a JSON array of strings
        - `POST /decide` returns `true` the first time it is called and `false` on every subsequent
          call, tracking the call count in agent state

        New recorder agents must start with an empty event list and a call count of zero.

        Then modify the existing `CounterAgent` to add a new externally invokable method named
        `run_atomic_test`. It must take no parameters and return nothing.

        Implement that method as follows. Use the language's atomic block API from the SDK to
        wrap the first group of operations:

        Inside the atomic block:
        1. HTTP POST `"a"` to `http://test-app.localhost:9006/recorder/main/record`
        2. HTTP POST `"b"` to `http://test-app.localhost:9006/recorder/main/record`
        3. HTTP POST to `http://test-app.localhost:9006/recorder/main/decide` and read the boolean
           response. If the response is `true`, panic / throw / crash the agent.
        4. HTTP POST `"c"` to `http://test-app.localhost:9006/recorder/main/record`

        After the atomic block:
        5. HTTP POST `"d"` to `http://test-app.localhost:9006/recorder/main/record`

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second durable agent type called `SideEffectRecorder`
        identified by a single name constructor parameter. Give it an HTTP mount under
        `/recorder/{name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

        `SideEffectRecorder` must expose these HTTP endpoints:
        - `POST /record` accepts a plain text body string and appends it to an internal event list
        - `GET /events` returns the event list as a JSON array of strings
        - `POST /decide` returns `true` the first time it is called and `false` on every subsequent
          call, tracking the call count in agent state

        New recorder agents must start with an empty event list and a call count of zero.

        Then modify the existing `CounterAgent` to add a new externally invokable method named
        `runAtomicTest`. It must take no parameters and return nothing.

        Implement that method as follows. Use the language's atomic block API from the SDK to
        wrap the first group of operations:

        Inside the atomic block:
        1. HTTP POST `"a"` to `http://test-app.localhost:9006/recorder/main/record`
        2. HTTP POST `"b"` to `http://test-app.localhost:9006/recorder/main/record`
        3. HTTP POST to `http://test-app.localhost:9006/recorder/main/decide` and read the boolean
           response. If the response is `true`, panic / throw / crash the agent.
        4. HTTP POST `"c"` to `http://test-app.localhost:9006/recorder/main/record`

        After the atomic block:
        5. HTTP POST `"d"` to `http://test-app.localhost:9006/recorder/main/record`

        Make sure the project builds successfully.
      effect: >
        In the Effect-based test-app project, add a second durable agent type called
        `SideEffectRecorder` with one `constructorParams` string named `name`. Declare its HTTP
        mount as `/recorder/{name}` with the `Http` API from `@golemcloud/effect-golem`, and expose
        it through the app HTTP API on `test-app.localhost:9006`.

        Store snapshot-backed Effect state containing `events`, an array of strings, and a numeric
        `decisionCalls` count. New recorder agents start with an empty event list and zero decision
        calls. Expose these methods with method-level HTTP declarations:
        - `record` has one `Schema.String` parameter named `event`; `POST /record` accepts the normal
          JSON body `{ "event": "<value>" }` and appends `event` to `events`
        - `getEvents` has no parameters; `GET /events` returns `events` as a JSON array of strings
        - `decide` has no parameters; `POST /decide` increments `decisionCalls` and returns `true`
          only for the first call, then returns `false` for every later call

        Then modify the existing Effect `Counter` agent definition rather than creating a
        duplicate. Rename both its exported TypeScript binding and its `defineAgent` runtime `name`
        to exactly `CounterAgent`, and update the matching `httpApi` deployment agent key in
        `golem.yaml`. Preserve its existing methods and implementation-module import.

        Add an externally invokable `runAtomicTest` method with no parameters and
        `success: Schema.Void`. Implement it as an Effect using `Durability.atomically` from
        `@golemcloud/effect-golem`. Implement every recorder operation as an actual outgoing HTTP
        request through `HttpClient`, `HttpClientRequest`, and `HttpClientResponse` from
        `effect/unstable/http` to the routes under
        `http://test-app.localhost:9006/recorder/main`. Send record values with
        `HttpClientRequest.bodyJson({ event })`, execute and await every request, require a
        successful status with `HttpClientResponse.filterStatusOk`, and decode `/decide` as a JSON
        boolean with the Effect response schema helper. Provide `FetchHttpClient.layer` around the
        composed handler Effect. Do not obtain a `SideEffectRecorder` typed client or substitute
        typed agent RPC, direct fetch, Node networking, stubs, manual retries, or polling for any
        recorder operation.

        Inside the Effect passed to `Durability.atomically`, POST record event `"a"`, then POST
        record event `"b"`, then POST to `/decide` and read its boolean response. When that response
        is `true`, fail the atomic Effect so `Durability.atomically` traps and durable recovery
        re-executes the complete region. Do not catch or convert that failure outside the atomic
        region. After recovery obtains `false` from `/decide`, POST record event `"c"` and let the
        atomic Effect complete. After `Durability.atomically` succeeds, POST record event `"d"`.
        The expected external event sequence is exactly `a, b, a, b, c, d`; the repeated `a, b`
        pair must come from host-driven whole-region recovery, not an application retry loop or a
        second `runAtomicTest` invocation.

        Import both agent implementation modules from `src/main.ts` and preserve existing manifest
        entries. Make sure the project builds and deploys successfully. Limit your own validation to
        build and deploy: do not invoke `runAtomicTest` and do not call any
        `/recorder/main` endpoint, because the harness performs this state-changing sequence once
        after this prompt.
      scala: >
        In the test-app project, add a second durable agent type called `SideEffectRecorder`
        identified by a single name constructor parameter. Give it an HTTP mount under
        `/recorder/{name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

