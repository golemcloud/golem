name: "add-ignite-rdbms"
prerequisites:
  services:
    - ignite
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "add-ignite-method"
    prompt:
      rust: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_ignite` that returns a string. Implement it using the Golem RDBMS Ignite API.
        Hardcode the Ignite connection string `{{ignite_url}}`, open a connection, run
        `SELECT 'ignite-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      ts: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkIgnite` that returns a string. Implement it using the Golem RDBMS Ignite API.
        Hardcode the Ignite connection string `{{ignite_url}}`, open a connection, run
        `SELECT 'ignite-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      scala: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkIgnite` that returns a string. Implement it using the Golem RDBMS Ignite API.
        Hardcode the Ignite connection string `{{ignite_url}}`, open a connection, run
        `SELECT 'ignite-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_ignite` that returns a string. Implement it using the Golem RDBMS Ignite API.
        Hardcode the Ignite connection string `{{ignite_url}}`, open a connection, run
        `SELECT 'ignite-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      effect: >
        In the Effect-based test-app project, modify the existing counter agent so it adds a new
        method called `checkIgnite`. The generated Effect template initially registers this agent
        as `Counter`; change its `defineAgent` name to exactly `CounterAgent` and update the matching
        agent key in `golem.yaml` so the agent can be invoked as `CounterAgent("db-test")` below.
        Declare `checkIgnite` in the methods map with `success: Schema.String` and implement its
        handler as an Effect using `IgniteClient` from `@golemcloud/effect-golem/ignite2`, not a
        native Node driver. Hardcode `{{ignite_url}}`, create and reuse the client in the outer
        agent implementation Effect, run `SELECT 'ignite-ok'`, use the statement's `.values`
        Effect to read row 0, column 0, verify that cell is a string, and return that string. Keep
        the existing `increment` method unchanged and make sure the project builds and deploys.
    expectedSkills:
      rust:
        - "golem-add-ignite-rust"
      ts:
        - "golem-add-ignite-ts"
      moonbit:
        - "golem-add-ignite-moonbit"
      scala:
        - "golem-add-ignite-scala"
      effect:
        - "golem-add-ignite-effect"
    verify:
      build: true
      deploy: true

  - id: "invoke-ignite-check"
    invoke_json:
      agent: 'CounterAgent("db-test")'
      method:
        rust: "check_ignite"
        ts: "checkIgnite"
        moonbit: "check_ignite"
        scala: "checkIgnite"
        effect: "checkIgnite"
    expect:
      result_json:
        - path: "$"
          equals: "ignite-ok"
