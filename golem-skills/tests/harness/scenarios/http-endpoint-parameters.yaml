name: "http-endpoint-parameters"
semanticRequirements:
  effect:
    - The Effect scenario must send repeated query instances and repeated raw header fields and verify they bind in arrival order to collection schemas; comma-joined substitutes are not acceptable.
    - The repeated collection endpoint must return an ordinary Schema.Struct JSON result; unstructured responses, manual JSON serialization, and byte encoding are not substitutes.
    - The Effect scenario must verify the existing structured 400 contract for missing, malformed, repeated-scalar, and unparsable-collection request values, including JSON content type, stable error code, and exactly one relevant error message.
settings:
  golem_server:
    custom_request_port: 9006
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-catalog-agent"
    prompt:
      rust: &non-effect-add-catalog-agent-prompt >
        In the test-app project, add a new durable agent type called `CatalogAgent` identified by
        a single constructor parameter for the catalog name. Give it an HTTP mount under
        `/catalogs/{catalog-name}` and make sure it is exposed through the app HTTP API on
        `test-app.localhost:9006`.

        CatalogAgent must store a list of products in agent state. Each product has the following
        fields: `id` (string), `name` (string), `price` (f64 / number / Double), and `inStock`
        (boolean). Use a record, object type, or case class named `Product` for this.

        Expose these HTTP endpoints:

        1. `POST /products` — accepts `name` (string), `price` (number), and `inStock` (boolean)
           as JSON body fields. Creates a new Product with an auto-generated sequential id
           (starting from "1"), stores it, and returns the created product as JSON.

        2. `GET /products/{product-id}` — returns the product with the given id as JSON, or 404
           if not found. Use `Option` / `undefined` / `Option` return type.

        3. `GET /products/search?q={query}&min-price={minPrice}&in-stock-only={inStockOnly}` —
           searches products. `query` filters by name (substring match, case-insensitive).
           `minPrice` is an optional f64/number/Double that filters products with price >= that
           value. `inStockOnly` is an optional boolean that when true only returns in-stock
           products. Return the matching products as a JSON array.

        4. `PUT /products/{product-id}` — accepts `name` (string), `price` (number), and
           `inStock` (boolean) as JSON body fields. Updates the product with the given id and
           returns the updated product, or 404 if not found. The id comes from the path, the
           other fields from the body.

        5. `DELETE /products/{product-id}` — deletes the product with the given id. Returns 204
           (no content / unit) on success.

        6. `POST /products/batch` — accepts a JSON body with a single field `products` which is
           an array/list/vector of objects, each having `name` (string), `price` (number), and
           `inStock` (boolean). Creates all of them with sequential ids continuing from the
           current count, stores them, and returns the created products as a JSON array.

        Make sure the project builds and deploys successfully.
      ts: *non-effect-add-catalog-agent-prompt
      effect: >
        In the Effect-based test-app project, add a durable `CatalogAgent` with one
        `constructorParams` string named `catalogName`. Mount it with
        `Http.mount("/catalogs/{catalogName}")` from `@golemcloud/effect-golem` and expose it on
        `test-app.localhost:9006`. Store products durably with Effect state and snapshot APIs.

        Make changes only inside the generated `test-app`. Do not modify dependencies, linked SDK
        source or build outputs, Effect-Golem, the Golem host, or WIT. The documented optional
        scalar and repeated collection query/header binding capabilities already exist; use those
        supported schemas directly rather than patching or replacing their implementation.
        Build and deploy to verify the app, but do not call any HTTP endpoint after deployment; the
        harness owns all runtime requests and its durable test state must remain untouched.

        Define a `Product` Effect Schema with `id` and `name` strings, `price` as `Schema.Number`,
        and `inStock` as `Schema.Boolean`. Expose Effect methods and `Http` routes for:

        1. `POST /products`, with unbound camelCase JSON fields `name`, `price`, and `inStock`,
           creating and returning a product with a sequential id starting from "1".
        2. `GET /products/{productId}`, binding `productId` from the path and returning
           `Schema.NullOr(Product)`; return `null` when missing so the HTTP response is 404.
        3. `GET /products/search?q={query}&min-price={minPrice}&in-stock-only={inStockOnly}`,
           binding all parameters from the query. Declare `minPrice` and `inStockOnly` with
           `Schema.NullOr(...)` so omitted values decode to `null`. Apply the requested
           case-insensitive name, minimum-price, and in-stock filters.
        4. `PUT /products/{productId}`, binding only `productId` from the path and taking `name`,
           `price`, and `inStock` from the JSON body. Return `Schema.NullOr(Product)` and `null`
           when missing.
        5. `DELETE /products/{productId}`, returning `Schema.Void` / `Effect.void` for HTTP 204.
        6. `POST /products/batch`, taking one unbound `products` parameter containing an array of
           input objects and returning the created `Product` array.

        Also add `GET /bindings/collections?tag={tags}&score={scores}`. Declare `tags` as
        `Schema.Array(Schema.String)` and `scores` as `Schema.Array(Schema.Number)`. Bind repeated
        raw `X-Trace-Id` header fields to `traceIds: Schema.Array(Schema.String)` and repeated raw
        `X-Weight` header fields to `weights: Schema.Array(Schema.Number)` through endpoint header
        mappings. Return an ordinary JSON struct containing exactly `{ tags, scores, traceIds,
        weights }`. Do not split comma-joined values; each collection element must come from a
        distinct query instance or raw header field, preserving arrival order.
        Declare the success schema with `Schema.Struct`; do not use `Unstructured` responses,
        `JSON.stringify`, manual UTF-8 encoding, or response bytes for this endpoint.

        Implement every handler as an Effect, import the module from `src/main.ts`, preserve
        existing manifest entries, and make sure the project builds and deploys successfully.
      scala: *non-effect-add-catalog-agent-prompt
      moonbit: *non-effect-add-catalog-agent-prompt
    expectedSkills:
      rust:
        - "golem-add-http-endpoint-rust"
      ts:
        - "golem-add-http-endpoint-ts"
      effect:
        - "golem-add-http-endpoint-effect"
        - "golem-http-params-effect"
      scala:
        - "golem-add-http-endpoint-scala"
      moonbit:
        - "golem-add-http-endpoint-moonbit"
    verify:
      build: true
      deploy: true

  # --- POST body mapping: multiple typed fields ---
  # Rust uses snake_case parameter names in JSON body; TS/Scala use camelCase
  - id: "create-product-1"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"name":"Laptop","price":999.99,"in_stock":true}'
        ts: '{"name":"Laptop","price":999.99,"inStock":true}'
        effect: '{"name":"Laptop","price":999.99,"inStock":true}'
        scala: '{"name":"Laptop","price":999.99,"inStock":true}'
        moonbit: '{"name":"Laptop","price":999.99,"in_stock":true}'
    expect:
      rust:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Laptop"
          - path: "$.price"
            equals: 999.99
          - path: "$.in_stock"
            equals: true
      ts:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Laptop"
          - path: "$.price"
            equals: 999.99
          - path: "$.inStock"
            equals: true
      effect:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Laptop"
          - path: "$.price"
            equals: 999.99
          - path: "$.inStock"
            equals: true
      scala:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Laptop"
          - path: "$.price"
            equals: 999.99
          - path: "$.inStock"
            equals: true
      moonbit:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Laptop"
          - path: "$.price"
            equals: 999.99
          - path: "$.in_stock"
            equals: true

  - id: "create-product-2"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"name":"Mouse","price":25.50,"in_stock":true}'
        ts: '{"name":"Mouse","price":25.50,"inStock":true}'
        effect: '{"name":"Mouse","price":25.50,"inStock":true}'
        scala: '{"name":"Mouse","price":25.50,"inStock":true}'
        moonbit: '{"name":"Mouse","price":25.50,"in_stock":true}'
    expect:
      status: 200
      body_json:
        - path: "$.name"
          equals: "Mouse"

  - id: "create-product-3"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"name":"Keyboard","price":75.00,"in_stock":false}'
        ts: '{"name":"Keyboard","price":75.00,"inStock":false}'
        effect: '{"name":"Keyboard","price":75.00,"inStock":false}'
        scala: '{"name":"Keyboard","price":75.00,"inStock":false}'
        moonbit: '{"name":"Keyboard","price":75.00,"in_stock":false}'
    expect:
      rust:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Keyboard"
          - path: "$.in_stock"
            equals: false
      ts:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Keyboard"
          - path: "$.inStock"
            equals: false
      effect:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Keyboard"
          - path: "$.inStock"
            equals: false
      scala:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Keyboard"
          - path: "$.inStock"
            equals: false
      moonbit:
        status: 200
        body_json:
          - path: "$.name"
            equals: "Keyboard"
          - path: "$.in_stock"
            equals: false

  # --- Path variable mapping on GET ---
  - id: "get-product-by-id"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/1"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$.id"
          equals: "1"
        - path: "$.name"
          equals: "Laptop"
        - path: "$.price"
          equals: 999.99

  # --- Option/undefined return → 404 ---
  - id: "get-product-not-found"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/999"
      method: "GET"
    expect:
      status: 404

  # --- Query parameter mapping: string + optional number + optional boolean ---
  - id: "search-by-name"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=lap"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$[0].name"
          equals: "Laptop"

  - id: "search-with-min-price"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=&min-price=50"
      method: "GET"
    expect:
      status: 200
      body_contains: "Laptop"

  - id: "search-with-min-price-excludes-cheap"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=mouse&min-price=50"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: []

  - id: "search-in-stock-only"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=&in-stock-only=true"
      method: "GET"
    expect:
      status: 200
      body_contains: "Laptop"

  - id: "search-in-stock-only-excludes-keyboard"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=keyboard&in-stock-only=true"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: []

  - id: "search-combined-filters"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=&min-price=50&in-stock-only=true"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$[0].name"
          equals: "Laptop"

  # --- PUT: path variable + body fields mixed ---
  - id: "update-product"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/2"
      method: "PUT"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"name":"Gaming Mouse","price":49.99,"in_stock":true}'
        ts: '{"name":"Gaming Mouse","price":49.99,"inStock":true}'
        effect: '{"name":"Gaming Mouse","price":49.99,"inStock":true}'
        scala: '{"name":"Gaming Mouse","price":49.99,"inStock":true}'
        moonbit: '{"name":"Gaming Mouse","price":49.99,"in_stock":true}'
    expect:
      status: 200
      body_json:
        - path: "$.name"
          equals: "Gaming Mouse"
        - path: "$.price"
          equals: 49.99

  - id: "verify-update-persisted"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/2"
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$.name"
          equals: "Gaming Mouse"
        - path: "$.price"
          equals: 49.99

  # --- PUT on nonexistent product → 404 ---
  - id: "update-product-not-found"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/999"
      method: "PUT"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"name":"Ghost","price":0,"in_stock":false}'
        ts: '{"name":"Ghost","price":0,"inStock":false}'
        effect: '{"name":"Ghost","price":0,"inStock":false}'
        scala: '{"name":"Ghost","price":0,"inStock":false}'
        moonbit: '{"name":"Ghost","price":0,"in_stock":false}'
    expect:
      status: 404

  # --- DELETE: path variable, unit/void return → 204 ---
  - id: "delete-product"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/3"
      method: "DELETE"
    expect:
      status: 204

  - id: "verify-delete"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/3"
      method: "GET"
    expect:
      status: 404

  # --- POST with complex body (array of objects) ---
  - id: "batch-create"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/batch"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body:
        rust: '{"products":[{"name":"Monitor","price":299.99,"in_stock":true},{"name":"Webcam","price":59.99,"in_stock":false}]}'
        ts: '{"products":[{"name":"Monitor","price":299.99,"inStock":true},{"name":"Webcam","price":59.99,"inStock":false}]}'
        effect: '{"products":[{"name":"Monitor","price":299.99,"inStock":true},{"name":"Webcam","price":59.99,"inStock":false}]}'
        scala: '{"products":[{"name":"Monitor","price":299.99,"inStock":true},{"name":"Webcam","price":59.99,"inStock":false}]}'
        moonbit: '{"products":[{"name":"Monitor","price":299.99,"in_stock":true},{"name":"Webcam","price":59.99,"in_stock":false}]}'
    expect:
      status: 200
      body_contains: "Monitor"

  - id: "verify-batch-products-exist"
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q="
      method: "GET"
    expect:
      status: 200
      body_contains: "Webcam"

  # --- Different agent instance (mount path variable as constructor param) ---
  - id: "different-catalog-instance"
    http:
      url: "http://test-app.localhost:9006/catalogs/books/products/search?q="
      method: "GET"
    expect:
      status: 200
      body_json:
        - path: "$"
          equals: []

  - id: "effect-repeated-query-and-raw-headers"
    only_if:
      language: effect
    shell:
      command: "node"
      args:
        - "-e"
        - >-
          const { execFileSync } = require("node:child_process");
          const actual = JSON.parse(execFileSync("curl", [
            "--silent", "--show-error",
            "--header", "X-Trace-Id: first",
            "--header", "X-Trace-Id: second",
            "--header", "X-Trace-Id: first",
            "--header", "X-Weight: 10",
            "--header", "X-Weight: 20",
            "--header", "X-Weight: 10",
            "http://test-app.localhost:9006/catalogs/electronics/bindings/collections?tag=red&tag=blue&tag=red&score=1&score=2&score=1"
          ], { encoding: "utf8" }));
          const expected = {
            tags: ["red", "blue", "red"],
            scores: [1, 2, 1],
            traceIds: ["first", "second", "first"],
            weights: [10, 20, 10]
          };
          for (const key of Object.keys(expected)) {
            if (JSON.stringify(actual[key]) !== JSON.stringify(expected[key])) {
              throw new Error(`${key}: expected ${JSON.stringify(expected[key])}, got ${JSON.stringify(actual[key])}`);
            }
          }
          console.log("collections-ok");
    expect:
      exit_code: 0
      stdout_contains: "collections-ok"

  - id: "effect-missing-required-query-is-structured-400"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search"
      method: "GET"
    expect:
      status: 400
      header_contains:
        Content-Type: "application/json"
      body_json:
        - path: "$.code"
          equals: "REQUEST_MISSING_VALUE"
        - path: "$.errors.length"
          equals: 1
        - path: "$.errors[0]"
          contains: "Expected single value values to be provided, but found none"

  - id: "effect-malformed-scalar-query-is-structured-400"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=mouse&min-price=not-a-number"
      method: "GET"
    expect:
      status: 400
      header_contains:
        Content-Type: "application/json"
      body_json:
        - path: "$.code"
          equals: "REQUEST_VALUE_PARSING_FAILED"
        - path: "$.errors.length"
          equals: 1
        - path: "$.errors[0]"
          contains: "Failed parsing value; Provided: not-a-number; Expected type: f64"

  - id: "effect-repeated-scalar-query-is-structured-400"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/products/search?q=mouse&q=laptop"
      method: "GET"
    expect:
      status: 400
      header_contains:
        Content-Type: "application/json"
      body_json:
        - path: "$.code"
          equals: "REQUEST_TOO_MANY_VALUES"
        - path: "$.errors.length"
          equals: 1
        - path: "$.errors[0]"
          contains: "Expected single value values to be provided, but found too many"

  - id: "effect-unparsable-collection-item-is-structured-400"
    only_if:
      language: effect
    http:
      url: "http://test-app.localhost:9006/catalogs/electronics/bindings/collections?tag=alpha&score=1"
      method: "GET"
      headers:
        X-Trace-Id: "trace"
        X-Weight: "not-a-number"
    expect:
      status: 400
      header_contains:
        Content-Type: "application/json"
      body_json:
        - path: "$.code"
          equals: "REQUEST_VALUE_PARSING_FAILED"
        - path: "$.errors.length"
          equals: 1
        - path: "$.errors[0]"
          contains: "Failed parsing value; Provided: not-a-number; Expected type: f64"
