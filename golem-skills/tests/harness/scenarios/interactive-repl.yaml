name: "interactive-repl"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "invoke-via-repl-script"
    prompt:
      rust: &non-effect-repl-script-prompt >
        I want to test my CounterAgent using a REPL script. Write a script file in the
        test-app directory that gets a CounterAgent instance named "c1", calls increment
        twice, then run it with golem repl in script mode.
      ts: *non-effect-repl-script-prompt
      effect: >
        I want to test the `Counter` agent in the Effect-based test-app project using Golem's
        TypeScript REPL binding. Write a TypeScript script file in the test-app directory that
        gets the agent instance named "c1" with `Counter.get("c1")`, calls `increment` twice,
        then run it with `golem repl` in script mode.
      scala: *non-effect-repl-script-prompt
      moonbit: *non-effect-repl-script-prompt
    expectedSkills:
      rust:
        - "golem-interactive-repl-rust"
      ts:
        - "golem-interactive-repl-ts"
      effect:
        - "golem-interactive-repl-effect"
      scala:
        - "golem-interactive-repl-scala"
      moonbit:
        - "golem-interactive-repl-moonbit"

  - id: "verify-counter-incremented"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      rust: &non-effect-counter-incremented-expect
        result_json:
          - path: "$"
            equals: 3
      ts: *non-effect-counter-incremented-expect
      effect: {}
      scala: *non-effect-counter-incremented-expect
      moonbit: *non-effect-counter-incremented-expect

  - id: "verify-effect-counter-incremented"
    only_if:
      language: "effect"
    invoke_json:
      agent: 'Counter("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 3
