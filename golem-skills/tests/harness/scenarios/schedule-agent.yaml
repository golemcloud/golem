name: "schedule-agent"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "schedule-via-agent"
    prompt: >
      I have the test-app project deployed with a CounterAgent that has a string constructor
      parameter (the counter name) and an increment method. Use the CLI to schedule an
      invocation of the increment method for a counter named "c1" to run 15 seconds from now.
    expectedSkills:
      rust:
        - "golem-schedule-agent-rust"
      ts:
        - "golem-schedule-agent-ts"
      scala:
        - "golem-schedule-agent-scala"

  - id: "invoke-before-schedule"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "wait-for-scheduled-call"
    sleep: 15

  - id: "invoke-after-schedule"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 3
