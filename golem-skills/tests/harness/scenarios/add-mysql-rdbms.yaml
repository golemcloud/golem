name: "add-mysql-rdbms"
prerequisites:
  services:
    - mysql
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "add-mysql-method"
    prompt:
      rust: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_mysql` that returns a string. Implement it using the Golem RDBMS MySQL API.
        Hardcode the MySQL connection string `{{mysql_url}}`, open a connection, run
        `SELECT 'mysql-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      ts: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkMysql` that returns a string. Implement it using the Golem RDBMS MySQL API.
        Hardcode the MySQL connection string `{{mysql_url}}`, open a connection, run
        `SELECT 'mysql-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      scala: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `checkMysql` that returns a string. Implement it using the Golem RDBMS MySQL API.
        Hardcode the MySQL connection string `{{mysql_url}}`, open a connection, run
        `SELECT 'mysql-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, modify the existing CounterAgent so it adds a new method called
        `check_mysql` that returns a string. Implement it using the Golem RDBMS MySQL API.
        Hardcode the MySQL connection string `{{mysql_url}}`, open a connection, run
        `SELECT 'mysql-ok'`, read the first row and first column, and return that string. Keep the
        existing increment method unchanged. The method must return a plain string, not a result
        type. Make sure the project builds and deploys successfully.
      effect: >
        In the Effect-based test-app project, modify the existing counter agent so it adds a new
        method called `checkMysql`. The generated Effect template initially registers this agent
        as `Counter`; change its `defineAgent` name to exactly `CounterAgent` and update the matching
        agent key in `golem.yaml` so it can be invoked as `CounterAgent("db-test")` below. Declare
        `checkMysql` in the methods map with `success: Schema.String`. Implement its handler as an
        Effect using `MySqlClient` from `@golemcloud/effect-golem/mysql`, not a native Node driver.
        Hardcode `{{mysql_url}}`, create and reuse the client in the outer agent implementation
        Effect, run `SELECT 'mysql-ok'`, use the statement's `.values` Effect to read row 0, column
        0, verify that cell is a string, and explicitly return that string. Keep the existing
        `increment` method unchanged and make sure the project builds and deploys successfully.
    expectedSkills:
      rust:
        - "golem-add-mysql-rust"
      ts:
        - "golem-add-mysql-ts"
      scala:
        - "golem-add-mysql-scala"
      moonbit:
        - "golem-add-mysql-moonbit"
      effect:
        - "golem-add-mysql-effect"
    verify:
      build: true
      deploy: true

  - id: "invoke-mysql-check"
    invoke_json:
      agent: 'CounterAgent("db-test")'
      method:
        rust: "check_mysql"
        ts: "checkMysql"
        scala: "checkMysql"
        moonbit: "check_mysql"
        effect: "checkMysql"
    expect:
      result_json:
        - path: "$"
          equals: "mysql-ok"
