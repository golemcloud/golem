name: "add-secret-runtime"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-secret-agent"
    prompt:
      rust: >
        In the test-app project, add a new durable agent type called `KeyVaultAgent`
        identified by a single constructor parameter for the instance name.

        KeyVaultAgent must accept typed configuration with a single secret field:
        - `token` (string) — marked as a secret

        Use the agent config mechanism with Config<T> and Secret<T>.
        Pass the config via `#[agent_config]` constructor injection; do NOT call
        `Config::new()` manually inside the agent implementation.

        Expose a method called `get_token_length` that returns the length of the
        token string as a 32-bit signed integer.

        Do NOT set any secret defaults in golem.yaml — the secret will be managed
        entirely at runtime via the CLI.

        Make sure the project builds and deploys successfully.
      ts: >
        In the test-app project, add a new durable agent type called `KeyVaultAgent`
        identified by a single constructor parameter for the instance name.

        KeyVaultAgent must accept typed configuration with a single secret field:
        - `token` (string) — marked as a secret

        Use the agent config mechanism with Config<T> and Secret<T>.
        Pass the config via `#[agent_config]` constructor injection; do NOT call
        `Config::new()` manually inside the agent implementation.

        Expose a method called `getTokenLength` that returns the length of the
        token string as a 32-bit signed integer.

        Do NOT set any secret defaults in golem.yaml — the secret will be managed
        entirely at runtime via the CLI.

        Make sure the project builds and deploys successfully.
      effect: >
        In the Effect-based test-app project, add a new durable agent type called `KeyVaultAgent`,
        identified by a single string `constructorParams` field for the instance name.

        Declare typed configuration with a `defineConfig` service class and Effect Schema. It must
        contain one secret field, `token`, declared as `Schema.Redacted(Schema.String)`. Attach the
        config class to `defineAgent`; do not use a positional `Config<T>` constructor parameter or
        the plain TypeScript `Secret<T>` API.

        Expose an Effect-based method called `getTokenLength` with `success: WitTypes.Int32`.
        Inside the handler, yield the config service and evaluate `token.get` to obtain a
        `Redacted.Redacted<string>` on every invocation. Keep the token redacted throughout Effect
        values and logs. Use `Redacted.value(token)` only in the immediate expression that computes
        its string length, and return that number without logging or retaining the plaintext.

        Do NOT set any secret defaults in `golem.yaml`; the secret will be managed entirely at
        runtime through the CLI. Import the implementation module from `src/main.ts` and make sure
        the project builds and deploys successfully.
      scala: >
        In the test-app project, add a new durable agent type called `KeyVaultAgent`
        identified by a single constructor parameter for the instance name.

        KeyVaultAgent must accept typed configuration with a single secret field:
        - `token` (string) — marked as a secret

        Use the agent config mechanism with Config<T> and Secret<T>.
        Pass the config via `#[agent_config]` constructor injection; do NOT call
        `Config::new()` manually inside the agent implementation.

        Expose a method called `getTokenLength` that returns the length of the
        token string as a 32-bit signed integer.

        Do NOT set any secret defaults in golem.yaml — the secret will be managed
        entirely at runtime via the CLI.

        Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, add a new durable agent type called `KeyVaultAgent`
        identified by a single constructor parameter for the instance name.

        KeyVaultAgent must accept typed configuration with a single secret field:
        - `token` (string) — marked as a secret

        Use the agent config mechanism with Config<T> and Secret<T>.
        Pass the config via `#[agent_config]` constructor injection; do NOT call
        `Config::new()` manually inside the agent implementation.

        Expose a method called `get_token_length` that returns the length of the
        token string as a 32-bit signed integer.

        Do NOT set any secret defaults in golem.yaml — the secret will be managed
        entirely at runtime via the CLI.

        Make sure the project builds and deploys successfully.
    expectedSkills:
      rust:
        - "golem-add-secret-rust"
      ts:
        - "golem-add-secret-ts"
      effect:
        - "golem-add-secret-effect"
      scala:
        - "golem-add-secret-scala"
      moonbit:
        - "golem-add-secret-moonbit"
    verify:
      build: true
      deploy: true

  - id: "verify-secret-metadata"
    shell:
      command: "golem"
      args: ["component", "get", "--format", "json"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "[\\s\\S]*\"source\"\\s*:\\s*\"Secret\"[\\s\\S]*token[\\s\\S]*"

  - id: "list-secrets"
    shell:
      command: "golem"
      args: ["secret", "list", "--format", "json"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "[\\s\\S]*\"path\"[\\s\\S]*token[\\s\\S]*"

  - id: "get-secret-by-path"
    shell:
      command: "golem"
      args: ["secret", "get", "token", "--format", "json"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_matches: "[\\s\\S]*\"secret\"[\\s\\S]*\"path\"[\\s\\S]*token[\\s\\S]*"

  - id: "set-initial-secret-value"
    shell:
      command: "golem"
      args: ["secret", "update-value", "token",
             "--secret-value", "\"initial-secret\""]
      cwd: "test-app"
    expect:
      exit_code: 0

  - id: "create-agent"
    create_agent:
      name: 'KeyVaultAgent("v1")'

  - id: "invoke-get-token-length"
    invoke_json:
      agent: 'KeyVaultAgent("v1")'
      method:
        rust: "get_token_length"
        ts: "getTokenLength"
        effect: "getTokenLength"
        scala: "getTokenLength"
        moonbit: "get_token_length"
    expect:
      result_json:
        - path: "$"
          equals: 14

  - id: "update-secret-via-cli"
    shell:
      command: "golem"
      args: ["secret", "update-value", "token",
             "--secret-value", "\"updated-secret-value\""]
      cwd: "test-app"
    expect:
      exit_code: 0

  - id: "create-agent-with-updated-secret"
    create_agent:
      name: 'KeyVaultAgent("v2")'

  - id: "invoke-get-updated-token-length"
    invoke_json:
      agent: 'KeyVaultAgent("v2")'
      method:
        rust: "get_token_length"
        ts: "getTokenLength"
        effect: "getTokenLength"
        scala: "getTokenLength"
        moonbit: "get_token_length"
    expect:
      result_json:
        - path: "$"
          equals: 20

  - id: "delete-secret-via-cli"
    shell:
      command: "golem"
      args: ["secret", "delete", "token"]
      cwd: "test-app"
    expect:
      exit_code: 0

  - id: "verify-secret-deleted"
    shell:
      command: "golem"
      args: ["secret", "list", "--format", "json"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_not_contains: '"token"'
