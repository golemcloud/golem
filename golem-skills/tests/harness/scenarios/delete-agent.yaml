name: "delete-agent"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "create-agent"
    invoke:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      stdout_contains: "1"

  - id: "verify-agent-exists"
    shell:
      command: "golem"
      args: ["agent", "get", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_contains: "c1"

  - id: "delete-agent-via-prompt"
    prompt: >
      Use the CLI to delete the CounterAgent instance named "c1".
    expectedSkills:
      - "golem-delete-agent"

  - id: "verify-agent-deleted"
    shell:
      command: "golem"
      args: ["agent", "get", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 1
