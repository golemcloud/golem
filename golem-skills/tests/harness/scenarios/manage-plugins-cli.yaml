name: "manage-plugins-cli"
languageAgnostic: true
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "install-plugin-via-cli"
    prompt: >
      Using only the Golem CLI (not golem.yaml), install the `golem-otlp-exporter` plugin
      (version `1.1.5`) on the component in the test-app project. Use priority `10` and
      set these parameters:
        - endpoint: `http://localhost:4318`
        - signals: `traces`

      Show me the exact CLI command you would run, then run it.
    expectedSkills:
      - "golem-manage-plugins"

  - id: "verify-plugin-installed"
    prompt: >
      Using the Golem CLI, list the plugins currently installed on the component in the
      test-app project. Show the output.
    expectedSkills:
      - "golem-manage-plugins"
    continueSession: true
