name: "create-agent-instance"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  - id: "create-agent-via-prompt"
    prompt: >
      I have the test-app project deployed with a CounterAgent that has a string constructor
      parameter (the counter name) and an increment method. Use the CLI to pre-create a new
      agent instance named "c1" without invoking any method on it.
    expectedSkills:
      rust:
        - "golem-create-agent-instance-rust"
      ts:
        - "golem-create-agent-instance-ts"
      scala:
        - "golem-create-agent-instance-scala"
      moonbit:
        - "golem-create-agent-instance-moonbit"

  - id: "verify-agent-created"
    shell:
      command: "golem"
      args: ["agent", "oplog", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_contains: "create"
