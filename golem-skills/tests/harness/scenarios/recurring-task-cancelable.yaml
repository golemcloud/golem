name: "recurring-task-cancelable"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-cancelable-ticker"
    prompt:
      rust: >
        In the test-app project, add a second durable agent type called `Ticker`
        identified by a single name constructor parameter.

        `Ticker` must have mutable state:
        - `tick_count` (u64, initially 0): how many times `tick` has executed
        - `running` (bool, initially false): whether the recurring loop is active

        It must expose these externally invokable methods:

        - `start` ‚Äî sets `running` to true and immediately calls `tick`. Returns nothing.

        - `tick` ‚Äî if `running` is false, returns without doing anything. Otherwise,
          increments `tick_count` by 1. If `tick_count` is less than 5, it schedules
          itself (the same agent's `tick` method) to run again 5 seconds in the future
          using the cancelable schedule variant. The cancelable schedule variant returns
          a CancellationToken. Store the cancellation token in agent state so it can be
          used later. Returns nothing.

        - `cancel` ‚Äî sets `running` to false. If a cancellation token is stored from a
          previous `tick`, cancel it (call cancel() on the token) so the pending scheduled
          invocation is dropped immediately without waiting for it to fire. Returns nothing.

        - `get_tick_count` ‚Äî returns `tick_count` as a u64.

        The self-scheduling must use the generated RPC client to schedule a future
        invocation on the same agent instance. Use the cancelable schedule variant
        (schedule_cancelable_ in Rust) which returns a CancellationToken.

        Make sure the project builds successfully.
      ts: >
        In the test-app project, add a second durable agent type called `Ticker`
        identified by a single name constructor parameter.

        `Ticker` must have mutable state:
        - `tickCount` (number, initially 0): how many times `tick` has executed
        - `running` (boolean, initially false): whether the recurring loop is active

        It must expose these externally invokable methods:

        - `start` ‚Äî sets `running` to true and immediately calls `tick`. Returns nothing.

        - `tick` ‚Äî if `running` is false, returns without doing anything. Otherwise,
          increments `tickCount` by 1. If `tickCount` is less than 5, it schedules
          itself (the same agent's `tick` method) to run again 5 seconds in the future
          using the cancelable schedule variant. The cancelable schedule variant returns
          a CancellationToken. Store the cancellation token in agent state so it can be
          used later. Returns nothing.

        - `cancel` ‚Äî sets `running` to false. If a cancellation token is stored from a
          previous `tick`, cancel it (call cancel() on the token) so the pending scheduled
          invocation is dropped immediately without waiting for it to fire. Returns nothing.

        - `getTickCount` ‚Äî returns `tickCount` as a number.

        The self-scheduling must use the generated RPC client to schedule a future
        invocation on the same agent instance. Use the cancelable schedule variant
        (.scheduleCancelable() in TypeScript) which returns a CancellationToken.

        Make sure the project builds successfully.
      effect: >
        In the Effect-based test-app project, add a second durable agent type called
        `Ticker`, defined with `defineAgent` and identified by one string constructor
        parameter named `name`.

        Keep mutable logical state in an Effect `Ref`:
        - `tickCount` (number, initially 0): how many times `tick` has executed
        - `running` (boolean, initially false): whether the recurring loop is active

        It must expose these externally invokable camelCase methods as Effect handlers:

        - `start` ‚Äî sets `running` to true and immediately runs `tick`. Returns nothing.

        - `tick` ‚Äî if `running` is false, returns without doing anything. Otherwise,
          increments `tickCount` by 1. If `tickCount` is less than 5, it obtains a typed
          client for the same `Ticker` identity and schedules that client's `tick` method
          to run again 5 seconds in the future. Returns nothing.

        - `cancel` ‚Äî sets `running` to false. If a pending scheduled invocation handle is
          stored, run its `cancel()` Effect so the pending invocation is dropped immediately.
          Returns nothing.

        - `getTickCount` ‚Äî returns `tickCount` as a number.

        Use the real `@golemcloud/effect-golem` API: `TickerDefinition.client.get({ name })`
        returns the self client, and `self.tick.schedule(scheduledAt, {})` returns a
        `Client.ScheduledInvocation`. The Effect SDK's `.schedule(...)` is already cancelable;
        do not invent `.scheduleCancelable()`. Store the live handle in a separate
        `Ref<Client.ScheduledInvocation | null>` and cancel it with `yield* handle.cancel()`.
        Do not put this non-serializable host handle in snapshot state. Construct
        `scheduledAt` as `{ seconds: bigint, nanoseconds: number }` by yielding
        `DateTime.now` and converting it with `DateTime.toEpochMillis(...)`.

        Implement all methods with Effect, import the implementation module from `src/main.ts`,
        and make sure the project builds successfully.
      scala: >
        In the test-app project, add a second durable agent type called `Ticker`
        identified by a single name constructor parameter.

        `Ticker` must have mutable state:
        - `tickCount` (Long, initially 0): how many times `tick` has executed
        - `running` (Boolean, initially false): whether the recurring loop is active

        It must expose these externally invokable methods:

        - `start` ‚Äî sets `running` to true and immediately calls `tick`. Returns nothing.

        - `tick` ‚Äî if `running` is false, returns without doing anything. Otherwise,
          increments `tickCount` by 1. If `tickCount` is less than 5, it schedules
          itself (the same agent's `tick` method) to run again 5 seconds in the future
          using the cancelable schedule variant. The cancelable schedule variant returns
          a CancellationToken. Store the cancellation token in agent state so it can be
          used later. Returns nothing.

        - `cancel` ‚Äî sets `running` to false. If a cancellation token is stored from a
          previous `tick`, cancel it (call cancel() on the token) so the pending scheduled
          invocation is dropped immediately without waiting for it to fire. Returns nothing.

        - `getTickCount` ‚Äî returns `tickCount` as a Long.

        The self-scheduling must use the generated RPC client to schedule a future
        invocation on the same agent instance. Use the cancelable schedule variant
        (.scheduleCancelableAt() in Scala) which returns a CancellationToken.

        Make sure the project builds successfully.
      moonbit: >
        In the test-app project, add a second durable agent type called `Ticker`
        identified by a single name constructor parameter.

        `Ticker` must have mutable state:
        - `tick_count` (UInt64, initially 0): how many times `tick` has executed
        - `running` (Bool, initially false): whether the recurring loop is active

        It must expose these externally invokable methods:

        - `start` ‚Äî sets `running` to true and immediately calls `tick`. Returns nothing.

        - `tick` ‚Äî if `running` is false, returns without doing anything. Otherwise,
          increments `tick_count` by 1. If `tick_count` is less than 5, it schedules
          itself (the same agent's `tick` method) to run again 5 seconds in the future
          using the cancelable schedule variant. The cancelable schedule variant returns
          a CancellationToken. Store the cancellation token in agent state so it can be
          used later. Returns nothing.

        - `cancel` ‚Äî sets `running` to false. If a cancellation token is stored from a
          previous `tick`, cancel it (call cancel() on the token) so the pending scheduled
          invocation is dropped immediately without waiting for it to fire. Returns nothing.

        - `get_tick_count` ‚Äî returns `tick_count` as a UInt64.

        The self-scheduling must use the generated RPC client to schedule a future
        invocation on the same agent instance. Use the cancelable schedule variant
        (schedule_cancelable_ in MoonBit) which returns a CancellationToken.

        Make sure the project builds successfully.
    expectedSkills:
      rust:
        - "golem-recurring-task-rust"
      ts:
        - "golem-recurring-task-ts"
      effect:
        - "golem-recurring-task-effect"
      scala:
        - "golem-recurring-task-scala"
      moonbit:
        - "golem-recurring-task-moonbit"
    verify:
      build: true
      deploy: true

  - id: "start-ticker"
    invoke:
      agent: 'Ticker("t1")'
      method:
        rust: "start"
        ts: "start"
        effect: "start"
        scala: "start"
        moonbit: "start"

  - id: "verify-first-tick"
    invoke_json:
      agent: 'Ticker("t1")'
      method:
        rust: "get_tick_count"
        ts: "getTickCount"
        effect: "getTickCount"
        scala: "getTickCount"
        moonbit: "get_tick_count"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "wait-for-second-tick"
    sleep: 6

  - id: "wait-for-effect-scheduler-poll"
    sleep: 2
    only_if:
      language: "effect"

  - id: "verify-second-tick"
    invoke_json:
      agent: 'Ticker("t1")'
      method:
        rust: "get_tick_count"
        ts: "getTickCount"
        effect: "getTickCount"
        scala: "getTickCount"
        moonbit: "get_tick_count"
    expect:
      result_json:
        - path: "$"
          equals: 2

  - id: "cancel-ticker"
    invoke:
      agent: 'Ticker("t1")'
      method:
        rust: "cancel"
        ts: "cancel"
        effect: "cancel"
        scala: "cancel"
        moonbit: "cancel"

  - id: "wait-past-would-be-third-tick"
    sleep: 8

  - id: "verify-no-more-ticks-after-cancel"
    invoke_json:
      agent: 'Ticker("t1")'
      method:
        rust: "get_tick_count"
        ts: "getTickCount"
        effect: "getTickCount"
        scala: "getTickCount"
        moonbit: "get_tick_count"
    expect:
      result_json:
        - path: "$"
          equals: 2
