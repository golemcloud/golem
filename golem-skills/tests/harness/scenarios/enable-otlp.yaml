name: "enable-otlp"
steps:
  - id: "start-otlp-stack"
    shell:
      command: "sh"
      args: ["-c", "docker compose -f $GOLEM_PATH/docker-examples/otlp-collector/docker-compose.yml up -d"]
    expect:
      exit_code: 0

  - id: "wait-for-collector"
    retry:
      attempts: 12
      delay: 5
    http:
      url: "http://localhost:4318/v1/traces"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body: '{"resourceSpans":[]}'
    expect:
      status: 200

  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "enable-otlp-and-add-agent"
    prompt:
      rust: >
        In the test-app project, do two things:

        1. Enable the built-in OpenTelemetry plugin for the existing component.
           Configure it in `golem.yaml` to export traces, logs, and metrics to
           an OTLP collector at `http://localhost:4318`. Use service-name-mode
           `agent-type` so traces are grouped by component.

        2. Add a new durable agent type called `TracedAgent` identified by a
           single constructor parameter for the instance name. It must expose
           a method called `do_traced_work` that takes a string `task_name` and
           returns the string "traced". Inside the method:
           - Start a custom span named "process-task"
           - Set an attribute "task" with the value of `task_name` on the span
           - Log an info-level message: "processing: {task_name}"
           - Finish the span
           - Return the string "traced"
           Use the `golem::api::context` invocation context API for span management.

        Make sure the project builds and deploys successfully.
      ts: >
        In the test-app project, do two things:

        1. Enable the built-in OpenTelemetry plugin for the existing component.
           Configure it in `golem.yaml` to export traces, logs, and metrics to
           an OTLP collector at `http://localhost:4318`. Use service-name-mode
           `agent-type` so traces are grouped by component.

        2. Add a new durable agent type called `TracedAgent` identified by a
           single constructor parameter for the instance name. It must expose
           a method called `doTracedWork` that takes a string `taskName` and
           returns the string "traced". Inside the method:
           - Start a custom span named "process-task"
           - Set an attribute "task" with the value of `taskName` on the span
           - Log an info-level message: "processing: {taskName}"
           - Finish the span
           - Return the string "traced"
           Use the `golem:api/context` invocation context API for span management.

        Make sure the project builds and deploys successfully.
      scala: >
        In the test-app project, do two things:

        1. Enable the built-in OpenTelemetry plugin for the existing component.
           Configure it in `golem.yaml` to export traces, logs, and metrics to
           an OTLP collector at `http://localhost:4318`. Use service-name-mode
           `agent-type` so traces are grouped by component.

        2. Add a new durable agent type called `TracedAgent` identified by a
           single constructor parameter for the instance name. It must expose
           a method called `doTracedWork` that takes a string `taskName` and
           returns the string "traced". Inside the method:
           - Start a custom span named "process-task"
           - Set an attribute "task" with the value of `taskName` on the span
           - Log an info-level message: "processing: {taskName}"
           - Finish the span
           - Return the string "traced"
           Use the `ContextApi` invocation context API for span management.

        Make sure the project builds and deploys successfully.
      moonbit: >
        In the test-app project, do two things:

        1. Enable the built-in OpenTelemetry plugin for the existing component.
           Configure it in `golem.yaml` to export traces, logs, and metrics to
           an OTLP collector at `http://localhost:4318`. Use service-name-mode
           `agent-type` so traces are grouped by component.

        2. Add a new durable agent type called `TracedAgent` identified by a
           single constructor parameter for the instance name. It must expose
           a method called `do_traced_work` that takes a String `task_name` and
           returns the String "traced". Inside the method:
           - Create a custom span named "process-task" using `@context.with_span`
           - Set an attribute "task" with the value of `task_name` on the span
           - Log an info-level message: "processing: {task_name}"
           - Return the string "traced"
           Use the `@context` invocation context API for span management.

        Make sure the project builds and deploys successfully.
    expectedSkills:
      rust:
        - "golem-enable-otlp-rust"
      ts:
        - "golem-enable-otlp-ts"
      scala:
        - "golem-enable-otlp-scala"
      moonbit:
        - "golem-enable-otlp-moonbit"
    verify:
      build: true
      deploy: true

  - id: "verify-plugin-in-manifest"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_contains: "golem-otlp-exporter"

  - id: "invoke-traced-work"
    invoke_json:
      agent: 'TracedAgent("test1")'
      method:
        rust: "do_traced_work"
        ts: "doTracedWork"
        scala: "doTracedWork"
        moonbit: "do_traced_work"
      args: '"my-task"'
    expect:
      result_json:
        - path: "$"
          equals: "traced"

  - id: "wait-for-otlp-export"
    sleep: 15

  - id: "verify-traces-in-jaeger"
    retry:
      attempts: 6
      delay: 5
    http:
      url: "http://localhost:16686/api/services"
      method: "GET"
    expect:
      status: 200
      body_contains: "data"

  - id: "verify-metrics-in-prometheus"
    retry:
      attempts: 6
      delay: 5
    http:
      url: "http://localhost:9090/api/v1/query?query=golem_invocation_count_total"
      method: "GET"
    expect:
      status: 200
      body_contains: "golem_invocation_count_total"

finally:
  - id: "stop-otlp-stack"
    shell:
      command: "sh"
      args: ["-c", "docker compose -f $GOLEM_PATH/docker-examples/otlp-collector/docker-compose.yml down -v"]
    expect:
      exit_code: 0
