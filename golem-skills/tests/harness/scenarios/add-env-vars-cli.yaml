name: "add-env-vars-cli"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-env-reading-agent"
    prompt: >
      In the test-app project, add a new durable agent type called `EnvAgent` identified by
      a single constructor parameter for the instance name.

      EnvAgent must read an environment variable called `INSTANCE_TAG` from the process
      environment. It must expose a method called `get-tag` that returns the value of the
      `INSTANCE_TAG` environment variable as a string.

      Do NOT define `INSTANCE_TAG` in `golem.yaml` — it will be provided when creating
      individual agent instances via the CLI.

      Make sure the project builds and deploys successfully.
    expectedSkills:
      - "golem-add-env-vars"
    verify:
      build: true
      deploy: true

  - id: "create-agent-with-env"
    create_agent:
      name: 'EnvAgent("test-1")'
      env:
        INSTANCE_TAG: "alpha"

  - id: "invoke-get-tag"
    invoke_json:
      agent: 'EnvAgent("test-1")'
      method:
        rust: "get_tag"
        ts: "getTag"
        scala: "getTag"
    expect:
      result_json:
        - path: "$"
          equals: "alpha"
