name: "edit-manifest-add-plugin"
steps:
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true

  - id: "add-plugin-and-custom-command"
    prompt: >
      In the test-app project, edit `golem.yaml` to make two changes:

      1. Add a plugin installation to the default agent type (the one already defined in
         the project) in the top-level `agents` section of `golem.yaml`. The plugin should be:
         - name: `my-logger`
         - version: `1.0.0`
         - parameters: `level` set to `debug`

      2. Add a root-level custom command called `check` that runs the command `echo check-ok`.

      Do not change any source code files. Only modify `golem.yaml`.
    expectedSkills:
      - "golem-edit-manifest"
    verify:
      build: true

  - id: "verify-plugin-name"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_contains: "my-logger"

  - id: "verify-plugin-version"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*plugins:[\\s\\S]*name:\\s*my-logger[\\s\\S]*version:[\\s\\S]*1\\.0\\.0[\\s\\S]*"

  - id: "verify-plugin-parameter"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*parameters:[\\s\\S]*level:\\s*debug[\\s\\S]*"

  - id: "verify-custom-command"
    check_file:
      path: "golem.yaml"
    expect:
      stdout_matches: "[\\s\\S]*customCommands:[\\s\\S]*check:[\\s\\S]*echo check-ok[\\s\\S]*"

  - id: "run-custom-command"
    shell:
      command: "golem"
      args: ["exec", "check"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_contains: "check-ok"
