name: "golem-new-project-ts"
settings:
  timeout_per_subprompt: 300
steps:
  - id: "create-project"
    prompt: "Create a new Golem application called test-app with TypeScript."
    expectedSkills:
      - "golem-new-project"
    allowedExtraSkills:
      - "golem-db-app"
    verify:
      build: true

  - id: "check-project-files"
    shell:
      command: "ls"
      args: ["test-app/golem.yaml"]
    expect:
      exit_code: 0
