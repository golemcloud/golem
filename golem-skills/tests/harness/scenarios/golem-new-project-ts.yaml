name: "golem-new-project-ts"
settings:
  timeout_per_subprompt: 300
steps:
  - id: "create-project"
    prompt: "Create a new Golem application called test-app with TypeScript"
    expectedSkills:
      - "golem-new-project"
    verify:
      build: true

  - id: "check-project-files"
    shell:
      command: "ls"
      args: ["test-app/golem.yaml"]
    expect:
      exit_code: 0

  - id: "deploy-project"
    prompt: "Deploy the test-app application"
    verify:
      deploy: true
