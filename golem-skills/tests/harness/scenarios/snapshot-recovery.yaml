name: "snapshot-recovery"
steps:
  # 1. Create and deploy a default project (revision 0)
  - id: "create-project"
    create_project:
      name: test-app
    verify:
      build: true
      deploy: true

  # 2. Add snapshot support with snapshotting enabled on every invocation
  - id: "add-snapshot-support"
    prompt:
      rust: &non-effect-add-snapshot-support >
        In the test-app project, add custom save/load snapshot functions to the
        CounterAgent that serialize the counter value as 4 big-endian bytes.  Enable
        snapshotting on every invocation. Build and deploy.
      ts: *non-effect-add-snapshot-support
      effect: >
        In the Effect-based test-app project, configure the existing counter for
        schema-driven snapshot recovery on every successful invocation. Use
        `Snapshot.define` with a `Schema.Struct` containing the counter value,
        `Snapshot.policy.everyN(1)`, and exactly one `snapshot.init(...)` call whose returned
        `Ref` remains the counter's state. Do not add custom byte or JSON save/load code. Rename
        the `defineAgent` name from `Counter` to exactly `CounterAgent` if necessary, and update
        the matching agent key in `golem.yaml`. Preserve the existing `increment` behavior.
        Build and deploy.
      scala: *non-effect-add-snapshot-support
      moonbit: *non-effect-add-snapshot-support
    expectedSkills:
      rust:
        - "golem-custom-snapshot-rust"
      ts:
        - "golem-custom-snapshot-ts"
      effect:
        - "golem-custom-snapshot-effect"
      scala:
        - "golem-custom-snapshot-scala"
      moonbit:
        - "golem-custom-snapshot-moonbit"
    verify:
      deploy: true

  # 3. Invoke several times to build up state and trigger snapshots
  - id: "invoke-increment-1"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 1

  - id: "invoke-increment-2"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 2

  - id: "invoke-increment-3"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 3

  # 4. Verify snapshots were actually taken in the oplog
  - id: "verify-snapshots-in-oplog"
    shell:
      command: "golem"
      args: ["agent", "oplog", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0
      stdout_contains: "SNAPSHOT"

  # 5. Simulate a crash
  - id: "simulate-crash"
    shell:
      command: "golem"
      args: ["agent", "simulate-crash", "CounterAgent(\"c1\")"]
      cwd: "test-app"
    expect:
      exit_code: 0

  # 6. Wait for recovery
  - id: "wait-for-recovery"
    sleep: 2

  # 7. Verify state was fully recovered
  - id: "verify-recovered"
    invoke_json:
      agent: 'CounterAgent("c1")'
      method: "increment"
    expect:
      result_json:
        - path: "$"
          equals: 4
