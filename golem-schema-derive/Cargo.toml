[package]
name = "golem-schema-derive"
version = "0.0.0"
 edition = "2024"

homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem"
description = "Derive macros for the Golem schema model"

license-file = "../LICENSE"

[lib]
proc-macro = true

[dependencies]
darling = { workspace = true }
heck = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true, features = ["full"] }

[dev-dependencies]
chrono = { workspace = true }
golem-common = { workspace = true, default-features = false, features = ["client"] }
proptest = { workspace = true }
test-r = { workspace = true }
trybuild = "1.0"

[[test]]
name = "derive_struct"
harness = false

[[test]]
name = "derive_enum"
harness = false

[[test]]
name = "derive_union"
harness = false

[[test]]
name = "derive_recursive"
harness = false

[[test]]
name = "derive_attributes"
harness = false

[[test]]
name = "derive_round_trip"
harness = false

[[test]]
name = "derive_typeid"
harness = false

[[test]]
name = "compile_fail"
harness = false
