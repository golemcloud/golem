syntax = "proto3";

package golem.shardmanager.v1;

import public "golem/common/environment.proto";
import public "golem/common/quota.proto";
import public "golem/shardmanager/pod.proto";
import public "golem/shardmanager/routing_table.proto";
import public "golem/shardmanager/shard_id.proto";
import public "golem/shardmanager/v1/shard_manager_error.proto";

service ShardManagerService {
  rpc GetRoutingTable(GetRoutingTableRequest) returns (GetRoutingTableResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Quota lease management.
  // Executors call these RPCs to acquire, renew, and release quota leases.
  rpc AcquireQuotaLease(AcquireQuotaLeaseRequest) returns (AcquireQuotaLeaseResponse);
  rpc RenewQuotaLease(RenewQuotaLeaseRequest) returns (RenewQuotaLeaseResponse);
  // Renew multiple leases in one round-trip. Results are in the same order
  // as the request entries.
  rpc BatchRenewQuotaLeases(BatchRenewQuotaLeasesRequest) returns (BatchRenewQuotaLeasesResponse);
  rpc ReleaseQuotaLease(ReleaseQuotaLeaseRequest) returns (ReleaseQuotaLeaseResponse);
}

message GetRoutingTableRequest {}

message GetRoutingTableResponse {
  oneof result {
    golem.shardmanager.RoutingTable success = 1;
    golem.shardmanager.v1.ShardManagerError failure = 2;
  }
}

message RegisterRequest {
  int32 port = 1;
  optional string pod_name = 2;
}

message RegisterResponse {
  oneof result {
    RegisterSuccess success = 1;
    golem.shardmanager.v1.ShardManagerError failure = 2;
  }
}

message RegisterSuccess {
  uint32 number_of_shards = 1;
}

// Declares interest in a quota and requests an initial lease.
// The resource is identified by (environment_id, name) since the
// executor does not know the resource_definition_id yet.
message AcquireQuotaLeaseRequest {
  golem.common.EnvironmentId environment_id = 1;
  string resource_name = 2;
  int32 port = 3;
}

message AcquireQuotaLeaseResponse {
  oneof result {
    AcquireQuotaLeaseSuccessResponse success = 1;
    golem.shardmanager.v1.QuotaError error = 2;
  }
}

message AcquireQuotaLeaseSuccessResponse {
  golem.common.QuotaLease lease = 1;
}

// A pending reservation request from an agent on this executor.
// Included in RenewQuotaLeaseRequest so the shard manager can
// weight allocations across executors based on demand.
message PendingReservation {
  uint64 amount = 1;
  // Priority score: credit / amount_requested.  Higher values
  // indicate more deserving requests.
  double priority = 2;
}

// Renews an existing lease before it expires.
// The executor reports how much of its previous allocation was unused
// so the shard manager can reclaim and reallocate.
message RenewQuotaLeaseRequest {
  golem.common.ResourceDefinitionId resource_definition_id = 1;
  int32 port = 2;
  // Epoch of the lease being renewed. Used for fencing — the shard
  // manager rejects renewals for stale epochs.
  uint64 epoch = 3;
  // Units from the previous allocation that were not consumed.
  uint64 unused = 4;
  // Outstanding reservation requests on this executor, ordered by
  // priority (highest first).  The shard manager may use this to
  // weight allocations between executors.
  repeated PendingReservation pending_reservations = 5;
}

message RenewQuotaLeaseResponse {
  oneof result {
    RenewQuotaLeaseSuccessResponse success = 1;
    golem.shardmanager.v1.QuotaError error = 2;
  }
}

message RenewQuotaLeaseSuccessResponse {
  golem.common.QuotaLease lease = 1;
}

// Releases a lease, returning any unused allocation.
// Called when the executor loses interest in a quota (no more
// agents using this resource on this executor).
message ReleaseQuotaLeaseRequest {
  golem.common.ResourceDefinitionId resource_definition_id = 1;
  int32 port = 2;
  uint64 epoch = 3;
  uint64 unused = 4;
}

message ReleaseQuotaLeaseResponse {
  oneof result {
    ReleaseQuotaLeaseSuccessResponse success = 1;
    golem.shardmanager.v1.QuotaError error = 2;
  }
}

message ReleaseQuotaLeaseSuccessResponse { }

message BatchRenewQuotaLeasesRequest {
  repeated RenewQuotaLeaseRequest renewals = 1;
}

// One result per entry in the request, in the same order.
message BatchRenewQuotaLeasesResponse {
  repeated RenewQuotaLeaseResult results = 1;
}

message RenewQuotaLeaseResult {
  oneof result {
    RenewQuotaLeaseSuccessResponse success = 1;
    golem.shardmanager.v1.QuotaError error = 2;
  }
}
