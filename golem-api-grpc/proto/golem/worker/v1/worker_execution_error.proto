syntax = "proto3";

package golem.worker.v1;

import "golem/worker/promise_id.proto";
import "golem/shardmanager/shard_id.proto";
import "golem/component/component_id.proto";
import "golem/worker/worker_id.proto";
import "golem/worker/worker_error.proto";

message WorkerExecutionError {
  oneof error {
    InvalidRequest invalid_request = 1;
    AgentAlreadyExists agent_already_exists = 2;
    AgentCreationFailed agent_creation_failed = 3;
    FailedToResumeAgent failed_to_resume_agent = 4;
    ComponentNotFound component_not_found = 5;
    ComponentDownloadFailed component_download_failed = 6;
    ComponentParseFailed component_parse_failed = 7;
    GetCurrentVersionOfComponentFailed get_current_version_of_component_failed = 8;
    PromiseNotFound promise_not_found = 9;
    PromiseDropped promise_dropped = 10;
    PromiseAlreadyCompleted promise_already_completed = 11;
    Interrupted interrupted = 12;
    ParamTypeMismatch param_type_mismatch = 13;
    NoValueInMessage no_value_in_message = 14;
    ValueMismatch value_mismatch = 15;
    UnexpectedOplogEntry unexpected_oplog_entry = 16;
    RuntimeError runtime_error = 17;
    InvalidShardId invalid_shard_id = 18;
    PreviousInvocationFailed previous_invocation_failed = 19;
    UnknownError unknown = 20;
    PreviousInvocationExited previous_invocation_exited = 21;
    InvalidAccount invalid_account = 22;
    AgentNotFound agent_not_found = 23;
    ShardingNotReady sharding_not_ready = 24;
    InitialAgentFileDownloadFailed initial_agent_file_download_failed = 25;
    FileSystemError file_system_error = 26;
    InvocationFailed invocation_failed = 27;
  }
}

message InvalidRequest {
  string details = 1;
}

message AgentAlreadyExists {
  AgentId agent_id = 1;
}

message AgentCreationFailed {
  AgentId agent_id = 1;
  string details = 2;
}

message FailedToResumeAgent {
  AgentId agent_id = 1;
  WorkerExecutionError reason = 2;
}

message ComponentNotFound {
  golem.component.ComponentId component_id = 1;
}

message ComponentDownloadFailed {
  golem.component.ComponentId component_id = 1;
  uint64 component_revision = 2;
  string reason = 3;
}

message ComponentParseFailed {
  golem.component.ComponentId component_id = 1;
  uint64 component_revision = 2;
  string reason = 3;
}

message GetCurrentVersionOfComponentFailed {
  golem.component.ComponentId component_id = 1;
  string reason = 2;
}

message PromiseNotFound {
  PromiseId promise_id = 1;
}

message PromiseDropped {
  PromiseId promise_id = 1;
}

message PromiseAlreadyCompleted {
  PromiseId promise_id = 1;
}

message Interrupted {
  bool recover_immediately = 1;
}

message ParamTypeMismatch {
  string details = 1;
}

message NoValueInMessage {}

message ValueMismatch {
  string details = 1;
}

message UnexpectedOplogEntry {
  string expected = 1;
  string got = 2;
}

message RuntimeError {
  string details = 1;
}

message InvalidShardId {
  golem.shardmanager.ShardId shard_id = 1;
  repeated golem.shardmanager.ShardId shard_ids = 2;
}

message PreviousInvocationFailed {
  AgentError error = 1;
  string stderr = 2;
}

message PreviousInvocationExited {}

message InvalidAccount {}

message UnknownError {
  string details = 1;
}

message AgentNotFound {
  AgentId agent_id = 1;
}

message ShardingNotReady {}

message InitialAgentFileDownloadFailed {
  string path = 1;
  string reason = 2;
}

message FileSystemError {
  string path = 1;
  string reason = 2;
}

message InvocationFailed {
  AgentError error = 1;
  string stderr = 2;
}
