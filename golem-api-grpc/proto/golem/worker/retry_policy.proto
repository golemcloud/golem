syntax = "proto3";

package golem.worker.retry;

import "google/protobuf/empty.proto";

message PredicateValue {
  oneof value {
    string text = 1;
    sint64 integer = 2;
    bool boolean = 3;
  }
}

message PropertyComparison {
  string property_name = 1;
  PredicateValue value = 2;
}

message PropertySetCheck {
  string property_name = 1;
  repeated PredicateValue values = 2;
}

message PropertyPattern {
  string property_name = 1;
  string pattern = 2;
}

message PredicatePair {
  Predicate left = 1;
  Predicate right = 2;
}

message Predicate {
  oneof predicate {
    PropertyComparison prop_eq = 1;
    PropertyComparison prop_neq = 2;
    PropertyComparison prop_gt = 3;
    PropertyComparison prop_gte = 4;
    PropertyComparison prop_lt = 5;
    PropertyComparison prop_lte = 6;
    string prop_exists = 7;
    PropertySetCheck prop_in = 8;
    PropertyPattern prop_matches = 9;
    PropertyPattern prop_starts_with = 10;
    PropertyPattern prop_contains = 11;
    PredicatePair pred_and = 12;
    PredicatePair pred_or = 13;
    Predicate pred_not = 14;
    google.protobuf.Empty pred_true = 15;
    google.protobuf.Empty pred_false = 16;
  }
}

message ExponentialConfig {
  uint64 base_delay = 1;
  double factor = 2;
}

message FibonacciConfig {
  uint64 first = 1;
  uint64 second = 2;
}

message CountBoxConfig {
  uint32 max_retries = 1;
  RetryPolicy inner = 2;
}

message TimeBoxConfig {
  uint64 limit = 1;
  RetryPolicy inner = 2;
}

message ClampConfig {
  uint64 min_delay = 1;
  uint64 max_delay = 2;
  RetryPolicy inner = 3;
}

message AddDelayConfig {
  uint64 delay = 1;
  RetryPolicy inner = 2;
}

message JitterConfig {
  double factor = 1;
  RetryPolicy inner = 2;
}

message FilteredConfig {
  Predicate predicate = 1;
  RetryPolicy inner = 2;
}

message RetryPolicyPair {
  RetryPolicy left = 1;
  RetryPolicy right = 2;
}

message RetryPolicy {
  oneof policy {
    uint64 periodic = 1;
    ExponentialConfig exponential = 2;
    FibonacciConfig fibonacci = 3;
    google.protobuf.Empty immediate = 4;
    google.protobuf.Empty never = 5;
    CountBoxConfig count_box = 6;
    TimeBoxConfig time_box = 7;
    ClampConfig clamp = 8;
    AddDelayConfig add_delay = 9;
    JitterConfig jitter = 10;
    FilteredConfig filtered_on = 11;
    RetryPolicyPair and_then = 12;
    RetryPolicyPair policy_union = 13;
    RetryPolicyPair policy_intersect = 14;
  }
}

message NamedRetryPolicy {
  string name = 1;
  uint32 priority = 2;
  Predicate predicate = 3;
  RetryPolicy policy = 4;
}
