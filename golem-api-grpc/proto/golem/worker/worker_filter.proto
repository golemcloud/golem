syntax = "proto3";

package golem.worker;

import "golem/common/account_id.proto";
import "golem/common/string_filter_comparator.proto";
import "golem/common/filter_comparator.proto";
import "golem/worker/worker_id.proto";
import "golem/worker/worker_status.proto";
import "google/protobuf/timestamp.proto";

message AgentFilter {
  oneof filter {
    AgentNameFilter name = 1;
    AgentRevisionFilter revision = 2;
    AgentStatusFilter status = 3;
    AgentCreatedAtFilter created_at = 4;
    AgentEnvFilter env = 5;
    AgentAndFilter and = 6;
    AgentOrFilter or = 7;
    AgentNotFilter not = 8;
    AgentConfigVarsFilter wasi_config = 9;
  }
}

message AgentNotFilter {
  AgentFilter filter = 1;
}

message AgentAndFilter {
  repeated AgentFilter filters = 1;
}

message AgentOrFilter {
  repeated AgentFilter filters = 1;
}

message AgentNameFilter {
  golem.common.StringFilterComparator comparator = 1;
  string value = 2;
}

message AgentRevisionFilter {
  golem.common.FilterComparator comparator = 1;
  uint64 value = 2;
}

message AgentCreatedAtFilter {
  golem.common.FilterComparator comparator = 1;
  google.protobuf.Timestamp value = 2;
}

message AgentStatusFilter {
  golem.common.FilterComparator comparator = 1;
  AgentStatus value = 2;
}

message AgentEnvFilter {
  string name = 1;
  golem.common.StringFilterComparator comparator = 2;
  string value = 3;
}

message AgentConfigVarsFilter {
  string name = 1;
  golem.common.StringFilterComparator comparator = 2;
  string value = 3;
}
