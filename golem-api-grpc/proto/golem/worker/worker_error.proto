syntax = "proto3";

package golem.worker;

message AgentError {
  oneof error {
    StackOverflow stack_overflow = 1;
    OutOfMemory out_of_memory = 2;
    InvalidRequest invalid_request = 3;
    UnknownError unknown_error = 4;
    ExceededMemoryLimit exceeded_memory_limit = 5;
    ExceededTableLimit exceeded_table_limit = 6;
    OutOfStorage out_of_storage = 7;
    ExceededStorageLimit exceeded_storage_limit = 8;
  }
}

message StackOverflow { }

message OutOfMemory { }

message InvalidRequest {
  string details = 1;
}

message UnknownError {
  string details = 1;
}

message ExceededMemoryLimit {}

message ExceededTableLimit {}

message OutOfStorage {}

message ExceededStorageLimit {}
