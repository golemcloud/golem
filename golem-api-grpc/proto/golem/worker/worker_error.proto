syntax = "proto3";

package golem.worker;

message AgentError {
  oneof error {
    StackOverflow stack_overflow = 1;
    OutOfMemory out_of_memory = 2;
    InvalidRequest invalid_request = 3;
    UnknownError unknown_error = 4;
    ExceededMemoryLimit exceeded_memory_limit = 5;
    ExceededTableLimit exceeded_table_limit = 6;
    NodeOutOfFilesystemStorage node_out_of_filesystem_storage = 7;
    AgentExceededFilesystemStorageLimit agent_exceeded_filesystem_storage_limit = 8;
    ExceededHttpCallLimit exceeded_http_call_limit = 9;
    ExceededRpcCallLimit exceeded_rpc_call_limit = 10;
  }
}

message StackOverflow { }

message OutOfMemory { }

message InvalidRequest {
  string details = 1;
}

message UnknownError {
  string details = 1;
}

message ExceededMemoryLimit {}

message ExceededTableLimit {}

message ExceededHttpCallLimit {}

message ExceededRpcCallLimit {}

message NodeOutOfFilesystemStorage {}

message AgentExceededFilesystemStorageLimit {}
