syntax = "proto3";

package golem.worker;

message AgentError {
  oneof error {
    StackOverflow stack_overflow = 1;
    OutOfMemory out_of_memory = 2;
    InvalidRequest invalid_request = 3;
    UnknownError unknown_error = 4;
    ExceededMemoryLimit exceeded_memory_limit = 5;
    InternalError internal_error = 6;
    DeterministicTrap deterministic_trap = 7;
    TransientError transient_error = 8;
    PermanentError permanent_error = 9;
  }
}

message StackOverflow { }

message OutOfMemory { }

message InvalidRequest {
  string details = 1;
}

message UnknownError {
  string details = 1;
}

message ExceededMemoryLimit {}

message InternalError {
  string details = 1;
}

message DeterministicTrap {
  string details = 1;
}

message TransientError {
  string details = 1;
}

message PermanentError {
  string details = 1;
}
