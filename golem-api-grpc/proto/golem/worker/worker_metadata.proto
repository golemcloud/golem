syntax = "proto3";

package golem.worker;

import "golem/common/account_id.proto";
import "golem/common/environment.proto";
import "golem/component/agent.proto";
import "golem/worker/agent_config.proto";
import "golem/worker/worker_id.proto";
import "golem/worker/worker_status.proto";
import "google/protobuf/timestamp.proto";
import "wasm/rpc/value_and_type.proto";
import "golem/component/plugin.proto";

message AgentMetadata {
  AgentId agent_id = 1;
  golem.common.AccountId created_by = 2;
  map<string, string> env = 4;
  map<string, string> config_vars = 5;
  repeated golem.worker.TypedAgentConfigEntry agent_config = 6;
  AgentStatus status = 7;
  uint64 component_revision = 8;
  uint32 retry_count = 9;
  uint64 pending_invocation_count = 10;
  repeated UpdateRecord updates = 12;
  google.protobuf.Timestamp created_at = 13;
  optional string last_error = 14;
  uint64 component_size = 15;
  uint64 total_linear_memory_size = 16;
  repeated ResourceDescription owned_resources = 17;
  repeated golem.component.EnvironmentPluginGrantId active_plugins = 18;
  repeated OplogRegion skipped_regions = 19;
  repeated OplogRegion deleted_regions = 20;
  golem.common.EnvironmentId environment_id = 21;
}

message UpdateRecord {
  google.protobuf.Timestamp timestamp = 1;
  uint64 target_revision = 2;
  oneof update {
    PendingUpdate pending = 3;
    FailedUpdate failed = 4;
    SuccessfulUpdate successful = 5;
  }
}

message PendingUpdate {
}

message FailedUpdate {
  optional string details = 3;
}

message SuccessfulUpdate {
}

message ResourceDescription {
  google.protobuf.Timestamp created_at = 1;
  uint64 resource_id = 2;
  string resource_owner = 3;
  string resource_name = 4;
}

message OplogRegion {
  uint64 start = 1;
  uint64 end = 2;
}
