syntax = "proto3";

package golem.auth;

import "golem/common/account_id.proto";
import "golem/account/plan_id.proto";
import "golem/auth/account_role.proto";
import "golem/common/empty.proto";
import "golem/common/uuid.proto";

message AuthGrantSurface {
  repeated bytes positive = 1;
  repeated bytes negative = 2;
}

message AuthEffectiveSurface {
  repeated golem.common.UUID source_card_ids = 1;
  repeated AuthGrantSurface lower = 2;
  repeated AuthGrantSurface upper = 3;
}

message UserAuthCtx {
  golem.common.AccountId account_id = 1;
  golem.account.PlanId plan_id = 2;
  repeated AccountRole account_roles = 3;
  AuthEffectiveSurface effective_surface = 4;
  string account_email = 5;
}

message AgentAuthCtx {
  golem.common.AccountId account_id = 1;
  string account_email = 2;
  AuthEffectiveSurface effective_surface = 3;
}

message AdminImpersonationAuthCtx {
  golem.common.AccountId admin_account_id = 1;
  golem.common.AccountId target_account_id = 2;
  repeated AccountRole target_account_roles = 3;
  golem.account.PlanId target_account_plan_id = 4;
  AuthEffectiveSurface effective_surface = 5;
  string target_account_email = 6;
}

message AuthCtx {
  oneof value {
    golem.common.Empty system = 1;
    UserAuthCtx user = 2;
    AgentAuthCtx agent = 3;
    AdminImpersonationAuthCtx admin_impersonation = 4;
  }
}
