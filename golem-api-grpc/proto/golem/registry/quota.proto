syntax = "proto3";

package golem.registry;

import "golem/common/uuid.proto";
import "golem/component/agent.proto";
import "golem/component/component_id.proto";
import "golem/common/environment.proto";
import "wasm/rpc/type.proto";
import "wasm/rpc/val.proto";

message ResourceDefinitionId {
  golem.common.UUID value = 1;
}

enum EnforcementAction {
  ENFORCEMENT_ACTION_UNKNOWN = 0;
  ENFORCEMENT_ACTION_REJECT = 1;
  ENFORCEMENT_ACTION_THROTTLE = 2;
  ENFORCEMENT_ACTION_TERMINATE = 3;
}

enum TimePeriod {
  TIME_PERIOD_UNKNOWN = 0;
  TIME_PERIOD_SECOND = 1;
  TIME_PERIOD_MINUTE = 2;
  TIME_PERIOD_HOUR = 3;
  TIME_PERIOD_DAY = 4;
  TIME_PERIOD_MONTH = 5;
  TIME_PERIOD_YEAR = 6;
}

message ResourceLimit {
  oneof kind {
    Rate rate = 1;
    Capacity capacity = 2;
    Concurrency concurrency = 3;
  }

  message Rate {
    uint64 value = 1;
    TimePeriod period = 2;
  }

  message Capacity {
    uint64 value = 1;
  }

  message Concurrency {
    uint64 value = 1;
  }
}

message ResourceDefinition {
  ResourceDefinitionId resource_definition_id = 1;
  uint64 revision = 2;
  golem.common.EnvironmentId environment_id = 3;
  string name = 4;

  EnforcementAction enforcement_action = 5;
  ResourceLimit resource_limit = 6;

  string unit = 7;
  string units = 8;
}
