syntax = "proto3";

package golem.registry.v1;

import "golem/auth/auth_ctx.proto";
import "golem/auth/auth_details_for_environment.proto";
import "golem/common/account_id.proto";
import "golem/common/application.proto";
import "golem/common/empty.proto";
import "golem/common/environment.proto";
import "golem/common/resource_limits.proto";
import "golem/common/uuid.proto";
import "golem/component/agent.proto";
import "golem/component/agent_files.proto";
import "golem/component/component.proto";
import "golem/component/component_id.proto";
import "golem/customapi/core.proto";
import "golem/mcp/core.proto";
import "golem/registry/agent.proto";
import "golem/registry/environment_state.proto";
import "golem/common/quota.proto";
import "golem/registry/resource_usage_update.proto";
import "golem/registry/v1/registry_service_error.proto";
import "golem/worker/worker_id.proto";

service RegistryService {
  // auth api
  rpc AuthenticateToken (AuthenticateTokenRequest) returns (AuthenticateTokenResponse);
  rpc GetAuthDetailsForEnvironment (GetAuthDetailsForEnvironmentRequest) returns (GetAuthDetailsForEnvironmentResponse);

  // limits api
  rpc GetResourceLimits (GetResourceLimitsRequest) returns (GetResourceLimitsResponse);
  rpc UpdateWorkerConnectionLimit (UpdateWorkerConnectionLimitRequest) returns (UpdateWorkerConnectionLimitResponse);
  rpc BatchUpdateResourceUsage (BatchUpdateResourceUsageRequest) returns (BatchUpdateResourceUsageResponse);

  // components api
  rpc DownloadComponent (DownloadComponentRequest) returns (stream DownloadComponentResponse);
  rpc GetComponentMetadata(GetComponentMetadataRequest) returns (GetComponentMetadataResponse);
  rpc GetDeployedComponentMetadata (GetDeployedComponentMetadataRequest) returns (GetDeployedComponentMetadataResponse);
  rpc GetAllDeployedComponentRevisions (GetAllDeployedComponentRevisionsRequest) returns (GetAllDeployedComponentRevisionsResponse);
  rpc ResolveComponent (ResolveComponentRequest) returns (ResolveComponentResponse);

  // agent types api
  rpc GetAllAgentTypes (GetAllAgentTypesRequest) returns (GetAllAgentTypesResponse);
  rpc GetAgentType (GetAgentTypeRequest) returns (GetAgentTypeResponse);
  rpc ResolveAgentTypeByNames(ResolveAgentTypeByNamesRequest)
      returns (ResolveAgentTypeByNamesResponse);

  // current deployment agents/routes
  rpc GetActiveRoutesForDomain (GetActiveRoutesForDomainRequest) returns (GetActiveRoutesForDomainResponse);
  rpc GetActiveMcpForDomain (GetActiveMcpForDomainRequest) returns (GetActiveMcpForDomainResponse);
  rpc GetCurrentEnvironmentState (GetCurrentEnvironmentStateRequest) returns (GetCurrentEnvironmentStateResponse);

  // quotas api
  rpc GetResourceDefinitionById (GetResourceDefinitionByIdRequest) returns (GetResourceDefinitionByIdResponse);
  rpc GetResourceDefinitionByName (GetResourceDefinitionByNameRequest) returns (GetResourceDefinitionByNameResponse);

  // registry invalidation stream — multiplexed event types
  rpc SubscribeRegistryInvalidations(SubscribeRegistryInvalidationsRequest)
      returns (stream RegistryInvalidationEvent);
}

message AuthenticateTokenRequest {
  string secret = 1;
}

message AuthenticateTokenResponse {
  oneof result {
      AuthenticateTokenSuccessResponse success = 1;
      RegistryServiceError error = 2;
  }
}

message AuthenticateTokenSuccessResponse {
    golem.auth.UserAuthCtx auth_ctx = 1;
}

message GetAuthDetailsForEnvironmentRequest {
  golem.common.EnvironmentId environment_id = 1;
  bool include_deleted = 2;
  golem.auth.AuthCtx auth_ctx = 3;
}

message GetAuthDetailsForEnvironmentResponse {
  oneof result {
      GetAuthDetailsForEnvironmentSuccessResponse success = 1;
      RegistryServiceError error = 2;
  }
}

message GetAuthDetailsForEnvironmentSuccessResponse {
  golem.auth.AuthDetailsForEnvironment auth_details_for_environment = 1;
}

message GetResourceLimitsRequest {
  golem.common.AccountId accountId = 1;
}

message GetResourceLimitsResponse {
  oneof result {
    GetResourceLimitsSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetResourceLimitsSuccessResponse {
  golem.common.ResourceLimits limits = 1;
}

message UpdateWorkerConnectionLimitRequest {
  golem.common.AccountId accountId = 1;
  golem.worker.AgentId agentId = 2;
  bool added = 3;
}

message UpdateWorkerConnectionLimitResponse {
  oneof result {
    golem.common.Empty success = 1;
    RegistryServiceError error = 2;
  }
}

message BatchUpdateResourceUsageRequest {
  repeated golem.registry.ResourceUsageUpdate updates = 1;
}

message BatchUpdateResourceUsageResponse {
  oneof result {
    BatchUpdateResourceUsageSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message BatchUpdateResourceUsageSuccessResponse {
  golem.common.AccountResourceLimits account_resource_limits = 1;
}

message DownloadComponentRequest {
  golem.component.ComponentId componentId = 1;
  uint64 revision = 2;
}

message DownloadComponentResponse {
  oneof result {
    bytes successChunk = 1;
    RegistryServiceError error = 2;
  }
}

message GetComponentMetadataRequest {
  golem.component.ComponentId componentId = 1;
  uint64 revision = 2;
}

message GetComponentMetadataResponse {
  oneof result {
    GetComponentMetadataSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetComponentMetadataSuccessResponse {
  golem.component.Component component = 1;
}

message GetDeployedComponentMetadataRequest {
  golem.component.ComponentId componentId = 1;
}

message GetDeployedComponentMetadataResponse {
  oneof result {
    GetDeployedComponentMetadataSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetDeployedComponentMetadataSuccessResponse {
  golem.component.Component component = 1;
}

message GetAllDeployedComponentRevisionsRequest {
  golem.component.ComponentId componentId = 1;
}

message GetAllDeployedComponentRevisionsResponse {
  oneof result {
    GetAllDeployedComponentRevisionsSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetAllDeployedComponentRevisionsSuccessResponse {
  repeated golem.component.Component components = 1;
}

message ResolveComponentRequest {
  golem.common.AccountId resolving_account_id = 1;
  golem.common.ApplicationId resolving_application_id = 2;
  golem.common.EnvironmentId resolving_environment_id = 3;
  string component_slug = 4;
}

message ResolveComponentResponse {
  oneof result {
    ResolveComponentSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message ResolveComponentSuccessResponse {
  golem.component.Component component = 1;
}

message GetAllAgentTypesRequest {
  golem.common.EnvironmentId environment_id = 1;
  golem.component.ComponentId component_id = 2;
  uint64 component_revision = 3;
}

message GetAllAgentTypesResponse {
  oneof result {
    GetAllAgentTypesSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetAllAgentTypesSuccessResponse {
  repeated RegisteredAgentType agent_types = 1;
}

message GetAgentTypeRequest {
  golem.common.EnvironmentId environment_id = 1;
  golem.component.ComponentId component_id = 2;
  uint64 component_revision = 3;
  string agentType = 4;
}

message GetAgentTypeResponse {
  oneof result {
    GetAgentTypeSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetAgentTypeSuccessResponse {
  RegisteredAgentType agent_type = 1;
}

message ResolveAgentTypeByNamesRequest {
  string app_name = 1;
  string environment_name = 2;
  string agent_type_name = 3;
  // If set, resolves at this concrete deployment revision. If omitted,
  // resolves at the latest current deployment.
  optional uint64 deployment_revision = 4;
  optional string owner_account_email = 5;
  golem.auth.AuthCtx auth_ctx = 6;
}

message ResolveAgentTypeByNamesResponse {
  oneof result {
    ResolveAgentTypeByNamesSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message ResolveAgentTypeByNamesSuccessResponse {
  RegisteredAgentType agent_type = 1;
  golem.common.EnvironmentId environment_id = 2;
  uint64 deployment_revision = 3;
  // Present only when request.deployment_revision is not set.
  optional uint64 current_deployment_revision = 4;
}

message GetActiveRoutesForDomainRequest {
  string domain = 1;
}

message GetActiveMcpForDomainRequest {
  string domain = 1;
}

message GetActiveRoutesForDomainResponse {
  oneof result {
    GetActiveRoutesForDomainSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetActiveMcpForDomainResponse {
  oneof result {
    GetActiveMcpForDomainSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetActiveRoutesForDomainSuccessResponse {
  golem.customapi.CompiledRoutes compiled_routes = 1;
}

message GetActiveMcpForDomainSuccessResponse {
  golem.mcp.CompiledMcp compiled_mcp = 1;
}

message GetCurrentEnvironmentStateRequest {
  golem.common.EnvironmentId environment_id = 1;
}

message GetCurrentEnvironmentStateResponse {
  oneof result {
    GetCurrentEnvironmentStateSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetCurrentEnvironmentStateSuccessResponse {
  EnvironmentState environment_state = 1;
}

message GetResourceDefinitionByIdRequest {
  golem.common.ResourceDefinitionId resource_definition_id = 1;
}

message GetResourceDefinitionByIdResponse {
  oneof result {
    GetResourceDefinitionByIdSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetResourceDefinitionByIdSuccessResponse {
  golem.common.ResourceDefinition resource_definition = 1;
}

message GetResourceDefinitionByNameRequest {
  golem.common.EnvironmentId environment_id = 1;
  string name = 2;
}

message GetResourceDefinitionByNameResponse {
  oneof result {
    GetResourceDefinitionByNameSuccessResponse success = 1;
    RegistryServiceError error = 2;
  }
}

message GetResourceDefinitionByNameSuccessResponse {
  golem.common.ResourceDefinition resource_definition = 1;
}

// ── Multiplexed registry invalidation stream ──

message SubscribeRegistryInvalidationsRequest {
  // The event_id of the last event the client successfully processed.
  // If omitted, the server starts streaming from live events only (no replay).
  optional uint64 last_seen_event_id = 1;
}

// Streamed to worker-service subscribers when any registry state changes.
// Each event carries exactly one payload variant.
message RegistryInvalidationEvent {
  uint64 event_id = 1;
  oneof payload {
    CursorExpiredEvent cursor_expired = 2;
    DeploymentChangedEvent deployment_changed = 3;
    AccountTokensInvalidatedEvent account_tokens_invalidated = 4;
    EnvironmentPermissionsChangedEvent permissions_changed = 5;
    DomainRegistrationChangedEvent domain_registration_changed = 6;
    SecuritySchemeChangedEvent security_scheme_changed = 7;
    ResourceDefinitionChangedEvent resource_definition_changed = 8;
    RetryPolicyChangedEvent retry_policy_changed = 9;
    AgentSecretChangedEvent agent_secret_changed = 10;
    ApplicationDeletedEvent application_deleted = 11;
    EnvironmentDeletedEvent environment_deleted = 12;
  }
}

// Sent when the client's cursor is older than the server's retention window.
// The client must flush all caches and use this event's event_id as its new cursor.
message CursorExpiredEvent {}

// Sent when the current deployment for an environment changes.
message DeploymentChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
  uint64 deployment_revision = 2;
  uint64 current_deployment_revision = 3;
}

// Sent when domain registrations change (create/delete).
message DomainRegistrationChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
  repeated string domains = 2;
}

// Sent when an account's tokens are invalidated (token deleted or account soft-deleted).
message AccountTokensInvalidatedEvent {
  golem.common.AccountId account_id = 1;
}

// Sent when environment sharing permissions change (create/update/delete share).
message EnvironmentPermissionsChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
  golem.common.AccountId grantee_account_id = 2;
}

// Sent when a security scheme is created, updated, or deleted.
message SecuritySchemeChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
}

// Sent when a resource definition is created, updated, or deleted.
message ResourceDefinitionChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
  golem.common.ResourceDefinitionId resource_definition_id = 2;
  string resource_name = 3;
}

// Sent when an environment retry policy is created, updated, or deleted.
message RetryPolicyChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
}

// Sent when an environment agent secret is created, updated, or deleted.
message AgentSecretChangedEvent {
  golem.common.EnvironmentId environment_id = 1;
}

// Sent when an application is soft-deleted so subscribers can flush any
// caches keyed on the application's name.
message ApplicationDeletedEvent {
  golem.common.ApplicationId application_id = 1;
  golem.common.AccountId account_id = 2;
}

// Sent when an environment is soft-deleted so subscribers can flush any
// caches scoped to the environment.
message EnvironmentDeletedEvent {
  golem.common.EnvironmentId environment_id = 1;
}
