syntax = "proto3";

package golem.registry;

import "golem/common/uuid.proto";

message SecuritySchemeId {
  golem.common.UUID value = 1;
}

message SecuritySchemeProvider {
  oneof kind {
    Google google = 1;
    Facebook facebook = 2;
    Microsoft microsoft = 3;
    Gitlab gitlab = 4;
    CustomProvider custom = 5;
  }

  message Google {}
  message Facebook {}
  message Microsoft {}
  message Gitlab {}
  message CustomProvider {
    string name = 1;
    string issuer_url = 2;
  }
}
