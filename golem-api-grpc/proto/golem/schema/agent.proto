syntax = "proto3";

package golem.schema;

import "golem/common/empty.proto";
import "golem/component/agent.proto";
import "golem/schema/schema.proto";

// Schema-layer mirror of the agent I/O surface from
// golem-common/src/schema/agent. Non-schema fields (mode, http mount/endpoint,
// read-only, snapshotting, config) are carried verbatim from the legacy
// golem.component agent messages during the transition.

// InputSchema = Parameters(list<NamedField>). Modelled as a message because
// there is only a single case.
message InputSchema {
  repeated NamedField parameters = 1;
}

message NamedField {
  string name = 1;
  FieldSource source = 2;
  SchemaType schema = 3;
  MetadataEnvelope metadata = 4;
}

message FieldSource {
  oneof source {
    golem.common.Empty user_supplied = 1;
    AutoInjectedKind auto_injected = 2;
  }
}

enum AutoInjectedKind {
  AUTO_INJECTED_KIND_UNSPECIFIED = 0;
  AUTO_INJECTED_KIND_PRINCIPAL = 1;
}

message OutputSchema {
  oneof output {
    golem.common.Empty unit = 1;
    SchemaType single = 2;
  }
}

message AgentConstructorSchema {
  optional string name = 1;
  string description = 2;
  optional string prompt_hint = 3;
  InputSchema input_schema = 4;
}

message AgentMethodSchema {
  string name = 1;
  string description = 2;
  optional string prompt_hint = 3;
  InputSchema input_schema = 4;
  OutputSchema output_schema = 5;
  repeated golem.component.HttpEndpointDetails http_endpoint = 6;
  optional golem.component.ReadOnlyConfig read_only = 7;
}

message AgentDependencySchema {
  string type_name = 1;
  optional string description = 2;
  SchemaGraph schema = 3;
  AgentConstructorSchema constructor = 4;
  repeated AgentMethodSchema methods = 5;
}

message AgentTypeSchema {
  string type_name = 1;
  string description = 2;
  string source_language = 3;
  SchemaGraph schema = 4;
  AgentConstructorSchema constructor = 5;
  repeated AgentMethodSchema methods = 6;
  repeated AgentDependencySchema dependencies = 7;
  golem.component.AgentMode mode = 8;
  optional golem.component.HttpMountDetails http_mount = 9;
  golem.component.Snapshotting snapshotting = 10;
  repeated golem.component.AgentConfigDeclaration config = 11;
}
