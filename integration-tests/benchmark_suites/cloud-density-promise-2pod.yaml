# Cross-pod promise-completion routing calibration. The workflow enforces two
# worker-executor replicas; the driver labels these cells as the 2-pod topology.
name: cloud-density-promise-2pod
section: promise
defaultRamp: [1, 2, 4, 8, 16, 32, 64, 128, 256]
cells:
  - { name: promise-medium-cold-rust-2pod, enabled: true, payloadSize: 16777216, waiterPresence: cold, runtime: rust, ramp: [1, 2, 4] }
  - { name: promise-medium-warm-rust-2pod, enabled: true, payloadSize: 16777216, waiterPresence: warm, runtime: rust, ramp: [1, 2, 4] }
  - { name: promise-medium-mixed-rust-2pod, enabled: true, payloadSize: 16777216, waiterPresence: mixed, runtime: rust, ramp: [1, 2, 4] }
