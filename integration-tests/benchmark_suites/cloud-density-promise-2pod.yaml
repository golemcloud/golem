# Cross-pod promise-completion routing calibration. The workflow enforces two
# worker-executor replicas; the driver labels these cells as the 2-pod topology.
name: cloud-density-promise-2pod
section: promise
defaultRamp: [1, 2, 4, 8, 16, 32, 64, 128, 256]
cells:
  - { name: promise-medium-cold-2pod, payloadSize: 16777216, waiterPresence: cold }
  - { name: promise-medium-warm-2pod, payloadSize: 16777216, waiterPresence: warm }
  - { name: promise-medium-mixed-2pod, payloadSize: 16777216, waiterPresence: mixed }
