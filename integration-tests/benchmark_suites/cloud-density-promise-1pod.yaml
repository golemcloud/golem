# Promise-completion density on one worker-executor pod. The workflow drives
# each cell independently and passes these values to `benchmarks density`.
# Focused warm-path rerun after worker system-EBS baseline increase.
name: cloud-density-promise-1pod
section: promise
defaultRamp: [2, 4, 8, 16, 32, 64, 128, 256]
cells:
  - { name: promise-tiny-cold-1pod, enabled: false, payloadSize: 256, waiterPresence: cold }
  - { name: promise-tiny-warm-rust-1pod, enabled: true, payloadSize: 256, waiterPresence: warm }
  - { name: promise-tiny-mixed-1pod, enabled: false, payloadSize: 256, waiterPresence: mixed }
  - { name: promise-small-cold-1pod, enabled: false, payloadSize: 65536, waiterPresence: cold, snapshotting: disabled }
  - { name: promise-small-warm-1pod, enabled: false, payloadSize: 65536, waiterPresence: warm, snapshotting: disabled }
  - { name: promise-small-mixed-1pod, enabled: false, payloadSize: 65536, waiterPresence: mixed, snapshotting: disabled }
  - { name: promise-medium-cold-1pod, enabled: false, payloadSize: 16777216, waiterPresence: cold, snapshotting: disabled }
  - { name: promise-medium-warm-1pod, enabled: false, payloadSize: 16777216, waiterPresence: warm, snapshotting: disabled }
  - { name: promise-medium-mixed-1pod, enabled: false, payloadSize: 16777216, waiterPresence: mixed, snapshotting: disabled }
  - { name: promise-huge-cold-1pod, enabled: false, payloadSize: 32505856, waiterPresence: cold, snapshotting: disabled }
  - { name: promise-huge-warm-1pod, enabled: false, payloadSize: 32505856, waiterPresence: warm, snapshotting: disabled }
  - { name: promise-huge-mixed-1pod, enabled: false, payloadSize: 32505856, waiterPresence: mixed, snapshotting: disabled }
