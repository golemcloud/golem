# Cloud agent-density benchmark suite (golemcloud/golem#3523).
#
# Unlike cloud-perf (which is run by the benchmark binary's `suite` runner),
# agent-density is driven cell-by-cell by the buildspec: each cell needs a
# clean, freshly-restarted executor (the between-cell transition scales the
# executor to 0, wipes the running-workers/schedule keyvalue namespaces, and
# scales back). The buildspec therefore invokes the benchmark binary once per
# cell via the `density` subcommand and uploads each cell's result to S3 as it
# completes.
#
# This file is the canonical, ordered list of cells. The buildspec reads it
# (with yq) to obtain each cell's `density --action cell` arguments. The
# benchmark binary itself is cell-agnostic — it takes the axes as CLI flags
# (`--scenario`, `--agent-mode`, `--sharing`, `--active-fraction`, `--prefill`,
# `--ramp`), so this file alone defines the matrix the buildspec iterates.
#
# NOTE: temporarily trimmed to two cells while investigating a worker-executor
# resume deadlock (see the `cells:` comment below). The full 26-cell matrix is
# in git history; restore it once the deadlock is fixed.
#
# The agent count is NOT a fixed suite parameter: each cell ramps the agent
# count internally along its `ramp` (a per-cell list overriding the top-level
# `defaultRamp`) until the ceiling-detection state machine reports a
# catastrophic ceiling or the ramp is exhausted.
#
# Per-cell invocation shape (the buildspec fills in the cloud flags, the
# executor pod name, and the resolved `--ramp` from this file):
#
#   benchmarks density \
#     --action cell \
#     --section agent \
#     --prep-manifest prep-manifest.json \
#     --scenario <scenario> \
#     --agent-mode <durable|ephemeral> \
#     --sharing <shared|per-agent> \
#     --ramp 100,250,500,1000,... \
#     [--active-fraction <pct>] \
#     [--prefill <n>] \
#     --executor-pod-name <pod> \
#     --save-to-json cell-NN-<name>.json \
#     cloud --api-url ... --apps-base-domain ... --admin-account-token ...

name: cloud-density-agent
section: agent

# Agent-count ramp every cell walks unless it overrides `ramp` below. This is a
# stress test: tune these freely. A cell stops at the first catastrophic ceiling
# or when the ramp is exhausted (recorded as terminatedReason=upper_bound_hit).
#
# `defaultRamp` is used by the shared-component cells, which exercise pure
# resident-agent capacity (one shared component, no component-cache pressure) and
# can climb high. Resolution is concentrated around the ~500-1500 per-pod knee
# observed in cloud-perf (halved for single-pod), then coarsens.
#
# The per-agent-component cells inline a lower `ramp` (capped at 1000): each
# agent gets its own component, thrashing the executor's compiled-component
# cache (default 32 entries), so the knee is expected in the low hundreds, and
# density-prep only uploads 999 distinct components. The ramp is inlined per
# cell rather than shared via a YAML anchor because the buildspec's yq does not
# reliably resolve aliases on read.
defaultRamp: [100, 250, 500, 750, 1000, 1500, 2000, 3000, 4000, 6000, 8000, 10000]

cells:
  # Temporarily trimmed to the two cells that bracket the worker-executor
  # resume deadlock under investigation: the run completed
  # `create-with-active-durable-shared-component-active-25pct` and then wedged
  # during the between-cell resume at the start of
  # `create-with-active-durable-shared-component-active-50pct`. Keeping only
  # these two reproduces the hang quickly on a tokio_unstable debug image so a
  # SIGUSR1 task dump can be captured. Restore the full matrix (see git history
  # and `all_cells()` in agent.rs) once the deadlock is fixed.
  - name: create-with-active-durable-shared-component-active-25pct
    scenario: create-with-active
    agentMode: durable
    sharing: shared
    activeFraction: 25
  - name: create-with-active-durable-shared-component-active-50pct
    scenario: create-with-active
    agentMode: durable
    sharing: shared
    activeFraction: 50
