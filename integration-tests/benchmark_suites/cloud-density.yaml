# Cloud agent-density benchmark suite (golemcloud/golem#3523).
#
# Unlike cloud-perf (which is run by the benchmark binary's `suite` runner),
# agent-density is driven cell-by-cell by the buildspec: the buildspec invokes
# the benchmark binary once per cell via the `density` subcommand and uploads
# each cell's result to S3 as it completes. Each cell starts from a clean
# executor because the driver deletes every agent it created at the end of the
# cell (via the worker-service delete API, which removes the agent from the
# executor's running-workers set), so the next cell sees no leftover state.
#
# The buildspec reads this file (with yq) to obtain each cell's `density
# --action cell` arguments. Keep it in sync with `all_cells()` in
# integration-tests/src/benchmarks/density/agent.rs — the Rust matrix is the
# source of truth for the axes; this file mirrors it for the buildspec loop.
#
# The agent count is NOT a fixed suite parameter: each cell walks its `ramp` (a
# per-cell list overriding the top-level `defaultRamp`) until the
# ceiling-detection state machine reports a catastrophic ceiling or the ramp is
# exhausted. Each ramp value is an independent concurrent invocation/replay
# target: the driver measures that target, cleans up its durable agents, then
# advances.
#
# Per-cell invocation shape (the buildspec fills in the cloud flags, the
# executor pod name, and the resolved `--ramp` from this file):
#
#   benchmarks density \
#     --action cell \
#     --section agent \
#     --prep-manifest prep-manifest.json \
#     --scenario <scenario> \
#     --agent-mode <durable|ephemeral> \
#     --sharing <shared|per-agent> \
#     --ramp 100,250,500,1000,... \
#     [--active-fraction <pct>] \
#     [--prefill <n>] \
#     [--snapshotting <disabled|enabled>] \
#     --executor-pod-name <pod> \
#     --save-to-json cell-NN-<name>.json \
#     cloud --api-url ... --apps-base-domain ... --admin-account-token ...

name: cloud-density-agent
section: agent

# Agent-count ramp used by cells that do not specify `ramp` below. The active
# cells inline their 2000-agent first-pass cap; create-only cells inline their
# idle-density ramps. The ramp is inlined per cell rather than shared via a YAML
# anchor because the buildspec's yq does not reliably resolve aliases on read.
defaultRamp: [50, 100, 250, 500, 1000, 2000]

cells:
  # Scenario 1 — create-only: create N idle agents, each invoked once with
  # increment and then left idle. Measures how many idle agents can be packed on
  # the pod. 2 modes x 2 sharing.
  # - name: create-only-durable-shared-component
  #   scenario: create-only
  #   agentMode: durable
  #   sharing: shared
  #   ramp: [100, 250, 500, 1000, 2000, 4000, 6000, 8000, 9000, 10000]
  # - name: create-only-durable-per-agent-component
  #   scenario: create-only
  #   agentMode: durable
  #   sharing: per-agent
  #   ramp: [100, 250, 500, 1000, 2000]
  # - name: create-only-ephemeral-shared-component
  #   scenario: create-only
  #   agentMode: ephemeral
  #   sharing: shared
  #   ramp: [100, 250, 500, 1000, 2000, 4000, 6000, 8000, 9000, 10000]
  # - name: create-only-ephemeral-per-agent-component
  #   scenario: create-only
  #   agentMode: ephemeral
  #   sharing: per-agent
  #   ramp: [100, 250, 500, 1000, 2000]

  # Scenario 2 — create-with-active-fraction: for each independent ramp target
  # N, activeFraction% of agents run busy_for(250ms) while the remaining agents
  # are measured with increment. activeFraction=0 means all N agents are measured
  # concurrently with no background busy agents. The first measured round records
  # cold latency; the next 50 rounds record warm latency. 2 modes x 2 sharing x 4
  # fractions.
  # - name: create-with-active-durable-shared-component-active-0pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 0
  # - name: create-with-active-durable-shared-component-active-25pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 25
  # - name: create-with-active-durable-shared-component-active-50pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 50
  # - name: create-with-active-durable-shared-component-active-75pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 75
  # - name: create-with-active-durable-per-agent-component-active-0pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 0
  # - name: create-with-active-durable-per-agent-component-active-25pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 25
  # - name: create-with-active-durable-per-agent-component-active-50pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 50
  # - name: create-with-active-durable-per-agent-component-active-75pct
  #   scenario: create-with-active
  #   agentMode: durable
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 75
  # - name: create-with-active-ephemeral-shared-component-active-0pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 0
  # - name: create-with-active-ephemeral-shared-component-active-25pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 25
  # - name: create-with-active-ephemeral-shared-component-active-50pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 50
  # - name: create-with-active-ephemeral-shared-component-active-75pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: shared
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 75
  # - name: create-with-active-ephemeral-per-agent-component-active-0pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 0
  # - name: create-with-active-ephemeral-per-agent-component-active-25pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 25
  # - name: create-with-active-ephemeral-per-agent-component-active-50pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 50
  # - name: create-with-active-ephemeral-per-agent-component-active-75pct
  #   scenario: create-with-active
  #   agentMode: ephemeral
  #   sharing: per-agent
  #   ramp: [50, 100, 250, 500, 1000, 2000]
  #   activeFraction: 75

  # Scenario 4 — resume-under-saturation: keep 250 durable agents fixed. For
  # each independent ramp target N, every agent performs N cheap host calls in
  # one oplog-heavy invocation, then the executor is restarted and all 250 agents
  # are resumed concurrently with increment. The ramp finds max oplog entries per
  # agent before replay hits timeout/ceiling. Shared component only; axis is
  # snapshotting disabled/enabled.
  - name: resume-under-saturation-durable-shared-component-snapshot-disabled-prefill-250
    scenario: resume-under-saturation
    agentMode: durable
    sharing: shared
    snapshotting: disabled
    ramp: [1000, 2500, 5000, 7500, 10000, 15000]
    prefill: 250
  - name: resume-under-saturation-durable-shared-component-snapshot-enabled-prefill-250
    scenario: resume-under-saturation
    agentMode: durable
    sharing: shared
    snapshotting: enabled
    ramp: [100000, 170000, 250000, 500000, 1000000]
    prefill: 250
