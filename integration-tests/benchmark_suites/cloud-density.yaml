# Cloud agent-density benchmark suite (golemcloud/golem#3523).
#
# Unlike cloud-perf (which is run by the benchmark binary's `suite` runner),
# agent-density is driven cell-by-cell by the buildspec: the buildspec invokes
# the benchmark binary once per cell via the `density` subcommand and uploads
# each cell's result to S3 as it completes. Each cell starts from a clean
# executor because the driver deletes every agent it created at the end of the
# cell (via the worker-service delete API, which removes the agent from the
# executor's running-workers set), so the next cell sees no leftover state.
#
# This file is the canonical, ordered list of the 26 cells. The buildspec reads
# it (with yq) to obtain each cell's `density --action cell` arguments. Keep it
# in sync with `all_cells()` in
# integration-tests/src/benchmarks/density/agent.rs — the Rust matrix is the
# source of truth for the axes; this file mirrors it for the buildspec loop.
#
# The agent count is NOT a fixed suite parameter: each cell ramps the agent
# count internally along its `ramp` (a per-cell list overriding the top-level
# `defaultRamp`) until the ceiling-detection state machine reports a
# catastrophic ceiling or the ramp is exhausted.
#
# Per-cell invocation shape (the buildspec fills in the cloud flags, the
# executor pod name, and the resolved `--ramp` from this file):
#
#   benchmarks density \
#     --action cell \
#     --section agent \
#     --prep-manifest prep-manifest.json \
#     --scenario <scenario> \
#     --agent-mode <durable|ephemeral> \
#     --sharing <shared|per-agent> \
#     --ramp 100,250,500,1000,... \
#     [--active-fraction <pct>] \
#     [--prefill <n>] \
#     --executor-pod-name <pod> \
#     --save-to-json cell-NN-<name>.json \
#     cloud --api-url ... --apps-base-domain ... --admin-account-token ...

name: cloud-density-agent
section: agent

# Agent-count ramp every cell walks unless it overrides `ramp` below. This is a
# stress test: tune these freely. A cell stops at the first catastrophic ceiling
# or when the ramp is exhausted (recorded as terminatedReason=upper_bound_hit).
#
# `defaultRamp` is used by the shared-component cells, which exercise pure
# resident-agent capacity (one shared component, no component-cache pressure) and
# can climb high. Resolution is concentrated around the ~500-1500 per-pod knee
# observed in cloud-perf (halved for single-pod), then coarsens.
#
# The per-agent-component cells inline a lower `ramp` (capped at 1000): each
# agent gets its own component, thrashing the executor's compiled-component
# cache (default 32 entries), so the knee is expected in the low hundreds, and
# density-prep only uploads 999 distinct components. The ramp is inlined per
# cell rather than shared via a YAML anchor because the buildspec's yq does not
# reliably resolve aliases on read.
defaultRamp: [100, 250, 500, 750, 1000, 1500, 2000, 3000, 4000, 6000, 8000, 10000]

cells:
  # NOTE: per-agent-component cells are temporarily removed from this suite to
  # isolate shared-component behaviour. The per-agent cells collapse in the low
  # hundreds-to-1000 because each live worker pins its own compiled
  # wasmtime::component::Component image (the cap-32 compiled-component cache does
  # not free an image while a worker still references it), so loading 1000
  # distinct components holds ~1000 distinct compiled images resident. Running
  # only the shared cells confirms whether the shared path scales (as cell 1's
  # ~8600 suggests) and whether the per-agent collapse is the heavy-pinning cost
  # or a leak in the load/invoke-1000-distinct-components path.

  # Scenario 1 — create-only: create N idle agents, each invoked once then left
  # to drift to LoadedIdle. Measures the create path.
  - name: create-only-durable-shared-component
    scenario: create-only
    agentMode: durable
    sharing: shared
  - name: create-only-ephemeral-shared-component
    scenario: create-only
    agentMode: ephemeral
    sharing: shared

  # Scenario 2 — create-with-active-fraction: like scenario 1, but a fraction of
  # the agents are kept active (one in-flight busy_for(500ms) call each,
  # looping). 2 modes x 3 fractions (25/50/75).
  - name: create-with-active-durable-shared-component-active-25pct
    scenario: create-with-active
    agentMode: durable
    sharing: shared
    activeFraction: 25
  - name: create-with-active-durable-shared-component-active-50pct
    scenario: create-with-active
    agentMode: durable
    sharing: shared
    activeFraction: 50
  - name: create-with-active-durable-shared-component-active-75pct
    scenario: create-with-active
    agentMode: durable
    sharing: shared
    activeFraction: 75
  - name: create-with-active-ephemeral-shared-component-active-25pct
    scenario: create-with-active
    agentMode: ephemeral
    sharing: shared
    activeFraction: 25
  - name: create-with-active-ephemeral-shared-component-active-50pct
    scenario: create-with-active
    agentMode: ephemeral
    sharing: shared
    activeFraction: 50
  - name: create-with-active-ephemeral-shared-component-active-75pct
    scenario: create-with-active
    agentMode: ephemeral
    sharing: shared
    activeFraction: 75

  # Scenario 3 — concurrent-active: all N agents kept active concurrently.
  - name: concurrent-active-durable-shared-component
    scenario: concurrent-active
    agentMode: durable
    sharing: shared
  - name: concurrent-active-ephemeral-shared-component
    scenario: concurrent-active
    agentMode: ephemeral
    sharing: shared

  # Scenario 4 — resume-under-saturation (durable-only): pre-fill N idle agents
  # to force eviction, then measure resume-vs-create latency under memory
  # pressure. durable x 3 pre-fill values (500/1000/2000).
  - name: resume-under-saturation-durable-shared-component-prefill-500
    scenario: resume-under-saturation
    agentMode: durable
    sharing: shared
    prefill: 500
  - name: resume-under-saturation-durable-shared-component-prefill-1000
    scenario: resume-under-saturation
    agentMode: durable
    sharing: shared
    prefill: 1000
  - name: resume-under-saturation-durable-shared-component-prefill-2000
    scenario: resume-under-saturation
    agentMode: durable
    sharing: shared
    prefill: 2000
