# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json

# See https://learn.golem.cloud/docs/app-manifest#field-reference for field reference
# For creating APIs see https://learn.golem.cloud/invoke/making-custom-apis

app: agent-rpc

includes:
- ../golem-test-components-common.yaml

components:
  golem-it:agent-rpc-rust:
    dir: "golem-it-agent-rpc-rust"
    templates: rust, rust-test-component
  golem-it:agent-rpc:
    dir: "golem-it-agent-rpc"
    templates: ts, ts-test-component

environments:
  local:
    server: local
    componentPresets: debug
  cloud:
    server: cloud
    componentPresets: release
