[workspace]
resolver = "2"
members = ["components-rust/*", "common-rust/*"]

[profile.release]
opt-level = "s"
lto = true

[workspace.dependencies]

golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_golem_agentic"] }

# Advanced HTTP client, alternative of wstd::http
# golem-wasi-http = { version = "0.2.0", features = ["json"] }

log = { version = "0.4.29", features = ["kv"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wstd = {version = "=0.6.5", features = ["default", "json"] }
