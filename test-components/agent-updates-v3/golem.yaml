# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

app: agent-updates

includes:
- ../golem-test-components-common.yaml

components:
  it:agent-update:
    dir: "."
    templates: rust, rust-test-component
    presets:
      debug:
        customCommands:
          copy:
          - command: cp golem-temp/agents/it_agent_update_debug.wasm ../it_agent_update_v3_debug.wasm
      release:
        customCommands:
          copy:
          - command: cp golem-temp/agents/it_agent_update_release.wasm ../it_agent_update_v3_release.wasm

environments:
  local:
    server: local
    componentPresets: debug
  cloud:
    server: cloud
    componentPresets: release
