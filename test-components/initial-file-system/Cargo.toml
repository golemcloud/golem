[package]
name = "it_initial_file_system"
version = "0.0.1"
edition = "2021"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.87"
ctor = "0.4.0"
golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_golem_agentic"] }
golem-wasi-http = { version = "0.2.0", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wstd = { version = "=0.6.5", features = ["default", "json"] }
