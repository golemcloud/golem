manifestVersion: 1.5.0

componentTemplates:
  rust-test-component:
    presets:
      debug:
        customCommands:
          copy:
          - command: cp "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_debug.wasm" "{{ appRootDir }}/../{{ component_name | to_snake_case }}_debug.wasm"
      release:
        customCommands:
          copy:
          - command: cp "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_release.wasm" "{{ appRootDir }}/../{{ component_name | to_snake_case }}_release.wasm"
      quick:
        customCommands:
          copy:
          - command: cp "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_release.wasm" "{{ appRootDir }}/../{{ component_name | to_snake_case }}_release.wasm"
      optimized:
        customCommands:
          copy:
          - command: cp "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_release.wasm" "{{ appRootDir }}/../{{ component_name | to_snake_case }}_release.wasm"
  ts-test-component:
    customCommands:
      copy:
      - command: cp "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.wasm" "{{ appRootDir }}/../{{ component_name | to_snake_case }}.wasm"
