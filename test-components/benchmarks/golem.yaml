# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-dev.1/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: 1.5.0

app: benchmarks

includes:
- ../golem-test-components-common.yaml

componentTemplates:
  rust-test-build:
    presets:
      quick:
        build:
        - command: cargo build --target wasm32-wasip2 --release
          sources:
          - "{{ componentDir }}/src"
          - "{{ componentDir }}/Cargo.toml"
          targets:
          - "{{ cargoTarget }}/wasm32-wasip2/release/{{ component_name | to_snake_case }}.wasm"
        componentWasm: "{{ cargoTarget }}/wasm32-wasip2/release/{{ component_name | to_snake_case }}.wasm"
        outputWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_release.wasm"
      optimized:
        build:
        - command: cargo build --target wasm32-wasip2 --release
          sources:
          - "{{ componentDir }}/src"
          - "{{ componentDir }}/Cargo.toml"
          targets:
          - "{{ cargoTarget }}/wasm32-wasip2/release/{{ component_name | to_snake_case }}.wasm"
        componentWasm: "{{ cargoTarget }}/wasm32-wasip2/release/{{ component_name | to_snake_case }}.wasm"
        outputWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}_release.wasm"

components:
  benchmark:agent-rust:
    dir: "benchmark-agent-rust"
    templates: rust-test-build, rust-test-component
  benchmark:agent-ts:
    dir: "benchmark-agent-ts"
    templates: ts, ts-test-component

environments:
  local:
    server: local
    componentPresets: release
  cloud:
    server: cloud
    componentPresets: release
