[package]
name = "golem_it_http_tests"
version = "0.0.1"
 edition = "2024"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# To use common shared agent definitions, place them in common_lib and uncomment the line below
# common-lib = { path = "../../common-rust/common-lib" }

log = { version = "0.4.29", features = ["kv"] }
golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_golem_agentic"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["formatting"] }
wasi = { version = "=0.14.7+wasi-0.2.4" }
wasi-fetch = "=0.2.0"
# Must be the exact wit-bindgen version golem-rust generates the export glue with:
# `spawn` shares a process-global with the export glue and silently drops the
# spawned future when the versions differ (e.g. the one re-exported via wasip3).
wit-bindgen = { git = "https://github.com/golemcloud/wit-bindgen", branch = "golem-outline-lift-v0.58.0", version = "=0.59.0", features = ["async", "async-spawn"] }
futures-concurrency = "7.6.3"
futures-util = "0.3.31"
rand = "0.9.0"
wasi-logger = { version = "0.1.2", features = ["kv"] }
