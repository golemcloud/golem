[package]
name = "golem_it_agent_invocation_context"
version = "0.0.1"
 edition = "2024"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
log = { version = "0.4.29", features = ["kv"] }
golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_golem_agentic"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasip3 = "0.6.0"
