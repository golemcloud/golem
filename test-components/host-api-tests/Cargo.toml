[package]
name = "golem_it_host_api_tests"
version = "0.0.1"
edition = "2021"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# To use common shared agent definitions, place them in common_lib and uncomment the line below
# common-lib = { path = "../../common-rust/common-lib" }

log = { version = "0.4.29", features = ["kv"] }
golem-rust = { path = "../../sdks/rust/golem-rust", features = ["export_golem_agentic"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["formatting"] }
golem-wasi-http = { version = "0.2.0", features = ["json"] }
wasi = { version = "=0.14.7+wasi-0.2.4" }
futures-concurrency = "7.6.3"
rand = "0.9.0"
wasi-logger = { version = "0.1.2", features = ["kv"] }
wstd = { version = "=0.6.5", features = ["default", "json"] }
