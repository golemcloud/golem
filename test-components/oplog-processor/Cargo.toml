[package]
name = "oplog_processor"
version = "0.0.1"
 edition = "2024"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
futures = "0.3.31"
golem-rust = { path = "../../sdks/rust/golem-rust", features = [
    "export_oplog_processor",
] }
http = "1.3.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.10", features = ["v4"] }
wit-bindgen = { version = "=0.58.0", features = ["async"] }
