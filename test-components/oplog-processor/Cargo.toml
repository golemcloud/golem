[package]
name = "oplog_processor"
version = "0.0.1"
edition = "2021"

[profile.release]
opt-level = "s"
lto = true

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
golem-rust = { path = "../../sdks/rust/golem-rust", features = [
    "export_oplog_processor",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.10", features = ["v4"] }
wstd = { version = "=0.6.5", features = ["default", "json"] }
