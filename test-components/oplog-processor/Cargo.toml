[workspace]
resolver = "2"
members = ["components-rust/*"]

[profile.release]
opt-level = "s"
lto = true

[workspace.dependencies]
golem-rust = { path = "../../sdks/rust/golem-rust", features = [
    "export_oplog_processor",
] }
wstd = { version = "=0.6.5", features = ["default", "json"] }
serde_json = "1"
