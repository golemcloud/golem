# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.4.2/golem.schema.json

app: golem-sdk-example1

witDeps:
  - wit/deps

environments:
  local:
    server: local
    componentPresets: debug
  cloud:
    server: cloud
    componentPresets: release

componentTemplates:
  moonbit:
    presets:
      debug:
        default: true
        build:
          - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- reexports .mooncakes/golemcloud/golem_sdk {{ component_name | to_snake_case }}
          - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- agents {{ component_name | to_snake_case }}
          - command: moon build --target wasm --release
          - command: mkdir -p _build/wasm/debug
          - command: wasm-tools component embed wit _build/wasm/release/build/{{ component_name | to_snake_case }}/{{ component_name | to_snake_case }}.wasm --encoding utf16 --output _build/wasm/debug/{{ component_name | to_snake_case }}.embed.wasm
          - command: wasm-tools component new _build/wasm/debug/{{ component_name | to_snake_case }}.embed.wasm --output _build/wasm/debug/{{ component_name | to_snake_case }}.agent.wasm
          - generateAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            basedOnCompiledWasm: _build/wasm/debug/{{ component_name | to_snake_case }}.agent.wasm
          - composeAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            withAgent: _build/wasm/debug/{{ component_name | to_snake_case }}.agent.wasm
            to: golem-temp/agents/{{ component_name | to_snake_case }}_debug.static.wasm
        sourceWit: wit
        generatedWit: golem-temp/agents/{{ component_name | to_snake_case }}/wit-generated
        componentWasm: golem-temp/agents/{{ component_name | to_snake_case }}_debug.static.wasm
        linkedWasm: golem-temp/agents/{{ component_name | to_snake_case }}_debug.wasm
      release:
        build:
          - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- reexports .mooncakes/golemcloud/golem_sdk {{ component_name | to_snake_case }}
          - command: moon run -C .mooncakes/golemcloud/golem_sdk_tools cmd -- agents {{ component_name | to_snake_case }}
          - command: moon build --target wasm --release
          - command: wasm-tools component embed wit _build/wasm/release/build/{{ component_name | to_snake_case }}/{{ component_name | to_snake_case }}.wasm --encoding utf16 --output _build/wasm/release/{{ component_name | to_snake_case }}.embed.wasm
          - command: wasm-tools component new _build/wasm/release/{{ component_name | to_snake_case }}.embed.wasm --output _build/wasm/release/{{ component_name | to_snake_case }}.agent.wasm
          - generateAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            basedOnCompiledWasm: _build/wasm/release/{{ component_name | to_snake_case }}.agent.wasm
          - composeAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            withAgent: _build/wasm/release/{{ component_name | to_snake_case }}.agent.wasm
            to: golem-temp/agents/{{ component_name | to_snake_case }}_release.static.wasm
        sourceWit: wit
        generatedWit: golem-temp/agents/{{ component_name | to_snake_case }}/wit-generated
        componentWasm: golem-temp/agents/{{ component_name | to_snake_case }}_release.static.wasm
        linkedWasm: golem-temp/agents/{{ component_name | to_snake_case }}_release.wasm

components:
  golem:moonbit-examples:
    templates: moonbit
