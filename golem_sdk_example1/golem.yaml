# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.4.2/golem.schema.json

app: golem-sdk-example1

environments:
  local:
    server: local
    componentPresets: debug
  cloud:
    server: cloud
    componentPresets: release

componentTemplates:
  moonbit:
    presets:
      debug:
        default: true
        build:
          - command: moon run cmd -- reexports ../golem_sdk ../golem_sdk_example1/counter # TODO: directory name from template
            dir: ../golem_sdk_tools
          - command: moon run cmd -- agents ../golem_sdk ../golem_sdk_example1/counter # TODO: directory name from template
            dir: ../golem_sdk_tools
          - command: moon build --target wasm --release # Debug mode: NEW_MOON=0 moon build --target wasm works, but golem CLI infinite-recurses on debug WASM during generateAgentWrapper
          - command: wasm-tools component embed ../golem_sdk/wit _build/wasm/release/build/counter/counter.wasm --encoding utf16 --output _build/wasm/debug/counter.embed.wasm #: TODO: template vars
          - command: wasm-tools component new _build/wasm/debug/counter.embed.wasm --output _build/wasm/debug/counter.agent.wasm #: TODO: template vars
          - generateAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            basedOnCompiledWasm: _build/wasm/debug/counter.agent.wasm #: TODO: template vars
          - composeAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            withAgent: _build/wasm/debug/counter.agent.wasm #: TODO: template vars
            to: golem-temp/agents/{{ component_name | to_snake_case }}_debug.static.wasm
        sourceWit: ../golem_sdk/wit
        generatedWit: golem-temp/agents/{{ component_name | to_snake_case }}/wit-generated
        componentWasm: golem-temp/agents/{{ component_name | to_snake_case }}_debug.static.wasm
        linkedWasm: golem-temp/agents/{{ component_name | to_snake_case }}_debug.wasm
      release:
        build:
          - command: moon run cmd -- reexports ../golem_sdk ../golem_sdk_example1/counter # TODO: directory name from template
            dir: ../golem_sdk_tools
          - command: moon run cmd -- agents ../golem_sdk ../golem_sdk_example1/counter # TODO: directory name from template
            dir: ../golem_sdk_tools
          - command: moon build --target wasm --release
          - command: wasm-tools component embed ../golem_sdk/wit _build/wasm/release/build/counter/counter.wasm --encoding utf16 --output _build/wasm/release/counter.embed.wasm #: TODO: template vars
          - command: wasm-tools component new _build/wasm/release/counter.embed.wasm --output _build/wasm/release/counter.agent.wasm #: TODO: template vars
          - generateAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            basedOnCompiledWasm: _build/wasm/release/counter.agent.wasm #: TODO: template vars
          - composeAgentWrapper: golem-temp/agents/{{ component_name | to_snake_case }}.wrapper.wasm
            withAgent: _build/wasm/release/counter.agent.wasm #: TODO: template vars
            to: golem-temp/agents/{{ component_name | to_snake_case }}_release.static.wasm
        sourceWit: ../golem_sdk/wit
        generatedWit: golem-temp/agents/{{ component_name | to_snake_case }}/wit-generated
        componentWasm: golem-temp/agents/{{ component_name | to_snake_case }}_release.static.wasm
        linkedWasm: golem-temp/agents/{{ component_name | to_snake_case }}_release.wasm

components:
  golem:agent-guest:
    templates: moonbit
