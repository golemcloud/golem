[package]
name = "golem-wasm"
version = "0.0.0"
 edition = "2024"

homepage = "https://golem.cloud"
repository = "https://github.com/golemcloud/golem"
description = "Golem WASM base types"

license-file = "../LICENSE"

include = []

[lib]
path = "src/lib.rs"
harness = false

[dependencies]
golem-wasm-derive = { version = "0.0.0", path = "../golem-wasm-derive", optional = true }
wit-bindgen = { workspace = true, optional = true }

arbitrary = { workspace = true, features = ["derive"], optional = true }
async-recursion = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
bigdecimal = { workspace = true, optional = true }
bit-vec = { workspace = true, optional = true }
chrono = { workspace = true }
desert_rust = { workspace = true, optional = true }
itertools = { workspace = true }
lazy_static = { workspace = true, optional = true }
poem-openapi = { workspace = true, optional = true }
semver = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
uuid = { workspace = true }
url = { workspace = true, optional = true }
wasmtime = { workspace = true, optional = true }
wasmtime-wasi = { workspace = true, optional = true }
wasmparser = { workspace = true, optional = true }
wasm-wave = { workspace = true, optional = true }
wasm-metadata = { workspace = true, optional = true }
wit-component = { workspace = true, optional = true }
wit-parser = { workspace = true, optional = true }
wasip2 = { workspace = true, optional = true }

proptest = { workspace = true, optional = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
proptest = { workspace = true }
proptest-arbitrary-interop = { workspace = true }
test-r = { workspace = true }

[build-dependencies]
miette = { workspace = true, optional = true }
prost-build = { workspace = true, optional = true }
protox = { workspace = true, optional = true }

[features]
default = ["host", "derive"]

host = [
    "client",
    "dep:arbitrary",
    "dep:async-recursion",
    "dep:async-trait",
    "dep:bigdecimal",
    "dep:bit-vec",
    "dep:desert_rust",
    "dep:lazy_static",
    "dep:miette",
    "dep:poem-openapi",
    "dep:prost",
    "dep:prost-build",
    "dep:protox",
    "dep:semver",
    "dep:serde",
    "dep:serde_json",
    "dep:url",
    "dep:wasm-metadata",
    "dep:wasmparser",
    "dep:wasm-wave",
    "dep:wasmtime",
    "dep:wasmtime-wasi",
    "dep:wit-component",
    "dep:wit-parser"
]

derive = ["dep:golem-wasm-derive"]

guest = ["dep:wit-bindgen", "dep:wasip2"]

client = ["derive", "dep:serde", "dep:serde_json", "dep:bigdecimal", "dep:bit-vec", "dep:url"]

[[test]]
name = "exports"
harness = false

[[test]]
name = "mems"
harness = false

[[test]]
name = "metadata"
harness = false
